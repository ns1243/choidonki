을 상대하고 있었잖아. 애초에 너는 아무것도 안 하고 있었으니까 기둥에게 마무리 일격 정도는 넣어 뒀어야지."}, {"t": "01:31:09", "jp": "じゃあそういう風に操作すればよかったじゃない。私よ。それなのに何もしなかった。油断した。", "pr": "じゃあそういうかぜにそうさすればよかったじゃない。わたしよ。それなのになにもしなかった。ゆだんした。", "ko": "그럼 그렇게 (적을) 조종하면 됐잖아. 내가… 그런데도 아무것도 안 했어. 방심했어."}, {"t": "01:31:16", "jp": "うるせえんだよ。手負いの雑魚2匹くらい1人で倒せ。バカ。", "pr": "うるせえんだよ。ておいいのざつぎょ2ひきくらい1にんでたおせ。ばか。", "ko": "시끄러워. 부상당한 잡어 두 마리 정도 혼자 쓰러뜨려. 바보."}, {"t": "01:31:21", "jp": "バカはどっちでしょ? なんだと?あんたみたいに見にくいやつが私の兄弟なわけないわ。あんたなんかとはきっっっ血も繋がってないわよ。だって全然似てないもの。", "pr": "ばかはどっちでしょ? なんだと?あんたみたいにみにくいやつがわたしのきょうだいなわけないわ。あんたなんかとはきっっっちもつながってないわよ。だってぜんぜんにてないもの。", "ko": "바보는 누구일까? 뭐라고? 너 같은 못생긴 놈이 내 남매일 리 없어. 너 같은 놈과는 절대 피도 안 섞였어. 왜냐면 전혀 안 닮았으니까."}, {"t": "01:31:45", "jp": "この役立たず。強いことしかいいところがないのに負けたらもう何の価値もないわ。できそこないの見にくいやつよ。", "pr": "このやくたたず。つよいことしかいいところがないのにまけたらもうなんのかちもないわ。できそこないのみにくいやつよ。", "ko": "이 쓸모없는 놈. 강한 것밖에 장점이 없는데 지면 이제 아무런 가치도 없어. 못나고 못생긴 놈이야."}, {"t": "01:32:00", "jp": "ふざけんじゃねえぞ。できそこないはお前だろうが。お前みたいなやつを今まで飼ってきたことが心底悔やまれるぜ。", "pr": "ふざけんじゃねえぞ。できそこないはおまえだろうが。おまえみたいなやつをいままでかってきたことがしんそこくやまれるぜ。", "ko": "까불지 마라. 못난 건 너잖아. 너 같은 놈을 지금까지 거둬 온 게 진심으로 후회된다."}, {"t": "01:32:11", "jp": "なんで俺がお前の尻拭いばっかりしなきゃならねえんだ。お前さえなけりゃ俺 の人生はもっと違ってた。", "pr": "なんでおれがおまえのしりぬぐいばっかりしなきゃならねえんだ。おまえさえなけりゃおれ のじんせいはもっとちがってた。", "ko": "왜 내가 네 뒤치다꺼리만 해야 하는 거냐. 너만 없었으면 내 인생은 훨씬 달랐어."}, {"t": "01:32:17", "jp": "お前さえなけりゃな。お前なんか生まれてこなけりゃよかったんだ。", "pr": "おまえさえなけりゃな。おまえなんかうまれてこなけりゃよかったんだ。", "ko": "너만 없었으면 말이야. 너 따위 태어나지 않았으면 좋았어."}, {"t": "01:32:28", "jp": "嘘だよ。本当はそんなこと思ってないよ。全部嘘だよ。仲良くしよう。この世で たった2人の兄弟なんだから君たちのしたことは誰も許してくれない。", "pr": "うそだよ。ほんとうはそんなことおもってないよ。ぜんぶうそだよ。なかよくしよう。このよで たった2にんのきょうだいなんだからくんたちのしたことはだれもゆるしてくれない。", "ko": "거짓말이야. 사실은 그런 생각 안 해. 전부 거짓말이야. 사이좋게 지내자. 이 세상에 단둘뿐인 남매니까. 너희가 한 짓은 아무도 용서해 주지 않아."}, {"t": "01:32:43", "jp": "殺してきたくさんの人に恨まれ憎まれて罵倒される。", "pr": "ころしてきたくさんのにんにうらまれにくまれてばとうされる。", "ko": "죽인 수많은 사람에게 원망받고 미움받고 욕먹는다."}, {"t": "01:32:50", "jp": "味方してくれる人なんていない。だからせめて2人だけは お互いを罵り合ったらだめだ。", "pr": "みかたしてくれるにんなんていない。だからせめて2にんだけは おたがいをののしりあったらだめだ。", "ko": "편들어 줄 사람 따위 없어. 그러니 적어도 둘만큼은 서로 욕하면 안 돼."}, {"t": "01:32:55", "jp": "私たちに説教じゃないわよ。どこか行け。", "pr": "わたしたちにせっきょうじゃないわよ。どこかいけ。", "ko": "우리한테 설교하지 마. 어디론가 꺼져."}, {"t": "01:33:14", "jp": "悔しいよ。悔しいよ。なんとかしてお兄ちゃん 死にたくないよ。", "pr": "くやしいよ。くやしいよ。なんとかしておにいちゃん しにたくないよ。", "ko": "분해. 분해. 어떻게든 오빠 죽고 싶지 않아."}, {"t": "01:33:24", "jp": "梅。そうだ。俺の妹の名前は梅だった。", "pr": "うめ。そうだ。おれのいもうとのなまえはうめだった。", "ko": "우메. 그래. 내 여동생의 이름은 우메였지."}, {"t": "01:33:39", "jp": "妹の本当の名前は堕姫じゃねえ。梅だ。俺は見にくかったし汚かった。", "pr": "いもうとのほんとうのなまえはだひめじゃねえ。うめだ。おれはみにくかったしぎたなかった。", "ko": "여동생의 진짜 이름은 다키가 아니야. 우메다. 나는 못생겼고 더러웠어."}, {"t": "01:33:56", "jp": "美貌が全ての価値基準である廓ではことさら 忌み嫌われた怪物のように。", "pr": "びぼうがすべてのかちきじゅんであるかくではことさら いみきらわれたかいぶつのように。", "ko": "미모가 모든 가치 기준인 유곽에서는 유달리 꺼리고 미움받았지. 괴물처럼."}, {"t": "01:34:06", "jp": "俺の中で何かが変わり始めたのは 梅が生まれてからだ。", "pr": "おれのなかでなにかがかわりはじめたのは うめがうまれてからだ。", "ko": "내 안에서 뭔가가 변하기 시작한 건 우메가 태어나고부터다."}, {"t": "01:34:16", "jp": "お前のように美しい妹がいることは俺の 劣等感を吹き飛ばしてくれた。", "pr": "おまえのようにうつくしいいもうとがいることはおれの れっとうかんをふきとばしてくれた。", "ko": "너처럼 아름다운 여동생이 있다는 것은 내 열등감을 날려 줬어."}, {"t": "01:34:23", "jp": "これから俺たちの人生はいい方へ加速して 回っていくような気がした。", "pr": "これからおれたちのじんせいはいいほうへかそくして まわっていくようなきがした。", "ko": "이제부터 우리 인생은 좋은 쪽으로 가속해서 돌아갈 것 같은 기분이 들었어."}, {"t": "01:34:31", "jp": "梅が13になるまでは。客の侍の目玉を潰して詰問させたの で、その報復として梅は縛り上げられ、生きたまま焼かれた。", "pr": "うめが13になるまでは。きゃくのさむらいのめだまをつぶしてきつもんさせたの で、そのほうふくとしてうめはしばりあげられ、いきたままやかれた。", "ko": "우메가 열셋이 될 때까지는. 손님인 사무라이의 눈알을 찔러 다그쳤다고 해서, 그 보복으로 우메는 묶여 산 채로 불태워졌어."}, {"t": "01:34:50", "jp": "俺はいなかった。仕事から戻ったらお前は丸焦げになっていた。誰も助けちゃくれない。", "pr": "おれはいなかった。しごとからもどったらおまえはまるこげになっていた。だれもたすけちゃくれない。", "ko": "나는 없었어. 일에서 돌아오니 너는 새까맣게 타 있었어. 아무도 도와주지 않아."}, {"t": "01:34:58", "jp": "鬼になったことに後悔はねえ。俺は何度 生まれ変わっても必ず鬼になる。", "pr": "おにになったことにこうかいはねえ。おれはなんど うまれかわってもかならずおにになる。", "ko": "귀신이 된 것에 후회는 없어. 나는 몇 번 다시 태어나도 반드시 귀신이 된다."}, {"t": "01:35:09", "jp": "でも梅。お前は何か違う道があったかもしれない。", "pr": "でもうめ。おまえはなにかちがうみちがあったかもしれない。", "ko": "하지만 우메. 너는 뭔가 다른 길이 있었을지도 몰라."}, {"t": "01:35:20", "jp": "俺の唯一の心残りは梅、お前だったな。なんだここは？地獄か？", "pr": "おれのゆいいつのこころのこりはうめ、おまえだったな。なんだここは？じごくか？", "ko": "내 유일한 미련은 우메, 너였지. 뭐야 여기는? 지옥인가?"}, {"t": "01:35:25", "jp": "お兄ちゃん、やだ。ここ嫌い。どこなの？出たいよ。なんとかして。", "pr": "おにいちゃん、やだ。ここきらい。どこなの？でたいよ。なんとかして。", "ko": "오빠, 싫어. 여기 싫어. 어디야? 나가고 싶어. 어떻게 좀 해 줘."}, {"t": "01:35:48", "jp": "お前、その姿。お前はもう俺についてくるんじゃねえ。", "pr": "おまえ、そのすがた。おまえはもうおれについてくるんじゃねえ。", "ko": "너, 그 모습. 너는 이제 나를 따라오지 마라."}, {"t": "01:35:56", "jp": "なんで？待ってよ。私、ついてくんじゃねえ。", "pr": "なんで？まってよ。わたし、ついてくんじゃねえ。", "ko": "왜? 기다려. 나, 따라오지 마라."}, {"t": "01:36:13", "jp": "さっきのこと怒ったの？謝るから許してよ。お兄ちゃんのこと見にくいなんて思ってないよ。", "pr": "さっきのこといかったの？あやまるからゆるしてよ。おにいちゃんのことみにくいなんておもってないよ。", "ko": "아까 일 화났어? 사과할 테니까 용서해 줘. 오빠를 못생겼다고 생각 안 해."}, {"t": "01:36:20", "jp": "悔しかったの？負けて悔しかったの？足引っ張ってごめんなさいね、お兄ちゃん。", "pr": "くやしかったの？まけてくやしかったの？あしひきっはってごめんなさいね、おにいちゃん。", "ko": "분했어? 져서 분했어? 발목 잡아서 미안해, 오빠."}, {"t": "01:36:26", "jp": "お前とはもう兄弟でもなんでもない。俺はこっちに行くから。お前は反対の方、明るい方へ行け。", "pr": "おまえとはもうきょうだいでもなんでもない。おれはこっちにいくから。おまえははんたいのほう、あかるいほうへいけ。", "ko": "너와는 이제 남매도 뭣도 아니야. 나는 이쪽으로 갈 테니까. 너는 반대쪽, 밝은 쪽으로 가라."}, {"t": "01:36:34", "jp": "やだ、やだ。離れない。絶対離れないから。ずっと一緒。", "pr": "やだ、やだ。はなれない。ぜったいはなれないから。ずっといっしょ。", "ko": "싫어, 싫어. 안 떨어져. 절대 안 떨어질 거야. 계속 같이."}, {"t": "01:36:56", "jp": "にいるんだから。何回生まれ変わっても私はお兄ちゃんの妹になる。絶対に ずっと一緒にも約束したの。", "pr": "にいるんだから。なんかいうまれかわってもわたしはおにいちゃんのいもうとになる。ぜったいに ずっといっしょにもやくそくしたの。", "ko": "있을 거니까. 몇 번 다시 태어나도 나는 오빠의 여동생이 될 거야. 절대로 계속 같이 있자고 약속했잖아."}, {"t": "01:37:04", "jp": "忘れちゃったの。", "pr": "わすれちゃったの。", "ko": "잊어버린 거야."}, {"t": "01:37:23", "jp": "俺たちは2人なら最強だ。寒いのもハラペコなども全然へっちゃら。約束する。", "pr": "おれたちは2にんならさいきょうだ。さむいのもはらぺこなどもぜんぜんへっちゃら。やくそくする。", "ko": "우리는 둘이면 최강이야. 추운 것도 배고픈 것도 전혀 아무렇지 않아. 약속할게."}, {"t": "01:37:32", "jp": "ずっと一緒だ。絶対離れない。ほら、 もう何も怖くないだろ。", "pr": "ずっといっしょだ。ぜったいはなれない。ほら、 もうなにもこわくないだろ。", "ko": "계속 같이야. 절대 안 떨어져. 봐, 이제 아무것도 안 무섭지."}, {"t": "01:37:38", "jp": "ふん。そうか。ふん。6ね。一番下だ。", "pr": "ふん。そうか。ふん。6ね。いちばんしただ。", "ko": "흥. 그런가. 흥. 6이군. 가장 아래다."}, {"t": "01:38:30", "jp": "上弦の6とはいえを倒したわけだ。実にめでたいことだな。6だがな。褒めてやっ てもいい。", "pr": "じょうげんの6とはいえをたおしたわけだ。じつにめでたいことだな。6だがな。ほめてやっ てもいい。", "ko": "상현의 6이라고는 해도 (그를) 쓰러뜨린 셈이지. 실로 경사스러운 일이군. 6이지만 말이야. 칭찬해 줘도 되겠어."}, {"t": "01:38:41", "jp": "いや、お前から褒められても別に。その体はどうするつもりだ?高が上弦の 6との戦いで復帰までの穴埋めは誰がするんだ?", "pr": "いや、おぜんからほめられてもべつに。そのからだはどうするつもりだ?たかがじょうげんの 6とのたたかいでふっきまでのあなうめはだれがするんだ?", "ko": "아니, 너한테 칭찬받아도 딱히. 그 몸은 어쩔 셈이냐? 고작 상현의 6과의 싸움으로 (네가) 복귀할 때까지의 공백은 누가 메우나?"}, {"t": "01:38:56", "jp": "俺は引退する。さすがにもう戦えねえよ。親方様も許してくださるだろう。", "pr": "おれはいんたいする。さすがにもうたたかえねえよ。おやかたさまもゆるしてくださるだろう。", "ko": "나는 은퇴한다. 아무래도 이제 못 싸워. 오야카타 님도 허락해 주시겠지."}, {"t": "01:39:04", "jp": "ふざけるなよ。俺は許さない。ただでさえ若手が育たず死にすぎるから。", "pr": "ふざけるなよ。おれはゆるさない。ただでさえわかてがそだたずしにすぎるから。", "ko": "까불지 마라. 나는 용서 못 해. 그러잖아도 젊은 애들이 자라지 못하고 너무 많이 죽으니까."}, {"t": "01:39:12", "jp": "いや、若手は育ってるぜ。確実に。お前の大嫌いな若手がな。おい、まさか生き残ったのか?竈門炭治郎が。そうか。倒したか?上弦を。よくやった天元。", "pr": "いや、わかてはそだってるぜ。かくじつに。おまえのだいきらいなわかてがな。おい、まさかいきのこったのか?かまどもんたんじろうが。そうか。たおしたか?じょうげんを。よくやったてんげん。", "ko": "아니, 젊은 애들은 자라고 있어. 확실히. 네가 질색하는 젊은 애가 말이야. 어이, 설마 살아남은 거냐? 카마도 탄지로가. 그런가. 쓰러뜨렸나? 상현을. 잘했다 텐겐."}, {"t": "01:39:41", "jp": "炭治郎、禰豆子、善逸、伊之助。100年、100年もの間変わらなかった 状況が今変わった。", "pr": "たんじろう、ねずこ、ぜんいつ、いのすけ。100ねん、100ねんものかんかわらなかった じょうきょうがいまかわった。", "ko": "탄지로, 네즈코, 젠이츠, 이노스케. 100년, 100년 동안 변하지 않았던 상황이 지금 변했다."}, {"t": "01:39:51", "jp": "運命が大きく変わり始める。この波紋は 広がっていくだろう。", "pr": "うんめいがおおきくかわりはじめる。このはもんは ひろがっていくだろう。", "ko": "운명이 크게 변하기 시작한다. 이 파문은 퍼져 나가겠지."}], "range": "01:30:21 ~ 01:39:51"}, {"title": "챕터 11", "lines": [{"t": "01:40:04", "jp": "周囲を巻き込んで大きく揺らし、やがては あの男の元へ届く鬼舞辻無惨。", "pr": "しゅういをまきこんでおおきくゆらし、やがては あのおとこのもとへとどくおにまいつじむざん。", "ko": "주위를 끌어들여 크게 흔들고, 이윽고 그 남자에게 닿는다. 키부츠지 무잔."}, {"t": "01:40:12", "jp": "お前は必ず 私たちが私たちの代で倒す。", "pr": "おまえはかならず わたしたちがわたしたちのだいでたおす。", "ko": "너는 반드시 우리가 우리 대(代)에서 쓰러뜨린다."}, {"t": "01:40:18", "jp": "我が一族唯一のお点である。お前は。", "pr": "わがいちぞくゆいいつのおてんである。おまえは。", "ko": "우리 일족 유일한 오점이다. 너는."}, {"t": "01:40:29", "jp": "うわあ、よかったよ。生きてるよ。みんな生きててよかった。", "pr": "うわあ、よかったよ。いきてるよ。みんないきててよかった。", "ko": "으아, 다행이야. 살아 있어. 모두 살아 있어 다행이야."}, {"t": "01:40:48", "jp": "誰も欠けることなく帰れますね。凱旋しよう。派手にな。", "pr": "だれもかけることなくかえれますね。がいせんしよう。はでにな。", "ko": "아무도 빠지는 일 없이 돌아갈 수 있겠네요. 개선하자. 화려하게 말이야."}, {"t": "01:40:55", "jp": "異空間無限。ここに呼ばれた意味はすぐに 理解できた。", "pr": "いくうかんむげん。ここによばれたいみはすぐに りかいできた。", "ko": "이공간 무한성. 여기에 불려 온 의미는 곧 이해할 수 있었다."}, {"t": "01:41:19", "jp": "上弦が鬼にやられた。", "pr": "じょうげんがおににやられた。", "ko": "상현이 귀신 사냥꾼에게 당했다."}, {"t": "01:41:43", "jp": "ちょっと待っておくれよ。赤殿。俺の心配はしてくれないのかい？どか風？前よりも少し強くなったかな？赤殿の牛太郎が死んだ。上弦の月が欠けた。だがもうそれもいい。私はお前たちに期待しない。", "pr": "ちょっとまっておくれよ。あかどの。おれのしんぱいはしてくれないのかい？どかかぜ？まえよりもすこしつよくなったかな？あかどののぎゅうたろうがしんだ。じょうげんのがつがかけた。だがもうそれもいい。わたしはおまえたちにきたいしない。", "ko": "잠깐 기다려 주게. 아카자 님. 내 걱정은 안 해 주는 건가? 도키 풍? 전보다 조금 강해졌으려나? 아카자의 규타로가 죽었다. 상현의 달이 이지러졌다. 하지만 이제 그것도 됐다. 나는 너희에게 기대하지 않겠다."}, {"t": "01:42:01", "jp": "またそのように悲しいことをおっしゃい なさる。", "pr": "またそのようにかなしいことをおっしゃい なさる。", "ko": "또 그렇게 슬픈 말씀을 하시는군요."}, {"t": "01:42:16", "jp": "俺があなた様の期待に答えなかった時があったでしょうか？", "pr": "おれがあなたようのきたいにこたえなかったときがあったでしょうか？", "ko": "제가 당신의 기대에 부응하지 못한 적이 있었습니까?"}, {"t": "01:42:24", "jp": "牛一族を未だに葬っていない。私は貴様らの存在理由が分からなくなって 来た。", "pr": "ぎゅういちぞくをいまだにそうっていない。わたしはきさまらのそんざいりゆうがわからなくなって きた。", "ko": "우부야시키 일족을 아직도 장사 지내지 못했다. 나는 네놈들의 존재 이유를 모르게 되어 왔다."}, {"t": "01:42:34", "jp": "へえ。お許しなさいませ。どうかどうか。す言葉もない。うしき巧妙 に姿を隠している。", "pr": "へえ。おゆるしなさいませ。どうかどうか。すことばもない。うしきこうみょう にすがたをかくしている。", "ko": "허. 용서해 주십시오. 부디 부디. 드릴 말씀도 없습니다. 우부야시키는 교묘하게 모습을 숨기고 있습니다."}, {"t": "01:42:45", "jp": "無惨様、私は違います。あなた様の望みに一歩近づくための 情報を私は掴みました。", "pr": "むざんさま、わたしはちがいます。あなたようののぞみにいっぽちかづくための じょうほうをわたしはつかみました。", "ko": "무잔 님, 저는 다릅니다. 당신의 바람에 한 걸음 다가가기 위한 정보를 저는 손에 넣었습니다."}, {"t": "01:42:56", "jp": "ほんのしがった。113年ぶりに上弦を殺されて 私は不快の絶頂だ。", "pr": "ほんのしがった。113ねんぶりにじょうげんをころされて わたしはふかいのぜっちょうだ。", "ko": "별것 아니군. 113년 만에 상현이 죽임을 당해 나는 불쾌함의 절정이다."}, {"t": "01:43:08", "jp": "まだ確定していない情報を危機として伝えようとするな。これ からはもっと死に物狂いでやった方がいい。", "pr": "まだかくていしていないじょうほうをききとしてつたえようとするな。これ からはもっとしにものぐるいいでやったほうがいい。", "ko": "아직 확정되지 않은 정보를 위급한 일로 전하려 하지 마라. 앞으로는 더 필사적으로 하는 게 좋아."}, {"t": "01:43:18", "jp": "私は上弦だからという理由でお前たちを 甘やかしすぎたようだ。", "pr": "わたしはじょうげんだからというりゆうでおまえたちを あまやかしすぎたようだ。", "ko": "나는 상현이라는 이유만으로 너희를 너무 응석받이로 키운 모양이다."}, {"t": "01:43:25", "jp": "情報が確定したら半天狗と共にそこへ向かえ。", "pr": "じょうほうがかくていしたらはんてんくとともにそこへむかえ。", "ko": "정보가 확정되면 한텐구와 함께 그곳으로 향해라."}, {"t": "01:43:37", "jp": "上弦の6、人間ごときにやられると。あ、ぎょっこだの。俺も一緒に行きたい。この通りだ。無惨様がお前に何か命じたか?", "pr": "じょうげんの6、にんげんごときにやられると。あ、ぎょっこだの。おれもいっしょにいきたい。このとうりだ。むざんさまがおまえになにかめいじたか?", "ko": "상현의 6, 인간 따위에게 당하다니. 아, 굣코군. 나도 함께 가고 싶어. 이렇게 부탁하네. 무잔 님이 너에게 뭔가 명령했나?"}, {"t": "01:43:42", "jp": "猗窩座、お前は図りすぎるか。気に食わぬのならば入れ替わりの血戦を申し込むことだ。私の言いたいことは分かったか?", "pr": "きかざ、おまえははかりすぎるか。きにくわぬのならばいれかわりのけっせんをもうしこむことだ。わたしのいいたいことはわかったか?", "ko": "아카자, 너는 분수를 넘는군. 마음에 들지 않으면 자리바꿈을 건 혈전을 신청하면 된다. 내가 하고 싶은 말은 알겠나?"}, {"t": "01:44:09", "jp": "俺は必ずお前を殺す。励むことだ。", "pr": "おれはかならずおまえをころす。はげむことだ。", "ko": "나는 반드시 너를 죽인다. 힘쓰도록 해라."}, {"t": "01:44:20", "jp": "術を極めた者がたどり着く場所はいつも同じだ。", "pr": "じゅつをきわめたものがたどりつくばしょはいつもおなじだ。", "ko": "기술을 끝까지 파고든 자가 다다르는 곳은 언제나 같다."}, {"t": "01:44:29", "jp": "時代が変わろうともそこに至るまでの道のりが違おうとも必ず同じ場所に 行きつく。", "pr": "じだいがかわろうともそこにいたるまでのみちのりがいおうともかならずおなじばしょに いきつく。", "ko": "시대가 바뀌더라도, 거기에 이르기까지의 여정이 다르더라도 반드시 같은 곳에 다다른다."}, {"t": "01:44:35", "jp": "お前には私が何か特別な人間のように見えているらしいがそんなことは ない。", "pr": "おまえにはわたしがなにかとくべつなにんげんのようにみえているらしいがそんなことは ない。", "ko": "너에게는 내가 뭔가 특별한 인간처럼 보이는 모양이지만 그런 것은 아니다."}, {"t": "01:44:43", "jp": "私は大切なものを何一つ守れず人生においてなすべきことをなせなかったもの だ。", "pr": "わたしはたいせつなものをなにひとつまもれずじんせいにおいてなすべきことをなせなかったもの だ。", "ko": "나는 소중한 것을 하나도 지키지 못하고 인생에서 해야 할 일을 해내지 못한 자다."}, {"t": "01:44:51", "jp": "何の価値もない男なのだ。ああ、そんな風に、そんな風に言わないで欲しい。どうか頼むから自分のことをそんな風に。", "pr": "なんのかちもないおとこなのだ。ああ、そんなかぜに、そんなかぜにいわないでほしい。どうかたのむからじぶんのことをそんなかぜに。", "ko": "아무런 가치도 없는 남자다. 아아, 그렇게, 그렇게 말하지 말아 주세요. 부디 부탁이니 자신을 그렇게."}, {"t": "01:45:02", "jp": "夢か。あ、大丈夫。戦いの後2ヶ月間意識が戻らなかったのよ。", "pr": "ゆめか。あ、だいじょうぶ。たたかいののち2ゖげっかんいしきがもどらなかったのよ。", "ko": "꿈인가. 아, 괜찮아. 싸움이 끝난 뒤 두 달 동안 의식이 돌아오지 않았어."}, {"t": "01:45:30", "jp": "そうなのか。目が覚めてよかった。うん。悔しい。あ、そうだ。", "pr": "そうなのか。めがさめてよかった。うん。くやしい。あ、そうだ。", "ko": "그랬구나. 눈을 떠서 다행이야. 응. 분해. 아, 그렇지."}, {"t": "01:45:45", "jp": "俺が眠ってる間に刀届いてない？箱ぼれしてしまったやつなんだけど。", "pr": "おれがねむってるまにかたなとどいてない？はこぼれしてしまったやつなんだけど。", "ko": "내가 자고 있는 동안 칼 안 왔어? 이가 나가 버린 그거 말인데."}, {"t": "01:45:50", "jp": "あ、あの、鋼塚さんからお手紙は来てます。ご覧になりますか？", "pr": "あ、あの、こうつかさんからおてがみはきてます。ごらんになりますか？", "ko": "아, 저, 하가네즈카 씨에게서 편지는 와 있어요. 보시겠어요?"}, {"t": "01:46:01", "jp": "お前にある刀はない。許さない。許さない。呪ってやる。憎い。憎い。憎い。これはまずいぞ。", "pr": "おまえにあるかたなはない。ゆるさない。ゆるさない。のろってやる。にくい。にくい。にくい。これはまずいぞ。", "ko": "너에게 줄 칼은 없다. 용서 안 해. 용서 안 해. 저주해 주겠다. 밉다. 밉다. 밉다. 이거 큰일이군."}, {"t": "01:46:14", "jp": "2ヶ月あったんですけど刀は届いてなくて。刀が破損するのはよくあることなんですけど鋼塚さんはちょっと気難しい方ですね。", "pr": "2ゖがつあったんですけどかたなはとどいてなくて。かたながはそんするのはよくあることなんですけどこうつかさんはちょっときむずかしいほうですね。", "ko": "두 달 있었는데 칼은 안 왔고. 칼이 파손되는 건 흔한 일이지만 하가네즈카 씨는 좀 까다로운 분이네요."}, {"t": "01:46:27", "jp": "里の方に行ってみてはどうですか？刀鍛冶の皆さんの里です。", "pr": "さとのほうにいってみてはどうですか？かたなかじのみなさんのさとです。", "ko": "(도공) 마을 쪽으로 가 보는 건 어때요? 도공들의 마을이에요."}, {"t": "01:46:36", "jp": "親方様の許可を得た俺は隠しの案内のもといざ刀鍛冶の里へ。鬼に知られて襲撃されないよう、里の場所は巧妙に隠されている。", "pr": "おやかたようのきょかをえたおれはかくしのあんないのもといざかたなかじのさとへ。おににしられてしゅうげきされないよう、さとのばしょはこうみょうにかくされている。", "ko": "오야카타 님의 허락을 얻은 나는 카쿠시의 안내를 받아 자, 도공 마을로. 귀신에게 알려져 습격당하지 않도록 마을의 위치는 교묘하게 숨겨져 있다."}, {"t": "01:46:50", "jp": "外しますよ。ああ、すごい建物ですね。どうもこんにちは。わし、この里の里の鉄地河原鉄珍。よろしく。", "pr": "はずしますよ。ああ、すごいたてものですね。どうもこんにちは。わし、このさとのさとのてっちかわらてつちん。よろしく。", "ko": "(눈가리개를) 벗기겠습니다. 아아, 굉장한 건물이네요. 안녕하세요. 나, 이 마을의 (촌장) 테츠이도 텟친. 잘 부탁해."}, {"t": "01:47:10", "jp": "1番小さくって1番偉いのわし。まあ畳におでこつくくらいに頭下げたってや。", "pr": "1ばんちーさくって1ばんえらいのわし。まあたたみにおでこつくくらいにとうかげたってや。", "ko": "제일 작고 제일 높은 게 나야. 뭐, 다다미에 이마가 닿을 만큼 고개를 숙여라."}, {"t": "01:47:20", "jp": "か戸炭治郎です。よろしくお願いします。まあえ子やな。ホ太郎なんやけどな。今行方不明になっててな。", "pr": "かこたんじろうです。よろしくおねがいします。まあえこやな。ほたろうなんやけどな。いまゆくえふめいになっててな。", "ko": "카마도 탄지로입니다. 잘 부탁드립니다. 뭐, 좋은 아이군. 호타루 말인데 말이야. 지금 행방불명이 돼서 말이야."}, {"t": "01:47:31", "jp": "わしらも探してるから人してな。ホタル?そうや。鋼塚ホタル。わしが名付け親。可愛すぎ言うて本人から罵倒されたわ。あの子や小さい時からあんな風やすぐ感釈を起こしてどっか行きよる。すまんな。", "pr": "わしらもさがしてるからにんしてな。ほたる?そうや。こうつかほたる。わしがなづけおや。かわいすぎいうてほんにんからばとうされたわ。あのこやちーさいときからあんなかぜやすぐかんしゃくをおこしてどっかいきよる。すまんな。", "ko": "우리도 찾고 있으니 (찾는 걸) 도와줘. 호타루? 그래. 하가네즈카 호타루. 내가 이름 지어 준 사람. 너무 귀엽다고 해서 본인한테 욕먹었지. 그 애는 어릴 때부터 그런 식이야. 금방 발끈해서 어디론가 가 버려. 미안하군."}, {"t": "01:47:54", "jp": "いやいや、そんな俺が刀を追ったりすぐ箱ぼれさせたりするからで。", "pr": "いやいや、そんなおれがかたなをおったりすぐはこぼれさせたりするからで。", "ko": "아뇨 아뇨, 제가 칼을 마구 다루거나 금방 이가 나가게 해서요."}, {"t": "01:47:59", "jp": "いや、違う。俺の日な生クを作ったあの子が悪いのや。", "pr": "いや、ちがう。おれのにちななまくをつくったあのこがわるいのや。", "ko": "아니, 아니다. 내 일륜도를 만든 그 애가 나쁜 거야."}, {"t": "01:48:07", "jp": "見つけ次第取り押さえて連れてまりますのでご安心ください。", "pr": "みつけしだいとりおさえてつれてまりますのでごあんしんください。", "ko": "발견하는 대로 붙잡아 데려올 테니 안심하세요."}, {"t": "01:48:12", "jp": "あ、あまり乱暴は。君もまだ鬼に行けるほど体が回復してないと聞ってる。それまでにホタルが刀を打たない場合別のものを君の刀かじにする。", "pr": "あ、あまりらんぼうは。くんもまだおににいけるほどからだがかいふくしてないときってる。それまでにほたるがかたなをうたないばあいべつのものをくんのかたなかじにする。", "ko": "아, 너무 난폭하게는. 너도 아직 귀신과 싸울 만큼 몸이 회복되지 않았다고 들었다. 그때까지 호타루가 칼을 벼리지 않을 경우 다른 사람을 네 도공으로 삼겠다."}, {"t": "01:48:27", "jp": "うちの里の温泉は弱った体によく聞くから、まあ、ゆっくり過ごしてや。ああ、炭治郎君だ。炭治郎君。危ない。気をつけてください。ちさがこぼれでそうです。", "pr": "うちのさとのおんせんはよわったからだによくきくから、まあ、ゆっくりすごしてや。ああ、たんじろうくんだ。たんじろうくん。あぶない。きをつけてください。ちさがこぼれでそうです。", "ko": "우리 마을의 온천은 약해진 몸에 잘 들으니, 뭐, 느긋하게 지내라. 아, 탄지로 군이다. 탄지로 군. 위험해. 조심하세요. 가슴이 흘러나올 것 같아요."}, {"t": "01:48:48", "jp": "聞いてよ、聞いてよ。私今そこで無視されたの。挨拶したのに無視されたの。うは。", "pr": "きいてよ、きいてよ。わたしいまそこでむしされたの。あいさつしたのにむしされたの。うは。", "ko": "들어 봐, 들어 봐. 나 지금 저기서 무시당했어. 인사했는데 무시당했어. 으."}, {"t": "01:48:58", "jp": "誰にですか?わかんないの。だから名前聞いたのに無視なの。ひどいと思わない?私柱なのに。お風呂上がりのいい気分がもう全部し 元気出してください。", "pr": "だれにですか?わかんないの。だからなまえきいたのにむしなの。ひどいとおもわない?わたしはしらなのに。おふろあがりのいいきぶんがもうぜんぶし げんきだしてください。", "ko": "누구한테요? 모르겠어. 그래서 이름 물었는데 무시야. 너무하다고 생각하지 않아? 나 기둥인데. 목욕 후의 좋은 기분이 다 (날아갔어). 기운 내세요."}, {"t": "01:49:04", "jp": "もうすぐ晩御飯ができるみたいですよ。松たご飯だそうです。", "pr": "もうすぐばんごはんができるみたいですよ。まつたごめしだそうです。", "ko": "곧 저녁이 다 되는 모양이에요. 송이버섯밥이래요."}, {"t": "01:49:18", "jp": "ええ、本当?晩御飯は松たご飯だそうですよ。", "pr": "ええ、ほんとう?ばんごはんはまつたごめしだそうですよ。", "ko": "어, 정말? 저녁은 송이버섯밥이래요."}, {"t": "01:49:26", "jp": "食し坊。ん?誰かいる?さっきカ路寺さんが言ってた人かな?側面の駆られた頭。あの人は会ったことがあるぞ。確か名前はすみちゃんが教えてくれて。な川はげや。死め。はあ。", "pr": "しょくしぼう。ん?だれかいる?さっきかみちてらさんがいってたにんかな?そくめんのかられたあたま。あのにんはあったことがあるぞ。たしかなまえはすみちゃんがおしえてくれて。なかわはげや。しめ。はあ。", "ko": "먹보. 응? 누구 있어? 아까 카나모리 씨가 말했던 사람인가? 옆면을 민 머리. 저 사람은 만난 적이 있어. 분명 이름은 스미 짱이 알려 줘서. 시나즈가와다. 죽어. 하아."}, {"t": "01:49:55", "jp": "風柱と苗字一緒だね。話かけんじゃねえ。人間関係って難しいな。", "pr": "かぜはしらとみょうじいっしょだね。はなしかけんじゃねえ。にんげんかんけいってむずかしいな。", "ko": "풍주(바람의 기둥)와 성이 같네. 말 걸지 마. 인간관계라는 거 어렵네."}], "range": "01:40:04 ~ 01:49:55"}, {"title": "챕터 12", "lines": [{"t": "01:50:02", "jp": "すごいですね。そうかな。今日はそんなに食べてないけど。", "pr": "すごいですね。そうかな。こんにちはそんなにたべてないけど。", "ko": "대단하네요. 그런가. 오늘은 그렇게 많이 안 먹었는데."}, {"t": "01:50:17", "jp": "俺もいっぱい食べて強くなります。あ、そうだ。", "pr": "おれもいっぱいたべてつよくなります。あ、そうだ。", "ko": "저도 많이 먹고 강해지겠습니다. 아, 맞다."}, {"t": "01:50:21", "jp": "甘露寺さんが温泉であったのは、不死川玄弥という俺の同期でしたよ。", "pr": "かんろてらさんがおんせんであったのは、ふしかわげんやというおれのどうきでしたよ。", "ko": "칸로지 씨가 온천에서 만난 건, 시나즈가와 겐야라는 제 동기였어요."}, {"t": "01:50:26", "jp": "そうだったの。不死川さんの弟さんでしょ。でも、不死川さん弟いないって言ってたの。仲悪いのかしら。切ないわね。", "pr": "そうだったの。ふしかわさんのおとうとさんでしょ。でも、ふしかわさんおとうといないっていってたの。なかわるいのかしら。せつないわね。", "ko": "그랬구나. 시나즈가와 씨의 동생이지. 그런데 시나즈가와 씨 동생 없다고 했어. 사이 나쁜 걸까. 안타깝네."}, {"t": "01:50:38", "jp": "甘露寺様。何？間もなく刀が途終わるそうです。最後の調整のため、工房の方へ来ていただきたく。", "pr": "かんろてらさま。なに？かんもなくかたながとおわるそうです。さいごのちょうせいのため、こうぼうのほうへきていただきたく。", "ko": "칸로지 님. 뭐? 곧 칼 손질이 끝난다고 합니다. 마지막 조정을 위해 공방으로 와 주셨으면 합니다."}, {"t": "01:50:48", "jp": "あら、もう行かなきゃいけないみたい。炭治郎君、今度また生きて会えるかわから ないけど頑張りましょうね。", "pr": "あら、もういかなきゃいけないみたい。たんじろうくん、こんどまたいきてあえるかわから ないけどがんばりましょうね。", "ko": "어머, 이제 가야 하는 모양이야. 탄지로 군, 다음에 또 살아서 만날 수 있을지 모르겠지만 힘내자."}, {"t": "01:50:55", "jp": "あなたは上弦の鬼と戦って生き残った。これはすごい 経験よ。", "pr": "あなたはじょうげんのおにとたたかっていきのこった。これはすごい けいけんよ。", "ko": "너는 상현의 귀신과 싸워 살아남았어. 이건 굉장한 경험이야."}, {"t": "01:51:02", "jp": "今の炭治郎君は前よりももっとずっと強くなってる。甘露寺はか兄弟を 応援してるよ。", "pr": "いまのたんじろうくんはまえよりももっとずっとつよくなってる。かんろてらはかきょうだいを おうえんしてるよ。", "ko": "지금의 탄지로 군은 전보다 훨씬 더 강해졌어. 칸로지는 카마도 남매를 응원할게."}, {"t": "01:51:11", "jp": "ありがとうございます。でもまだまだです。俺は宇髄さんに勝たせてもらっただけですから。もっともっと頑張ります。鬼舞辻無惨に勝つために。", "pr": "ありがとうございます。でもまだまだです。おれはうずいさんにかたせてもらっただけですから。もっともっとがんばります。おにまいつじむざんにかつために。", "ko": "감사합니다. 하지만 아직 멀었어요. 저는 우즈이 씨 덕분에 이긴 것뿐이니까요. 더욱더 힘내겠습니다. 키부츠지 무잔에게 이기기 위해."}, {"t": "01:51:25", "jp": "ん？この里には強くなるための秘密の武器があるらしいの。探してみてね。", "pr": "ん？このさとにはつよくなるためのひみつのぶきがあるらしいの。さがしてみてね。", "ko": "응? 이 마을에는 강해지기 위한 비밀 무기가 있는 모양이야. 찾아봐."}, {"t": "01:51:35", "jp": "じゃあね。うわ、甘露寺さんの言ってた武器って何だろうな。", "pr": "じゃあね。うわ、かんろてらさんのいってたぶきってなんだろうな。", "ko": "그럼 안녕. 우와, 칸로지 씨가 말한 무기란 게 뭘까."}, {"t": "01:51:47", "jp": "おい、やめろって言ってるだろ。終わった。いい修行になったよ。", "pr": "おい、やめろっていってるだろ。おわった。いいしゅぎょうになったよ。", "ko": "이봐, 그만하라고 했잖아. 끝났다. 좋은 수련이 됐어."}, {"t": "01:51:54", "jp": "は、あ。あ、あの人は霞柱、時透無一郎。柱がところで何を?", "pr": "は、あ。あ、あのにんはかすみはしら、ときとうるむいちろう。はしらがところでなにを?", "ko": "하, 아. 아, 저 사람은 하주(안개의 기둥), 토키토 무이치로. 기둥이 이런 데서 뭘?"}, {"t": "01:52:11", "jp": "俺の刀折れちゃったからこの刀もらっていくね。", "pr": "おれのかたなおれちゃったからこのかたなもらっていくね。", "ko": "내 칼이 부러져 버려서 이 칼 받아 갈게."}, {"t": "01:52:16", "jp": "ま、待って。持っていかないで。それも大切なものなんだ。", "pr": "ま、まって。もっていかないで。それもたいせつなものなんだ。", "ko": "자, 잠깐. 가져가지 마. 그것도 소중한 거야."}, {"t": "01:52:21", "jp": "頭が悪い子みたいだね。君がそうやってくだらないことを言ってる間に何人死ぬと思っているわけ？柱の邪魔をするっていうのはそういうことだよ。", "pr": "あたまがわるいこみたいだね。くんがそうやってくだらないことをいってるまになんにんしぬとおもっているわけ？はしらのじゃまをするっていうのはそういうことだよ。", "ko": "머리 나쁜 아이 같네. 네가 그렇게 시시한 말을 하는 동안 몇 명이 죽는다고 생각하는 거야? 기둥을 방해한다는 건 그런 거야."}, {"t": "01:52:33", "jp": "柱の時間と君たちの時間は全く価値が違う。刀鍛冶は戦えない。人の命を救えない。武器を作るしか脳がないから。何？", "pr": "はしらのじかんとくんたちのじかんはまったくかちがちがう。かたなかじはたたかえない。にんのいのちをすくえない。ぶきをつくるしかのうがないから。なに？", "ko": "기둥의 시간과 너희의 시간은 전혀 가치가 달라. 도공은 싸울 수 없어. 사람의 목숨을 구할 수 없어. 무기를 만드는 재주밖에 없으니까. 뭐?"}, {"t": "01:52:46", "jp": "何かこう、すごく嫌なんだろう？配慮かな？配慮が欠けていて残酷です。", "pr": "なにかこう、すごくいやなんだろう？はいりょかな？はいりょがかけていてざんこくです。", "ko": "뭔가 이렇게, 굉장히 싫지? 배려려나? 배려가 부족하고 잔혹합니다."}, {"t": "01:52:59", "jp": "この程度が残酷？君、正しいです。あなたの言ってることは概ね正しいん だろうけど、間違ってないんだろうけど、刀鍛冶は重要で大事な仕事です。", "pr": "このていどがざんこく？くん、ただしいです。あなたのいってることはおおむねただしいん だろうけど、まちがってないんだろうけど、かたなかじはじゅうようでだいじなしごとです。", "ko": "이 정도가 잔혹? 너, 옳아요. 당신이 하는 말은 대체로 옳겠지만, 틀리지 않았겠지만, 도공은 중요하고 소중한 일이에요."}, {"t": "01:53:05", "jp": "剣士とは別の すごい技術を持った人たちだ。", "pr": "けんしとはべつの すごいぎじゅつをもったにんたちだ。", "ko": "검사와는 다른 굉장한 기술을 가진 사람들이에요."}, {"t": "01:53:13", "jp": "だって実際、刀を打ってもらえなかったら俺たち何も できないですよね。", "pr": "だってじっさい、かたなをうってもらえなかったらおれたちなにも できないですよね。", "ko": "실제로 칼을 벼려 주지 않으면 우리는 아무것도 할 수 없잖아요."}, {"t": "01:53:19", "jp": "剣士と刀はお互いがお互いを必要としています。戦うのはどちら も同じです。", "pr": "けんしとかたなはおたがいがおたがいをひつようとしています。たたかうのはどちら もおなじです。", "ko": "검사와 칼은 서로가 서로를 필요로 하고 있어요. 싸우는 것은 어느 쪽도 똑같아요."}, {"t": "01:53:25", "jp": "俺たちはそれぞれの場所で日々戦って。悪いけどない話に付き合ってる暇ないんだよね。お 柱の人は刀を持っていってしまいました。", "pr": "おれたちはそれぞれのばしょでひびたたかって。わるいけどないはなしにつきあってるひまないんだよね。お はしらのにんはかたなをもっていってしまいました。", "ko": "우리는 각자의 자리에서 매일 싸우고. 미안하지만 시시한 이야기에 어울릴 틈은 없어. (이렇게) 기둥인 사람은 칼을 가져가 버렸습니다."}, {"t": "01:53:43", "jp": "そうか。ごめん。役に立てなくて。", "pr": "そうか。ごめん。やくにたてなくて。", "ko": "그런가. 미안. 도움이 못 돼서."}, {"t": "01:53:52", "jp": "いえ、そんな、嬉しかったです。身の程知らずの俺をかばって。", "pr": "いえ、そんな、うれしかったです。みのほどしらずのおれをかばって。", "ko": "아뇨, 그런, 기뻤어요. 분수도 모르는 저를 감싸 줘서."}, {"t": "01:53:59", "jp": "俺にできることがあれば手伝うよ。この人形を直すんだよね。", "pr": "おれにできることがあればてつだうよ。このにんぎょうをなおすんだよね。", "ko": "내가 할 수 있는 게 있으면 도울게. 이 인형을 고치는 거지?"}, {"t": "01:54:06", "jp": "無理だよ。このからくりは俺の祖先が作ったもので、俺の腕ではとても。", "pr": "むりだよ。このからくりはおれのそせんがつくったもので、おれのうでではとても。", "ko": "무리야. 이 꼭두각시 장치는 내 선조가 만든 거라서 내 솜씨로는 도저히."}, {"t": "01:54:13", "jp": "でもやってみなければわからないよ。それに今できなくても、いつかは。", "pr": "でもやってみなければわからないよ。それにいまできなくても、いつかは。", "ko": "그래도 해 보지 않으면 모르잖아. 게다가 지금 못 해도, 언젠가는."}, {"t": "01:54:19", "jp": "ならないよ。どんなに成長しても俺ではこれほど精巧なからくりには手を入れられないよ。自分で自分がダメなやつだってわかるもん。俺の代で俺のせいで全部終わりだよ。", "pr": "ならないよ。どんなにせいちょうしてもおれではこれほどせいこうなからくりにはてをいれられないよ。じぶんでじぶんがだめなやつだってわかるもん。おれのだいでおれのせいでぜんぶおわりだよ。", "ko": "안 돼. 아무리 성장해도 나로서는 이렇게 정교한 장치에는 손을 댈 수 없어. 스스로 내가 안 되는 놈이란 걸 알겠는걸. 내 대(代)에서 나 때문에 전부 끝이야."}, {"t": "01:54:36", "jp": "投げやりになってはいけない。自分のことをそんな風に言わないでほしい。自分にできなくても必ず他の誰かが引き継いでくれる。次につなぐための努力をしなきゃならない。", "pr": "なげやりになってはいけない。じぶんのことをそんなかぜにいわないでほしい。じぶんにできなくてもかならずほかのだれかがひきついでくれる。つぎにつなぐためのどりょくをしなきゃならない。", "ko": "자포자기해서는 안 돼. 자신을 그렇게 말하지 말아 줘. 자신이 못 해도 반드시 다른 누군가가 이어받아 줘. 다음으로 잇기 위한 노력을 해야 해."}, {"t": "01:54:49", "jp": "俺は鬼舞辻無惨を倒したいと思っているけれど、志半ばで死ぬかもしれない。", "pr": "おれはおにまいつじむざんをたおしたいとおもっているけれど、こころざしなかばでしぬかもしれない。", "ko": "나는 키부츠지 무잔을 쓰러뜨리고 싶지만, 뜻을 이루지 못한 채 죽을지도 몰라."}, {"t": "01:54:55", "jp": "でも必ず誰かがやり遂げてくれると信じてる。俺たちが継いでもらった命で上弦の 鬼を倒したように。", "pr": "でもかならずだれかがやりとげてくれるとしんじてる。おれたちがついでもらったいのちでじょうげんの おにをたおしたように。", "ko": "하지만 반드시 누군가가 해낼 거라고 믿어. 우리가 이어받은 목숨으로 상현의 귀신을 쓰러뜨렸듯이."}, {"t": "01:55:02", "jp": "俺たちが継いだ命がいつか必ず鬼舞辻を倒してくれるはずだから。", "pr": "おれたちがついだいのちがいつかかならずおにまいつじをたおしてくれるはずだから。", "ko": "우리가 이어받은 목숨이 언젠가 반드시 키부츠지를 쓰러뜨려 줄 테니까."}, {"t": "01:55:09", "jp": "一緒に頑張ろう。そういえばまだ名前を名乗ってなかったね。", "pr": "いっしょにがんばろう。そういえばまだなまえをなのってなかったね。", "ko": "함께 힘내자. 그러고 보니 아직 이름을 안 밝혔네."}, {"t": "01:55:15", "jp": "俺、竈門炭治郎。君は？俺は小鉄です。小鉄君、その人形って一体何なの？", "pr": "おれ、かまどもんたんじろう。くんは？おれはこてつです。こてつくん、そのにんぎょうっていったいなになの？", "ko": "나, 카마도 탄지로. 너는? 나는 코테츠예요. 코테츠 군, 그 인형이란 거 대체 뭐야?"}, {"t": "01:55:24", "jp": "よりいち式というからくり人形です。人形の原型となったのは実在した剣士だったらしいんですけど、腕を六本にしなければその剣士の動きを再現できないほどで、人間を凌駕する力があるので戦闘訓練に利用してるんです。", "pr": "よりいちしきというからくりにんぎょうです。にんぎょうのげんけいとなったのはじつざいしたけんしだったらしいんですけど、うでをろっぽんにしなければそのけんしのうごきをさいげんできないほどで、にんげんをりょうがするちからがあるのでせんとうくんれんにりようしてるんです。", "ko": "요리이치 식이라는 꼭두각시 인형이에요. 인형의 원형이 된 건 실재했던 검사였던 모양인데, 팔을 여섯 개로 하지 않으면 그 검사의 움직임을 재현할 수 없을 정도로, 인간을 능가하는 힘이 있어서 전투 훈련에 이용하고 있어요."}, {"t": "01:55:43", "jp": "そうか。彼は訓練のためにそれを。ん、この顔どこかどこかで。", "pr": "そうか。かれはくんれんのためにそれを。ん、このかおどこかどこかで。", "ko": "그런가. 그는 훈련을 위해 그걸. 응, 이 얼굴 어디선가 어디선가."}, {"t": "01:55:53", "jp": "どうしたんですか？そ、そうか。夢だ。このからくりの顔に見覚えがあったんだけど思い出したよ。夢で見たんだ。", "pr": "どうしたんですか？そ、そうか。ゆめだ。このからくりのかおにみおぼえがあったんだけどおもいだしたよ。ゆめでみたんだ。", "ko": "무슨 일이에요? 그, 그렇군. 꿈이다. 이 장치의 얼굴이 낯익었는데 떠올랐어. 꿈에서 봤어."}, {"t": "01:56:08", "jp": "夢ですか？あ、ごめん。俺おかしいよね。いえいえ。もしかしたらそれって記憶の遺伝かもしれませんよ。うちの里ではよく言われるんです。受け継がれていくのは姿形だけではない。生き物は記憶も遺伝するって。", "pr": "ゆめですか？あ、ごめん。おれおかしいよね。いえいえ。もしかしたらそれってきおくのいでんかもしれませんよ。うちのさとではよくいわれるんです。うけつがれていくのはすがたかたちだけではない。いきものはきおくもいでんするって。", "ko": "꿈이요? 아, 미안. 나 이상하지. 아뇨 아뇨. 어쩌면 그건 기억의 유전일지도 몰라요. 우리 마을에서는 자주 하는 말이에요. 이어져 가는 건 모습 형태뿐만이 아니다. 생물은 기억도 유전한다고."}, {"t": "01:56:29", "jp": "この剣士って誰？どこで何してた人？あ、すみません。俺もあまり詳しくは。戦国の世の話なので。", "pr": "このけんしってだれ？どこでなにしてたにん？あ、すみません。おれもあまりくわしくは。せんごくのよのはなしなので。", "ko": "이 검사는 누구야? 어디서 뭘 하던 사람이야? 아, 죄송해요. 저도 별로 자세히는. 전국시대 이야기라서요."}, {"t": "01:56:38", "jp": "戦国。そんな300年以上昔なんだ。ええ、すごい技術でこれまでずっと壊れずにですが。", "pr": "せんごく。そんな300ねんいじょうむかしなんだ。ええ、すごいぎじゅつでこれまでずっとこわれずにですが。", "ko": "전국시대. 그런 300년도 더 옛날이구나. 네, 굉장한 기술로 지금까지 쭉 부서지지 않고요."}, {"t": "01:56:49", "jp": "確認しよう。まだ動くかどうか。動かない。やっぱりもうやった。動いたね。小鉄君よかった。", "pr": "かくにんしよう。まだうごくかどうか。うごかない。やっぱりもうやった。うごいたね。こてつくんよかった。", "ko": "확인하자. 아직 움직이는지 어떤지. 안 움직여. 역시 이제 못. 움직였다. 코테츠 군 다행이야."}, {"t": "01:57:05", "jp": "炭治郎さん、頑張りましょうね。", "pr": "たんじろうさん、がんばりましょうね。", "ko": "탄지로 씨, 힘내자고요."}, {"t": "01:57:10", "jp": "炭治郎さん、これで修行してあの下した顔のクソよりも絶対に強くなってくださいね。", "pr": "たんじろうさん、これでしゅぎょうしてあのくだしたかおのくそよりもぜったいにつよくなってくださいね。", "ko": "탄지로 씨, 이걸로 수련해서 그 깔보던 얼굴의 자식보다 반드시 강해지세요."}, {"t": "01:57:18", "jp": "全力で協力しますので。え、今からかな。でも刀が。大丈夫です。こんなこともあろう かと用意しているんで。", "pr": "ぜんりょくできょうりょくしますので。え、いまからかな。でもかたなが。だいじょうぶです。こんなこともあろう かとよういしているんで。", "ko": "전력으로 협력할 테니까요. 어, 지금부터인가. 그런데 칼이. 괜찮아요. 이럴 줄 알고 준비해 놨으니까요."}, {"t": "01:57:30", "jp": "随分と用意がいいんだね。炭治郎さん遅い。全然ダメ。さあ、あの昆布よりも強くなってください。なるべく早く俺のためにも。それからはただただ地獄だった。", "pr": "ずいぶんとよういがいいんだね。たんじろうさんおそい。ぜんぜんだめ。さあ、あのこんぶよりもつよくなってください。なるべくはやくおれのためにも。それからはただただじごくだった。", "ko": "꽤나 준비성이 좋네. 탄지로 씨 느려. 전혀 안 돼. 자, 그 다시마(같은 놈)보다 강해지세요. 되도록 빨리 저를 위해서라도. 그 뒤로는 그저 지옥이었다."}, {"t": "01:58:03", "jp": "小鉄君は何というか無秩序の純粋なる暴挙。", "pr": "こてつくんはなんというかむちつじょのじゅんすいなるぼうきょ。", "ko": "코테츠 군은 뭐랄까 무질서한 순수한 폭거."}, {"t": "01:58:08", "jp": "というかものすごくえぐかった。言われた通りできなかったら、ほぼ絶絶色 絶民。", "pr": "というかものすごくえぐかった。いわれたとうりできなかったら、ほぼぜつぜついろ ぜつたみ。", "ko": "랄까 엄청나게 가혹했다. 시킨 대로 못 하면 거의 절체절명(?)."}, {"t": "01:58:17", "jp": "そんな状態で俺は空く人形と打ち合うこと になった。", "pr": "そんなじょうたいでおれはあくにんぎょうとうちあうこと になった。", "ko": "그런 상태로 나는 꼭두각시 인형과 칼을 맞부딪치게 됐다."}, {"t": "01:58:23", "jp": "当然日数を経過するごとに意識は朦朧として きて、俺は危うく三途の川を渡りかけた。", "pr": "とうぜんにっすうをけいかするごとにいしきはもうろうとして きて、おれはあやうくさんずのかわをわたりかけた。", "ko": "당연히 날수가 지날수록 의식은 몽롱해져 갔고, 나는 하마터면 삼도천(저승길)을 건널 뻔했다."}, {"t": "01:58:31", "jp": "けれど不思議と感覚が研ぎ澄まされていく。", "pr": "けれどふしぎとかんかくがとぎすまされていく。", "ko": "하지만 신기하게도 감각이 갈고닦여 갔다."}, {"t": "01:58:48", "jp": "月の糸とは違う匂いがすることにこの時気づいたんだ。", "pr": "がつのいととはちがうにおいがすることにこのとききづいたんだ。", "ko": "(상대의) 실(목의 급소)과는 다른 냄새가 난다는 것을 이때 깨달았다."}, {"t": "01:58:56", "jp": "分かる。相手が次狙ってくる場所が。月の糸より早くこの匂いは来る。今の俺なら。よし。帰るか。でも壊れたら 切って。", "pr": "わかる。あいてがつぎねらってくるばしょが。がつのいとよりはやくこのにおいはくる。いまのおれなら。よし。かえるか。でもこわれたら きって。", "ko": "알겠다. 상대가 다음에 노려 오는 곳이. 목의 실보다 빨리 이 냄새는 온다. 지금의 나라면. 좋아. 돌아갈까. 그래도 부서지면 베어 줘."}, {"t": "01:59:05", "jp": "壊れてもいい。絶対俺が直すから。", "pr": "こわれてもいい。ぜったいおれがなおすから。", "ko": "부서져도 돼. 반드시 내가 고칠 테니까."}, {"t": "01:59:33", "jp": "大丈夫ですか？ごめん。借りた刀折れちゃった。", "pr": "だいじょうぶですか？ごめん。かりたかたなおれちゃった。", "ko": "괜찮아요? 미안. 빌린 칼 부러져 버렸어."}, {"t": "01:59:40", "jp": "いいんですよ、そんなの。お、うわ、なんか出た。小鉄君なんか出た。何これ？", "pr": "いいんですよ、そんなの。お、うわ、なんかでた。こてつくんなんかでた。なにこれ？", "ko": "괜찮아요, 그런 거. 어, 으악, 뭔가 나왔다. 코테츠 군 뭔가 나왔어. 뭐야 이거?"}, {"t": "01:59:58", "jp": "いやいやいや分からないです。俺も何でしょうか？これ少なくとも 300年以上前の刀ですよね。", "pr": "いやいやいやわからないです。おれもなんでしょうか？これすくなくとも 300ねんいじょうまえのかたなですよね。", "ko": "아니 아니 아니 모르겠어요. 저도 뭘까요? 이거 적어도 300년도 더 전의 칼이죠?"}], "range": "01:50:02 ~ 01:59:58"}, {"title": "챕터 13", "lines": [{"t": "02:00:04", "jp": "そうだよね。これやばいね。どうする？", "pr": "そうだよね。これやばいね。どうする？", "ko": "그러게. 이거 굉장하네. 어쩌지?"}, {"t": "02:00:13", "jp": "これ炭治郎さんもらっていいんじゃないでしょうか？もらってください。", "pr": "これたんじろうさんもらっていいんじゃないでしょうか？もらってください。", "ko": "이거 탄지로 씨가 가져도 되지 않을까요? 가지세요."}, {"t": "02:00:19", "jp": "いいの？いいの？ ちょっと抜いてみます。錆びてる？", "pr": "いいの？いいの？ ちょっとぬいてみます。さびてる？", "ko": "괜찮아? 괜찮아? 잠깐 뽑아 볼게요. 녹슬었나?"}, {"t": "02:00:32", "jp": "いや、当然ですよね。300年とか誰も手入れしてないし、知らなかったし。", "pr": "いや、とうぜんですよね。300ねんとかだれもていれしてないし、しらなかったし。", "ko": "아니, 당연하죠. 300년이나 아무도 손질 안 했고, 몰랐고."}, {"t": "02:00:40", "jp": "話は聞かせてもらった。", "pr": "はなしはきかせてもらった。", "ko": "이야기는 잘 들었다."}, {"t": "02:00:48", "jp": "うわ、誰？鋼塚さん。あとは任せろ。ちょ、ちょ、ちょ、ちょ、何を任せるの？", "pr": "うわ、だれ？こうつかさん。あとはまかせろ。ちょ、ちょ、ちょ、ちょ、なにをまかせるの？", "ko": "으악, 누구? 하가네즈카 씨. 나머지는 나에게 맡겨라. 자, 자, 자, 뭘 맡기는 거예요?"}, {"t": "02:00:59", "jp": "任せろったら任せろ。いや、だから何を任せるんですか？説明してくださいよ。", "pr": "まかせろったらまかせろ。いや、だからなにをまかせるんですか？せつめいしてくださいよ。", "ko": "맡기라면 맡겨라. 아니, 그러니까 뭘 맡기는 거예요? 설명해 주세요."}, {"t": "02:01:07", "jp": "俺に任せろと言ってるだろうが。少年たちよ。鋼塚さんの急所は脇です。", "pr": "おれにまかせろといってるだろうが。しょうねんたちよ。こうつかさんのきゅうしょはわきです。", "ko": "나에게 맡기라고 하잖느냐. 소년들이여. 하가네즈카 씨의 급소는 옆구리예요."}, {"t": "02:01:16", "jp": "ここを狙うのです。ひ、あ、か森さんご無沙汰してます。", "pr": "ここをねらうのです。ひ、あ、かもりさんごぶさたしてます。", "ko": "여기를 노리는 거예요. 히, 아, 카나모리 씨 오랜만이에요."}, {"t": "02:01:26", "jp": "お久しぶり炭治郎君。鋼塚さんを許してやってくださいね。山で修行していたんですよ。君を死なせないようもっと強い刀を作るために。素直に言わないけれどね。", "pr": "おひさしぶりたんじろうくん。こうつかさんをゆるしてやってくださいね。やまでしゅぎょうしていたんですよ。くんをしなせないようもっとつよいかたなをつくるために。すなおにいわないけれどね。", "ko": "오랜만이야 탄지로 군. 하가네즈카 씨를 용서해 줘요. 산에서 수련하고 있었어요. 너를 죽게 하지 않으려고 더 강한 칼을 만들기 위해. 솔직히 말은 안 하지만요."}, {"t": "02:01:42", "jp": "この人剣士さんに嫌われて担当外れること多かったから。バン。", "pr": "このにんけんしさんにきらわれてたんとうがいれることおおかったから。ばん。", "ko": "이 사람 검사들에게 미움받아서 담당에서 빠지는 일이 많았거든. 빵."}, {"t": "02:01:48", "jp": "あ、復活しましたね。この錆びた刀は俺が預かる。鋼塚に伝わる日輪刀研磨術で見事磨き上げて進呈しよう。それまではこの刀を使ってろ。", "pr": "あ、ふっかつしましたね。このさびたかたなはおれがあずかる。こうつかにつたわるにちりんかたなけんまじゅつでみごとみがきあげてしんていしよう。それまではこのかたなをつかってろ。", "ko": "아, 부활했네요. 이 녹슨 칼은 내가 맡아 두겠다. 하가네즈카가에 전해지는 일륜도 연마술로 멋지게 갈아 진상하지. 그때까지는 이 칼을 쓰고 있어라."}, {"t": "02:01:55", "jp": "あ、ありがとうございます。", "pr": "あ、ありがとうございます。", "ko": "아, 감사합니다."}, {"t": "02:02:10", "jp": "初めからそう言えばいいのに。信頼関係もないのに任せろってバカの 1つ覚えみたいに。", "pr": "はじめからそういえばいいのに。しんらいかんけいもないのにまかせろってばかの 1つおぼえみたいに。", "ko": "처음부터 그렇게 말하면 될 것을. 신뢰 관계도 없는데 '맡겨라'라고 바보처럼 한 가지 말만 되풀이하고."}, {"t": "02:02:16", "jp": "なんじゃこりゃ。脇キですけました。", "pr": "なんじゃこりゃ。わききですけました。", "ko": "뭐야 이거. 옆구리 닌자(?) 빠졌어."}, {"t": "02:02:37", "jp": "よ。ここを潰せば鬼狩りどもを確実に弱体化させられる。", "pr": "よ。ここをつぶせばおにかりどもをかくじつにじゃくたいかさせられる。", "ko": "자. 여기를 짓밟으면 귀신 사냥꾼들을 확실히 약화시킬 수 있다."}, {"t": "02:02:46", "jp": "急がねば。そがねば。はよはよに立てつくもどもを。森っていう刀鍛治知らない。", "pr": "いそがねば。そがねば。はよはよにたてつくもどもを。もりっていうかたなかじしらない。", "ko": "서둘러야 한다. 서둘러. 어서어서 건방진 놈들을. 카나모리라는 도공 모르나."}, {"t": "02:03:16", "jp": "だあと君、今俺の鼻つまんだ。つまんだ。反応が鈍すぎると思う。", "pr": "だあとくん、いまおれのはなつまんだ。つまんだ。はんのうがどんすぎるとおもう。", "ko": "잠깐 너, 방금 내 코 집었지. 집었어. 반응이 너무 둔하다고 생각해."}, {"t": "02:03:26", "jp": "金森さんは知ってるけどどうしたの？多分根津さんと一緒にいるんじゃないかな。", "pr": "かなもりさんはしってるけどどうしたの？たぶんねづさんといっしょにいるんじゃないかな。", "ko": "카나모리 씨는 아는데 무슨 일이야? 아마 네즈코 씨와 같이 있지 않을까."}, {"t": "02:03:33", "jp": "金森は僕の新しい刀鍛治。塚はどこにいるの？一緒に探そうか。", "pr": "かなもりはぼくのあたらしいかたなかじ。つかはどこにいるの？いっしょにさがそうか。", "ko": "카나모리는 내 새 도공. (하가네)즈카는 어디 있어? 같이 찾을까."}, {"t": "02:03:39", "jp": "なんでそんなに人を構うの？君には君のやるべきことがあるんじゃないの？人の ためにすることは結局巡り巡って自分のためにもなっているものだし、俺も行こうと 思ってたからちょうどいいんだよ。", "pr": "なんでそんなににんをかまうの？くんにはくんのやるべきことがあるんじゃないの？にんの ためにすることはけっきょくめぐりめぐってじぶんのためにもなっているものだし、おれもいこうと おもってたからちょうどいいんだよ。", "ko": "왜 그렇게 사람을 챙기는 거야? 너에게는 네가 해야 할 일이 있는 거 아니야? 남을 위해 하는 일은 결국 돌고 돌아 자신을 위한 일도 되는 거고, 나도 가려고 했으니까 마침 잘됐어."}, {"t": "02:03:52", "jp": "え？何？今何て言ったの？今。え、ちょうど いいよって。", "pr": "え？なに？いまなんていったの？いま。え、ちょうど いいよって。", "ko": "어? 뭐? 방금 뭐라고 했어? 방금. 어, 마침 잘됐다고."}, {"t": "02:04:03", "jp": "いや、そこじゃなくて、お、誰か来てます？なんだ、鬼なのか。鬼がどうしてこんなところに。目視するまで気づかなかった。", "pr": "いや、そこじゃなくて、お、だれかきてます？なんだ、おになのか。おにがどうしてこんなところに。もくしするまできづかなかった。", "ko": "아니, 그게 아니라, 어, 누가 와 있어요? 뭐야, 귀신인가. 귀신이 어째서 이런 곳에. 눈으로 볼 때까지 눈치채지 못했다."}, {"t": "02:04:13", "jp": "この感じ、上弦の呼吸。死の方切った。時と君、油断しないで。", "pr": "このかんじ、じょうげんのこきゅう。しのほうきった。ときとくん、ゆだんしないで。", "ko": "이 느낌, 상현의 호흡. 죽음의 형(型)을 쓴다. 토키토 군, 방심하지 마."}, {"t": "02:04:32", "jp": "分裂。楽しいの。さあ、存分に人間をもてあそばうぞ。なあ、関度。", "pr": "ぶんれつ。たのしいの。さあ、ぞんぶんににんげんをもてあそばうぞ。なあ、かんど。", "ko": "분열. 즐겁니. 자, 마음껏 인간을 가지고 놀자. 이봐, 한도(반텐구)."}, {"t": "02:04:54", "jp": "何も楽しくはない。わしはただひたすら腹立たしくお前と混ざっていたことも しなんだ今のは。", "pr": "なにもたのしくはない。わしはただひたすらはらだたしくおまえとまざっていたことも しなんだいまのは。", "ko": "하나도 즐겁지 않다. 나는 그저 한결같이 화가 날 뿐이고 너와 섞여 있던 것도 못마땅하다 방금 그건."}, {"t": "02:05:03", "jp": "あの場雷が走るのか。屋根誰かけや。剣やめだ。", "pr": "あのばかみなりがはしるのか。やねだれかけや。つるぎやめだ。", "ko": "저기 번개가 치는 건가. 지붕 누군가 (있다). 칼 (소리)다."}, {"t": "02:05:39", "jp": "4対2分裂。再生が早い。規則性はないか。急所は必ずあるはずだ。探せ。見極め。", "pr": "4つい2ぶんれつ。さいせいがはやい。きそくせいはないか。きゅうしょはかならずあるはずだ。さがせ。みきわめ。", "ko": "4 대 2. 분열. 재생이 빠르다. 규칙성은 없나. 급소는 반드시 있을 거다. 찾아라. 간파해라."}, {"t": "02:05:49", "jp": "悲しいほど弱い。きや。かなり飛ばされた。早く戻らなければ。", "pr": "かなしいほどよわい。きや。かなりとばされた。はやくもどらなければ。", "ko": "슬프도록 약하다. 큭. 꽤 멀리 날아갔다. 빨리 돌아가야 한다."}, {"t": "02:06:09", "jp": "鬼と子供。刀かとして技術も未熟なはず。助ける優先順位は低い。", "pr": "おにとこども。かたなかとしてぎじゅつもみじゅくなはず。たすけるゆうせんじゅんいはひくい。", "ko": "귀신과 아이. 도공으로서 기술도 미숙할 거다. 구할 우선순위는 낮다."}, {"t": "02:06:18", "jp": "人のためにすることは巡り巡って自分のために。邪魔になるからさっさと逃げてくれない？", "pr": "にんのためにすることはめぐりめぐってじぶんのために。じゃまになるからさっさとにげてくれない？", "ko": "남을 위해 하는 일은 돌고 돌아 자신을 위해. 방해되니까 어서 도망쳐 주지 않을래?"}, {"t": "02:06:37", "jp": "怖かった。うわ、昆布頭とか言って悪かったよ。", "pr": "こわかった。うわ、こんぶあたまとかいってわるかったよ。", "ko": "무서웠어. 으악, 다시마 머리라고 해서 미안했어."}, {"t": "02:06:56", "jp": "昆布頭って僕のこと？すみません。嫌いだったんです。", "pr": "こんぶあたまってぼくのこと？すみません。きらいだったんです。", "ko": "다시마 머리란 거 나를 말하는 거야? 죄송해요. 싫었거든요."}, {"t": "02:07:04", "jp": "こんなことしてる場合じゃないや。僕はもう行くからあにして。", "pr": "こんなことしてるばあいじゃないや。ぼくはもういくからあにして。", "ko": "이러고 있을 때가 아니야. 나는 이만 갈 테니까 (혼자) 알아서 해."}, {"t": "02:07:09", "jp": "待って。か森さんたちも襲われてるんです。どうか助けてください。お願いします。", "pr": "まって。かもりさんたちもおそわれてるんです。どうかたすけてください。おねがいします。", "ko": "기다려요. 카나모리 씨 일행도 습격당하고 있어요. 부디 구해 주세요. 부탁드립니다."}, {"t": "02:07:17", "jp": "いや、僕は君は必ず自分を取り戻せる。失った記憶は必ず戻る。心配ない。些細な事柄が始まりとなり君の頭の中の霞みを鮮やかに晴らしてくれるよ。", "pr": "いや、ぼくはくんはかならずじぶんをとりもどせる。うったきおくはかならずもどる。しんぱいない。ささいなことがらがはじまりとなりくんのあたまのなかのかすみをせんやかにはらしてくれるよ。", "ko": "아니, 나는… 너는 반드시 자신을 되찾을 수 있어. 잃어버린 기억은 반드시 돌아와. 걱정 마. 사소한 일이 시작이 되어 네 머릿속의 안개를 선명하게 걷어 줄 거야."}, {"t": "02:07:24", "jp": "どっちにいるの？え？あ、えっと、あ、あっちです。ちょ、ちょ、ちょ、ちょっと待ってくださいよ。", "pr": "どっちにいるの？え？あ、えっと、あ、あっちです。ちょ、ちょ、ちょ、ちょっとまってくださいよ。", "ko": "어느 쪽에 있어? 어? 아, 그게, 아, 저쪽이에요. 자, 자, 자, 잠깐만 기다려 주세요."}, {"t": "02:07:51", "jp": "おお、時と殿の。これはありがたい。", "pr": "おお、ときとどのの。これはありがたい。", "ko": "오, 토키토 님이. 이거 고맙군."}, {"t": "02:08:16", "jp": "金森さん、小鉄少年無事でよかった。正直もう死んでると思いましたよ。", "pr": "かなもりさん、こてつしょうねんぶじでよかった。しょうじきもうしんでるとおもいましたよ。", "ko": "카나모리 씨, 코테츠 소년 무사해서 다행이에요. 솔직히 이미 죽은 줄 알았어요."}, {"t": "02:08:26", "jp": "あなたが金森という人。俺の刀用意してる。早く出して。", "pr": "あなたがかなもりというにん。おれのかたなよういしてる。はやくだして。", "ko": "당신이 카나모리라는 사람. 내 칼 준비돼 있지. 빨리 꺼내 줘."}, {"t": "02:08:31", "jp": "ほや、これはひどい箱だ。だから里に来てるんだよ。", "pr": "ほや、これはひどいはこだ。だからさとにきてるんだよ。", "ko": "이런, 이건 심한 이가 나간 (칼)이다. 그러니까 마을에 와 있는 거야."}, {"t": "02:08:39", "jp": "なるほど。なるほど。では刀をお渡ししましょう。", "pr": "なるほど。なるほど。ではかたなをおわたししましょう。", "ko": "과연. 과연. 그럼 칼을 건네 드리죠."}, {"t": "02:08:43", "jp": "随分話が早いね。炭治郎君に頼まれていたんですよ。あなたの刀のことを。そしてあなたを分かってやってほしいと。", "pr": "ずいぶんはなしがはやいね。たんじろうくんにたのまれていたんですよ。あなたのかたなのことを。そしてあなたをわかってやってほしいと。", "ko": "꽤 이야기가 빠르네. 탄지로 군에게 부탁받았거든요. 당신의 칼 일을. 그리고 당신을 이해해 줬으면 한다고."}, {"t": "02:08:54", "jp": "炭治郎が。金森さん、金森さん早く鋼塚さんのところに行かないと。", "pr": "たんじろうが。かなもりさん、かなもりさんはやくこうつかさんのところにいかないと。", "ko": "탄지로가. 카나모리 씨, 카나모리 씨 빨리 하가네즈카 씨한테 가야 해요."}, {"t": "02:09:00", "jp": "あ、そうだ。鋼塚さん。あの小屋で作業してたんです。中には時殿に渡す刀もあります。それを持ってすぐに佐藤さのところへ向かってください。", "pr": "あ、そうだ。こうつかさん。あのこやでさぎょうしてたんです。なかにはときどのにわたすかたなもあります。それをもってすぐにさとうさのところへむかってください。", "ko": "아, 맞다. 하가네즈카 씨. 저 오두막에서 작업하고 있었어요. 안에는 토키토 님에게 건넬 칼도 있어요. 그걸 가지고 바로 (피난처로) 향해 주세요."}, {"t": "02:09:13", "jp": "いや、だめだ。え、よくぞ気づいたなあ。さては貴様柱ではないか。そんなにこのアが大切そこそと何をしているのだろうな。", "pr": "いや、だめだ。え、よくぞきづいたなあ。さてはきさまはしらではないか。そんなにこのあがたいせつそこそとなにをしているのだろうな。", "ko": "아니, 안 돼. 어, 잘도 눈치챘구나. 그렇다면 네놈 기둥 아니냐. 그렇게나 이 (오두막이) 소중한가. 안에서 뭘 하고 있는 걸까."}, {"t": "02:09:28", "jp": "上限5。よくも切りましたね。私の壺を。芸術を。審美眼のない猿めが。", "pr": "じょうげん5。よくもきりましたね。わたしのつぼを。げいじゅつを。しんびがんのないさるめが。", "ko": "상현 5. 잘도 베었구나. 내 항아리를. 예술을. 심미안도 없는 원숭이 놈이."}], "range": "02:00:04 ~ 02:09:28"}, {"title": "챕터 14", "lines": [{"t": "02:10:02", "jp": "壺から壺を移動できる。なるほど。脳まで筋肉でできているような貴様らには私の作品を理解する力はないのだろう。それもまたよし。", "pr": "つぼからつぼをいどうできる。なるほど。のうまできんにくでできているようなきさまらにはわたしのさくひんをりかいするちからはないのだろう。それもまたよし。", "ko": "항아리에서 항아리로 이동할 수 있다. 과연. 뇌까지 근육으로 된 것 같은 네놈들에게는 내 작품을 이해할 힘이 없겠지. 그것도 또 좋아."}, {"t": "02:10:13", "jp": "専門張り殺し時だ。邪魔だから隠れておいて。", "pr": "せんもんはりころしときだ。じゃまだからかくれておいて。", "ko": "(기둥) 전문, 박살 낼 때다. 방해되니까 숨어 있어."}, {"t": "02:10:37", "jp": "針だらけで随分滑稽な姿ですね。どうです？毒で手足がじわじわと麻痺してきたのでは？本当に滑稽だ。つまらない命を救ってつまらない場所で命を落とす。いてもいなくても変わらないような。", "pr": "はりだらけでずいぶんこっけいなすがたですね。どうです？どくでてあしがじわじわとまひしてきたのでは？ほんとうにこっけいだ。つまらないいのちをすくってつまらないばしょでいのちをおとす。いてもいなくてもかわらないような。", "ko": "바늘투성이로 꽤나 우스꽝스러운 모습이군요. 어때요? 독으로 손발이 야금야금 마비되기 시작했지요? 정말 우스꽝스럽다. 시시한 목숨을 구하고 시시한 곳에서 목숨을 잃는다. 있으나 없으나 다를 바 없는."}, {"t": "02:11:01", "jp": "つまらねえ命なんだからよ。誰だ？思い出せない。昔、同じことを言われた気がする。誰に言われた？", "pr": "つまらねえいのちなんだからよ。だれだ？おもいだせない。むかし、おなじことをいわれたきがする。だれにいわれた？", "ko": "시시한 목숨이니까 말이야. 누구지? 떠오르지 않아. 옛날, 같은 말을 들은 것 같아. 누구한테 들었지?"}, {"t": "02:11:15", "jp": "しかし柱ですからね。一応はこれでもどんな作品にしようか胸が踊る。", "pr": "しかしはしらですからね。いちおうはこれでもどんなさくひんにしようかむねがおどる。", "ko": "그래도 기둥이니까. 일단은 이래 봬도 어떤 작품으로 만들까 가슴이 설레네."}, {"t": "02:11:25", "jp": "うるさい。血鬼術、破。だめだ。切れない。失速はおつなものだ。美しい。さて、柱は後でじっくり楽しむとして。", "pr": "うるさい。ちおにじゅつ、は。だめだ。きれない。しっそくはおつなものだ。うつくしい。さて、はしらはあとでじっくりたのしむとして。", "ko": "시끄러워. 혈귀술, 파(破). 안 돼. 안 베인다. 실속(失速)은 멋진 것이다. 아름답다. 자, 기둥은 나중에 천천히 즐기기로 하고."}, {"t": "02:11:58", "jp": "だめだ。この中には入らせない。もしかしてその手に持ったもので私をなんとかしようと。それもまた楽し。", "pr": "だめだ。このなかにはいらせない。もしかしてそのてにもったものでわたしをなんとかしようと。それもまたたのし。", "ko": "안 돼. 이 안에는 들여보내지 않겠다. 혹시 그 손에 든 걸로 나를 어떻게 해 보려고. 그것도 또 즐겁군."}, {"t": "02:12:16", "jp": "こんな暴屋を必死で守ってどうするのだ？もしやここに佐藤さんでもいるわけでは？", "pr": "こんなぼうやをひっしでまもってどうするのだ？もしやここにさとうさんでもいるわけでは？", "ko": "이런 누추한 집을 필사적으로 지켜서 뭘 하겠다는 거냐? 혹시 여기에 우부야시키라도 있는 건 아니겠지?"}, {"t": "02:12:24", "jp": "あるまじき。すごい鉄だ。すごい刀だ。なんという技術。", "pr": "あるまじき。すごいてつだ。すごいかたなだ。なんというぎじゅつ。", "ko": "있을 수 없는. 굉장한 강철이다. 굉장한 칼이다. 이 무슨 기술인가."}, {"t": "02:12:39", "jp": "おい、そこの人間。作者は誰なのだ？どのような方がこの刀を？", "pr": "おい、そこのにんげん。さくしゃはだれなのだ？どのようなほうがこのかたなを？", "ko": "어이, 거기 인간. 작자는 누구냐? 어떤 분이 이 칼을?"}, {"t": "02:12:52", "jp": "なぜ自分の名を刻まずこの一文字を。いや、わかる。わかるぞ。", "pr": "なぜじぶんのめいをきざまずこのひともじを。いや、わかる。わかるぞ。", "ko": "어째서 자기 이름을 새기지 않고 이 한 글자를. 아니, 알겠다. 알겠어."}, {"t": "02:13:04", "jp": "こいつ。なんという集中力。この技に気づかぬほどの抜刀。", "pr": "こいつ。なんというしゅうちゅうりょく。このわざにきづかぬほどのばっとう。", "ko": "이놈. 이 무슨 집중력. 이 기술을 눈치채지 못할 정도의 발도(拔刀)."}, {"t": "02:13:15", "jp": "一気に食わぬ。私とてこれほど集中したことはない。芸術家として負けている気がする。敵鬼だ。", "pr": "いっきにくわぬ。わたしとてこれほどしゅうちゅうしたことはない。げいじゅつかとしてまけているきがする。てきおにだ。", "ko": "단숨에 베질 못하겠어. 나조차 이 정도로 집중한 적은 없다. 예술가로서 지고 있는 기분이 든다. 어, 귀신이다."}, {"t": "02:13:24", "jp": "遅れてごめんなさい。", "pr": "おくれてごめんなさい。", "ko": "늦어서 죄송해요."}, {"t": "02:13:47", "jp": "おお、柱が来たぞ。みんなすぐ倒しますから。さ、動かない方がいいですよ。多分あなたは内臓が傷ついてるから。", "pr": "おお、はしらがきたぞ。みんなすぐたおしますから。さ、うごかないほうがいいですよ。たぶんあなたはないぞうがきずついてるから。", "ko": "오, 기둥이 왔다. 모두 곧 쓰러뜨릴 테니까요. 자, 움직이지 않는 게 좋아요. 아마 당신은 내장이 다쳤으니까."}, {"t": "02:14:08", "jp": "嘉路地殿の恋の球の罠。私、いたずらに人を傷つける奴にはキュンとしないの。", "pr": "かろじどののこいのたまのわな。わたし、いたずらににんをきずつけるやつにはきゅんとしないの。", "ko": "칸로지 님의 사랑(의 호흡) 구슬의 함정. 나, 함부로 사람을 다치게 하는 놈한테는 가슴이 두근(반하지) 안 해."}, {"t": "02:14:35", "jp": "てち様、大丈夫ですか？てち様、しっかり。死ぬ。空気が尽きた。自分の終わりを自分で決めたらダメだ。", "pr": "てちさま、だいじょうぶですか？てちさま、しっかり。しぬ。くうきがことごときた。じぶんのおわりをじぶんできめたらだめだ。", "ko": "텟친 님, 괜찮으세요? 텟친 님, 정신 차려요. 죽어. 공기가 다했어. 자신의 끝을 스스로 정하면 안 돼."}, {"t": "02:14:52", "jp": "君からそんなこと言われてないよ。絶対どうにかなる。諦めるな。必ず誰かが助けてくれる。", "pr": "くんからそんなこといわれてないよ。ぜったいどうにかなる。あきらめるな。かならずだれかがたすけてくれる。", "ko": "너에게 그런 말 들을 거 없어. 분명 어떻게든 돼. 포기하지 마. 반드시 누군가가 도와줄 거야."}, {"t": "02:15:02", "jp": "1人でできることなんてほんのこれっぽっちだよ。だから人は力を合わせて頑張るんだ。誰も僕を助けられない。みんな僕より弱いから。", "pr": "1にんでできることなんてほんのこれっぽっちだよ。だからにんはちからをあわせてがんばるんだ。だれもぼくをたすけられない。みんなぼくよりよわいから。", "ko": "혼자서 할 수 있는 일이란 정말 이것밖에 안 돼. 그러니까 사람은 힘을 합쳐 힘내는 거야. 아무도 나를 못 도와. 모두 나보다 약하니까."}, {"t": "02:15:17", "jp": "死なせない。時透さん頑張って。絶対出すから。俺が助けるから。", "pr": "しなせない。ときとうるさんがんばって。ぜったいだすから。おれがたすけるから。", "ko": "죽게 두지 않아. 토키토 씨 힘내요. 반드시 꺼낼 테니까. 내가 구할 테니까."}, {"t": "02:15:25", "jp": "僕が切れないのに君が切れるはずない。ダメだ。壊れない。それなら 何してる？", "pr": "ぼくがきれないのにくんがきれるはずない。だめだ。こわれない。それなら なにしてる？", "ko": "내가 못 베는데 네가 벨 수 있을 리 없어. 안 돼. 안 부서져. 그렇다면 뭘 하고 있어?"}, {"t": "02:15:38", "jp": "後ろだ。急所を刺された。死ぬ。", "pr": "うしろだ。きゅうしょをさされた。しぬ。", "ko": "뒤다. 급소를 찔렸다. 죽는다."}, {"t": "02:15:53", "jp": "僕を助けようとするな。君にできることはもう人のためにすることは巡り巡って自分のためになる。", "pr": "ぼくをたすけようとするな。くんにできることはもうにんのためにすることはめぐりめぐってじぶんのためになる。", "ko": "나를 구하려 하지 마. 네가 할 수 있는 건 이제… 남을 위해 하는 일은 돌고 돌아 자신을 위한 일이 된다."}, {"t": "02:15:57", "jp": "そして人は自分ではない誰かのために信じられないような力を出せる生き物なん だよ。", "pr": "そしてにんはじぶんではないだれかのためにしんじられないようなちからをだせるいきものなん だよ。", "ko": "그리고 사람은 자기가 아닌 누군가를 위해 믿을 수 없는 힘을 낼 수 있는 생물인 거야."}, {"t": "02:16:33", "jp": "無一郎。そうだ。思い出した。父さんのこと。母さんのこと。", "pr": "むいちろう。そうだ。おもいだした。とうさんのこと。かあさんのこと。", "ko": "무이치로. 그래. 떠올랐다. 아버지의 일. 어머니의 일."}, {"t": "02:16:51", "jp": "そして兄さんのこと。鬼に襲われたあの日、死の間際 兄さんが呟いた最後の言葉も、「無一郎の無は無限の無」なんだ。", "pr": "そしてにいさんのこと。おににおそわれたあのにち、しのまぎわ にいさんがげんいたさいごのことばも、「むいちろうのむはむげんのむ」なんだ。", "ko": "그리고 형의 일. 귀신에게 습격당한 그날, 죽음의 순간 형이 중얼거린 마지막 말도, 「무이치로의 무(無)는 무한의 무」야."}, {"t": "02:17:22", "jp": "小鉄君。バカな、バカな、バカな。片目を潰した時ですが、声も出さず研ぎ続けるとは。", "pr": "こてつくん。ばかな、ばかな、ばかな。かためをつぶしたときですが、こえもださずとぎつづけるとは。", "ko": "코테츠 군. 말도 안 돼, 말도 안 돼, 말도 안 돼. 한쪽 눈을 잃었을 때도, 소리도 내지 않고 계속 (칼을) 갈다니."}, {"t": "02:17:55", "jp": "鋼塚さん。そうだ。あいつを殺すと言えば、国綱を抜いている。", "pr": "こうつかさん。そうだ。あいつをころすといえば、くにつなをぬいている。", "ko": "하가네즈카 씨. 그래. 저놈을 죽이겠다고 하면, (이미) 쿠니츠나(칼)를 뽑아 들고 있어."}, {"t": "02:18:11", "jp": "うん。待て待て待て。なんだ、あの技。蛸壺地獄。", "pr": "うん。まてまてまて。なんだ、あのわざ。たこつぼじごく。", "ko": "응. 기다려 기다려 기다려. 뭐야, 저 기술. 문어 항아리 지옥."}, {"t": "02:18:20", "jp": "来たぞ。あ、どうだ？このタコの肉の弾力は。これは切れまい。", "pr": "きたぞ。あ、どうだ？このたこのにくのだんりょくは。これはきれまい。", "ko": "왔다. 아, 어떠냐? 이 문어 살의 탄력은. 이건 못 벨걸."}, {"t": "02:18:25", "jp": "俺のために刀を作ってくれてありがとう。金森さん。", "pr": "おれのためにかたなをつくってくれてありがとう。かなもりさん。", "ko": "나를 위해 칼을 만들어 줘서 고마워요. 카나모리 씨."}, {"t": "02:18:47", "jp": "ああ、しっくり来る。刀を変えたからと何だというのだ。どのような刀を使っても私の首は 切るよ。", "pr": "ああ、しっくりくる。かたなをかえたからとなんだというのだ。どのようなかたなをつかってもわたしのくびは きるよ。", "ko": "아아, 딱 맞아. 칼을 바꿨다고 어쨌다는 거냐. 어떤 칼을 쓰든 네 목은 벨 거야."}, {"t": "02:19:01", "jp": "お前のくだらない壺遊びにいつまでも付き合ってられないし。", "pr": "おまえのくだらないつぼあそびにいつまでもつきあってられないし。", "ko": "네 시시한 항아리 놀이에 언제까지나 어울려 줄 수 없고."}, {"t": "02:19:09", "jp": "安い挑発だな。私のこの美しさ、優雅さが理解できないのは、お前が無教養の貧乏人だからだ。", "pr": "やすいちょうはつだな。わたしのこのうつくしさ、ゆうがさがりかいできないのは、おまえがむきょうようのびんぼうにんだからだ。", "ko": "값싼 도발이군. 나의 이 아름다움, 우아함을 이해 못 하는 건, 네가 무교양한 가난뱅이라서다."}, {"t": "02:19:19", "jp": "あー、なんだ。気になっちゃって。なんかその壺、形歪んでない？左右対称に見えないよ。下手くそだな。", "pr": "あー、なんだ。きになっちゃって。なんかそのつぼ、かたちひずんでない？さゆうたいしょうにみえないよ。へたくそだな。", "ko": "아, 뭐랄까. 신경 쓰여서. 왠지 그 항아리, 모양 비뚤어지지 않았어? 좌우대칭으로 안 보여. 서툴군."}, {"t": "02:19:37", "jp": "それは貴様の目玉が腐っているからだろうが。私の壺のどこが 脱皮。", "pr": "それはきさまのめだまがくさっているからだろうが。わたしのつぼのどこが だっぴ。", "ko": "그건 네놈의 눈알이 썩었기 때문이겠지. 내 항아리의 어디가 (비뚤어졌단 거냐)."}, {"t": "02:19:45", "jp": "お前には私の真の姿を見せてやる。私が壺の中で練り上げた。この完全なる美しき姿にひれ伏すがいい。なんとか言ったらどうなんだ、このデクの坊が。", "pr": "おまえにはわたしのまことのすがたをみせてやる。わたしがつぼのなかでねりあげた。このかんぜんなるうつくしきすがたにひれふすがいい。なんとかいったらどうなんだ、このでくのぼうが。", "ko": "너에게는 내 진정한 모습을 보여 주마. 내가 항아리 속에서 갈고닦은. 이 완전무결한 아름다운 모습에 엎드려 절하는 게 좋아. 뭐라고 말 좀 해 보지 그러냐, 이 멍청한 놈아."}], "range": "02:10:02 ~ 02:19:45"}, {"title": "챕터 15", "lines": [{"t": "02:20:12", "jp": "いや、そんなびっくりもしなかったし
