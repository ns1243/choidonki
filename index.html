<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2b1820">
<title>귀멸의 칼날 일본어 학습</title>
<meta name="description" content="귀멸의 칼날로 배우는 일본어 — 챕터별 일본어 스크립트, 히라가나 발음, 한국어 번역">
<style>
:root{
  --bg:#fbf3f5; --side:#2b1820; --side2:#3a222c;
  --pink:#f48fb1; --pink-d:#a13b58; --pink-l:#f4dde4;
  --ink:#2b1820; --ink-soft:#5a4750; --pr:#b0667f;
  --card:#ffffff; --dash:#f0d0da; --shadow:rgba(161,59,88,.10);
  --side-w:268px;
  --imp:#f0a020; --imp-bg:#fff6e3;
  --que:#d65a7a; --que-bg:#fde7ee;
  --done:#3aa66a; --done-bg:#e6f6ec;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.6; -webkit-font-smoothing:antialiased;}

.sidebar{position:fixed; top:0; left:0; width:var(--side-w); height:100vh; background:var(--side);
  display:flex; flex-direction:column; z-index:100; transition:transform .28s cubic-bezier(.4,0,.2,1);}
.brand{padding:24px 24px 18px; border-bottom:1px solid var(--side2); flex-shrink:0;}
.brand .jp{font-family:"Hiragino Mincho ProN","Yu Mincho",serif; font-size:1.7rem; color:var(--pink); letter-spacing:.1em; line-height:1.2;}
.brand .en{font-size:.66rem; color:#c99aa8; letter-spacing:.28em; margin-top:7px;}
.brand .owner{font-size:.82rem; color:#e0bcc8; margin-top:10px; font-weight:500;}

.chapter-list{flex:1; overflow-y:auto; padding:10px 0 30px;}
.chapter-list::-webkit-scrollbar{width:7px;}
.chapter-list::-webkit-scrollbar-thumb{background:#5a3a44; border-radius:4px;}

.review-link{display:flex; align-items:center; gap:8px; margin:8px 16px; padding:11px 16px; cursor:pointer;
  background:linear-gradient(135deg,#5a3a44,#43262f); border:none; width:calc(100% - 32px);
  color:#ffd9e4; font-size:.86rem; font-weight:700; border-radius:12px; text-align:left; transition:.15s;}
.review-link:hover{background:linear-gradient(135deg,#6a4a54,#53363f);}
.review-link.active{background:var(--pink); color:var(--side);}
.review-link .cnt{margin-left:auto; font-size:.74rem; opacity:.85; font-family:monospace;}
.list-sep{font-size:.66rem; color:#8a6a74; letter-spacing:.15em; padding:6px 24px 4px;}

.ch-link{display:flex; align-items:flex-start; gap:10px; padding:11px 24px; font-size:.88rem; color:#e0bcc8;
  cursor:pointer; border:none; background:none; width:100%; text-align:left; transition:.15s;}
.ch-link .num{font-family:monospace; font-size:.78rem; color:#c99aa8; min-width:22px; font-weight:700; padding-top:1px;}
.ch-link .label{display:flex; flex-direction:column; gap:2px;}
.ch-link .label .nm{line-height:1.3;}
.ch-link .label .rg{font-size:.68rem; color:#a87b89; font-family:monospace; letter-spacing:.02em;}
.ch-link:hover{background:#ffffff0d; color:#fff;}
.ch-link.active{background:var(--pink); color:var(--side); font-weight:700; border-radius:0 24px 24px 0; margin-right:16px;}
.ch-link.active .num{color:var(--side);}
.ch-link.active .label .rg{color:#7a2e44;}

.topbar{display:none; position:fixed; top:0; left:0; right:0; height:56px; background:var(--side);
  align-items:center; gap:12px; padding:0 14px; padding-top:env(safe-area-inset-top);
  height:calc(56px + env(safe-area-inset-top)); z-index:90;}
.hamburger{background:none; border:none; cursor:pointer; padding:8px; display:flex; flex-direction:column; gap:5px; width:40px;}
.hamburger span{display:block; height:2.5px; background:var(--pink); border-radius:2px; transition:.25s;}
.hamburger span:nth-child(1){width:22px;} .hamburger span:nth-child(2){width:16px;} .hamburger span:nth-child(3){width:22px;}
.topbar .tb-title{font-family:serif; font-size:1.15rem; color:var(--pink); letter-spacing:.06em;}
.overlay{display:none; position:fixed; inset:0; background:rgba(20,8,12,.55); z-index:95; opacity:0; transition:opacity .28s;}

.main{margin-left:var(--side-w); padding:34px 40px 90px; max-width:920px;}
.ch-head{margin-bottom:22px;}
.ch-head h1{font-size:1.55rem; color:var(--pink-d); font-weight:800; letter-spacing:.02em;}
.ch-head h1 .range{font-size:.95rem; color:var(--pr); font-weight:600; font-family:monospace; margin-left:8px;}
.ch-head .meta{font-size:.82rem; color:#c98ba0; margin-top:6px;}

.filter-bar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;}
.filter-btn{border:1.5px solid var(--pink-l); background:#fff; color:var(--ink-soft); padding:7px 14px;
  border-radius:20px; font-size:.82rem; cursor:pointer; font-weight:600; font-family:inherit; transition:.15s;}
.filter-btn.on{background:var(--pink-d); color:#fff; border-color:var(--pink-d);}

.line{background:var(--card); border-radius:16px; padding:17px 20px 14px; margin-bottom:14px;
  box-shadow:0 3px 14px var(--shadow); border:1px solid var(--pink-l);
  animation:rise .4s ease both; position:relative; transition:border-color .2s, background .2s;}
@keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
.line.has-imp{border-left:5px solid var(--imp);}
.line.has-que{border-left:5px solid var(--que);}
.line.has-done{border-left:5px solid var(--done); background:#fcfdfc;}
.line.has-imp.has-que{border-left:5px solid var(--imp);}

.line-top{display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:11px;}
.time{display:inline-flex; align-items:center; gap:5px; font-size:.72rem; color:#fff;
  background:var(--pink); padding:4px 11px; border-radius:12px; font-weight:700; font-family:monospace;
  letter-spacing:.03em; text-decoration:none; cursor:pointer; border:none; transition:.15s;}
.time:hover{background:var(--pink-d); transform:translateY(-1px);}
.time .yt{font-size:.82rem; line-height:1;}
.chap-tag{display:inline-block; font-size:.7rem; color:var(--pr); background:var(--pink-l);
  padding:3px 9px; border-radius:10px; font-weight:600;}
.jp{font-size:1.12rem; color:var(--ink); line-height:1.7; margin-bottom:7px; font-weight:500; word-break:break-word;}
.pr{font-size:.86rem; color:var(--pr); margin-bottom:10px; line-height:1.55; word-break:break-word;}
.ko{font-size:.93rem; color:var(--ink-soft); line-height:1.6; padding-top:10px; border-top:1px dashed var(--dash); word-break:break-word;}

.marks{display:flex; gap:8px; margin-top:12px; padding-top:11px; border-top:1px dashed var(--dash);}
.mark-btn{display:inline-flex; align-items:center; gap:5px; border:1.5px solid #e8d4da; background:#fff;
  cursor:pointer; padding:5px 12px; border-radius:18px; font-size:.78rem; font-weight:600; color:#9a8088;
  font-family:inherit; transition:.15s; user-select:none;}
.mark-btn .ico{font-size:.9rem; filter:grayscale(1); opacity:.55; transition:.15s;}
.mark-btn:hover{border-color:#d8b8c2;}
.mark-btn.on .ico{filter:none; opacity:1;}
.mark-btn.imp.on{background:var(--imp-bg); border-color:var(--imp); color:#a8730a;}
.mark-btn.que.on{background:var(--que-bg); border-color:var(--que); color:#a8395a;}
.mark-btn.done.on{background:var(--done-bg); border-color:var(--done); color:#1f7a4a;}

.empty{text-align:center; color:#c98ba0; padding:60px 20px; font-size:.95rem; line-height:1.8;}
.empty .big{font-size:2.4rem; margin-bottom:12px;}

.footer{margin-top:46px; padding-top:22px; border-top:1px solid var(--pink-l);
  font-size:.78rem; color:#c98ba0; text-align:center; line-height:1.7;}
.footer a{color:var(--pink-d); text-decoration:none;}

@media(max-width:820px){
  .sidebar{transform:translateX(-100%); width:84%; max-width:320px; padding-top:env(safe-area-inset-top);}
  .sidebar.open{transform:translateX(0); box-shadow:6px 0 30px rgba(0,0,0,.4);}
  .topbar{display:flex;}
  .overlay.show{display:block; opacity:1;}
  .main{margin-left:0; padding:calc(70px + env(safe-area-inset-top)) 18px 80px; max-width:100%;}
  .ch-head h1{font-size:1.3rem;}
  .ch-head h1 .range{display:block; margin-left:0; margin-top:4px; font-size:.85rem;}
  .jp{font-size:1.06rem;}
}
@media(max-width:400px){
  .main{padding-left:14px; padding-right:14px;}
  .line{padding:15px 16px 13px;}
  .marks{gap:6px;} .mark-btn{padding:5px 9px; font-size:.74rem;}
}
</style>
</head>
<body>

<header class="topbar">
  <button class="hamburger" id="hamburger" aria-label="메뉴 열기"><span></span><span></span><span></span></button>
  <div class="tb-title">鬼滅の刃</div>
</header>
<div class="overlay" id="overlay"></div>

<nav class="sidebar" id="sidebar">
  <div class="brand">
    <div class="jp">鬼滅の刃</div>
    <div class="en">JAPANESE STUDY</div>
    <div class="owner">귀멸의 칼날 일본어 학습</div>
  </div>
  <div class="chapter-list" id="chapterList"></div>
</nav>

<main class="main" id="main"></main>

<script>
const DATA = [{"title": "챕터 01", "lines": [{"t": "00:08", "jp": "初めましてだね。鬼物事無残か。こんなことになったんだ。禰豆子死ぬなよ。", "pr": "はじめましてだね。おにものごとむざんか。こんなことになったんだ。ねずこしぬなよ。", "ko": "처음 뵙겠네. 귀신 일은 무잔인가. 이런 일이 되어 버렸구나. 네즈코, 죽지 마라."}, {"t": "00:18", "jp": "死ぬな。お兄ちゃんを降りてきたのか。", "pr": "しぬな。おにいちゃんをおりてきたのか。", "ko": "죽지 마. 오빠를 내려놓고 온 거냐."}, {"t": "00:47", "jp": "しかし家に、母と弟妹だけはまだぬくもりがある。医者に見せれば助かるかもしれない。", "pr": "しかしいえに、ははとていまいだけはまだぬくもりがある。いしゃにみせればたすかるかもしれない。", "ko": "하지만 집에 어머니와 동생들만은 아직 온기가 남아 있어. 의사에게 보이면 살 수 있을지도 몰라."}, {"t": "00:53", "jp": "亡くなった。炭治郎。誰だ？なぜ食う？", "pr": "なくなった。たんじろう。だれだ？なぜくう？", "ko": "돌아가셨어. 탄지로. 누구냐? 왜 (사람을) 먹지?"}, {"t": "01:29", "jp": "妹だ。俺の妹なんだ。俺の仕事は鬼を切ることだ。", "pr": "いもうとだ。おれのいもうとなんだ。おれのしごとはおにをきることだ。", "ko": "여동생이야. 내 여동생이라고. 내 일은 귀신을 베는 거다."}, {"t": "01:34", "jp": "どうか妹を殺さないでください。狭霧山の麓に住む鱗滝左近次という老人を尋ねろ。", "pr": "どうかいもうとをころさないでください。さぎりやまのふもとにすむうろこたきさこんつぎというろうじんをたずねろ。", "ko": "제발 여동생을 죽이지 말아 주세요. 사기리산 기슭에 사는 우로코다키 사콘지라는 노인을 찾아가라."}, {"t": "01:47", "jp": "冨岡義勇に言われてきたと言え。わかった。", "pr": "とみおかぎゆうにいわれてきたといえ。わかった。", "ko": "토미오카 기유가 보내서 왔다고 말해라. 알겠다."}, {"t": "01:59", "jp": "ではこれからお前が鬼殺隊の隊士としてふさわしいかどうかを試す。", "pr": "ではこれからおまえがおにさつたいのたいしとしてふさわしいかどうかをためす。", "ko": "그럼 지금부터 네가 귀살대의 대원으로서 합당한지 어떤지를 시험하겠다."}, {"t": "02:12", "jp": "妹はわしが責任を持って見ておく。", "pr": "いもうとはわしがせきにんをもってみておく。", "ko": "여동생은 내가 책임지고 지켜보겠다."}, {"t": "02:23", "jp": "幸せが壊れる時にはいつも血の匂いがする。", "pr": "しあわせがこわれるときにはいつもちのにおいがする。", "ko": "행복이 무너질 때는 언제나 피 냄새가 난다."}, {"t": "02:42", "jp": "覚悟が足りていない。鱗滝さんに何を教えてもらった？足を止めるな。", "pr": "かくごがたりていない。うろこたきさんになにをおしえてもらった？あしをやめるな。", "ko": "각오가 부족하다. 우로코다키 씨에게 무엇을 배웠느냐? 발을 멈추지 마라."}, {"t": "02:51", "jp": "立ち止まるな。進め。男なら、男に生まれたなら。進む以外の道などない。さあ、立て。立ち上がり。もう一度挑んで来い。", "pr": "たちとまるな。すすめ。おとこなら、おとこにうまれたなら。すすむいがいのみちなどない。さあ、たて。たちあがり。もういちどちょうんでこい。", "ko": "멈춰 서지 마라. 나아가라. 사내라면, 사내로 태어났다면. 나아가는 것 말고 다른 길은 없다. 자, 일어서라. 일어나서. 다시 한번 덤벼 오너라."}, {"t": "03:05", "jp": "この岩を斬れたら最終選別に行くのを許可する。", "pr": "このいわをきれたらさいしゅうせんべつにいくのをきょかする。", "ko": "이 바위를 벨 수 있다면 최종 선별에 가는 것을 허락하마."}, {"t": "03:11", "jp": "岩。 お。家族を鬼に殺され、禰豆子が鬼となった あの日、幸せは突然終わった。", "pr": "いわ。 お。かぞくをおににころされ、ねずこがおにとなった あのにち、しあわせはとつぜんおわった。", "ko": "바위. 오. 가족을 귀신에게 잃고, 네즈코가 귀신이 된 그날, 행복은 갑자기 끝났다."}, {"t": "03:19", "jp": "禰豆子を人間に戻すため、鬼殺隊入隊を 目指した俺は育ての鱗滝さんに岩を切るという試練を課された。", "pr": "ねずこをにんげんにもどすため、おにさつたいにゅうたいを めざしたおれはそだてのうろこたきさんにいわをきるというしれんをかされた。", "ko": "네즈코를 인간으로 되돌리기 위해 귀살대 입대를 목표로 한 나는 길러 준 우로코다키 씨에게 바위를 베라는 시련을 받았다."}, {"t": "03:36", "jp": "岩が切れず燻る日々。そんな時、錆兎は現れ 稽古をつけてくれた。", "pr": "いわがきれずいぶるひび。そんなとき、さびうさぎはあらわれ けいこをつけてくれた。", "ko": "바위를 베지 못하고 애태우던 나날. 그런 때 사비토가 나타나 수련을 봐 주었다."}, {"t": "03:42", "jp": "錆兎の太刀筋は見事で、俺は何度も何度も倒れた。でも挫けては いけない。", "pr": "さびうさぎのたちすじはみごとで、おれはなんどもなんどもたおれた。でもくじけては いけない。", "ko": "사비토의 칼솜씨는 훌륭했고, 나는 몇 번이고 몇 번이고 쓰러졌다. 하지만 꺾여서는 안 된다."}, {"t": "03:51", "jp": "前に前に進まなければ。 見えた。 木の言うも 笑みを浮かべた錆兎は目の前から消え、振り下ろした刀は大岩を切っていた。", "pr": "まえにまえにすすまなければ。 みえた。 きのいうも えみをうかべたさびうさぎはめのまえからきえ、ふりくだろしたかたなはおおいわをきっていた。", "ko": "앞으로 앞으로 나아가야 한다. 보였다. (그때) 미소를 띤 사비토는 눈앞에서 사라졌고, 내리친 칼은 큰 바위를 베어 있었다."}, {"t": "04:15", "jp": "かけがえのない経験を胸に最終選別に参加した俺は鬼の潜む藤襲山で戦い抜き、見事突破することができた。", "pr": "かけがえのないけいけんをむねにさいしゅうせんべつにさんかしたおれはおにのひそむふじがさねやまでたたかいぬき、みごととっぱすることができた。", "ko": "둘도 없는 경험을 가슴에 품고 최종 선별에 참가한 나는 귀신이 숨어 있는 후지카사네산에서 끝까지 싸워 멋지게 돌파할 수 있었다."}, {"t": "04:16", "jp": "俺はついに鬼殺隊士として認められた。", "pr": "おれはついにおにさつたいしとしてみとめられた。", "ko": "나는 마침내 귀살대원으로 인정받았다."}, {"t": "04:41", "jp": "すると早速初任務が与えられ、北西の町へと急ぐ。", "pr": "するとさっそくしょにんつとむがあたえられ、ほくせいのまちへといそぐ。", "ko": "그러자 곧바로 첫 임무가 주어져 북서쪽 마을로 서둘러 향한다."}, {"t": "04:48", "jp": "町に潜んでいた少女ばかり狙う鬼を禰豆子 と共に倒し、休む間もなく次の任務、浅草へ。", "pr": "まちにひそんでいたしょうじょばかりねらうおにをねずこ とともにたおし、やすむかんもなくつぎのにんむ、あさくさへ。", "ko": "마을에 숨어 소녀만 노리는 귀신을 네즈코와 함께 쓰러뜨리고, 쉴 틈도 없이 다음 임무지인 아사쿠사로."}, {"t": "05:00", "jp": "そこで俺は家族を殺した、忌まわしい匂いを感じ取った。鬼の鬼舞辻無惨の匂いよ。", "pr": "そこでおれはかぞくをころした、いまわしいにおいをかんじとった。おにのおにまいつじむざんのにおいよ。", "ko": "그곳에서 나는 가족을 죽인 그 꺼림칙한 냄새를 느꼈다. 귀신 키부츠지 무잔의 냄새였다."}, {"t": "05:12", "jp": "うん。鬼舞辻無惨。人に紛れ、そ知らぬ顔で生活していた無惨は、卑怯にも騒動を引き起こし俺の前から消えた。", "pr": "うん。おにまいつじむざん。にんにまぎれ、そしらぬかおでせいかつしていたむざんは、ひきょうにもそうどうをひきおこしおれのぜんからきえた。", "ko": "응. 키부츠지 무잔. 사람들 속에 섞여 시치미를 떼고 살아온 무잔은 비겁하게도 소동을 일으키고 내 앞에서 사라졌다."}, {"t": "05:27", "jp": "騒然となった場を収めたのは鬼でありながら、無惨抹殺を誓う珠世さんと愈史郎さんの2人。新しくできた頼れる繋がり。", "pr": "そうぜんとなったばをおさめたのはおにでありながら、むざんまっさつをちかうたまよさんとゆしろうさんの2にん。あたらしくできたたよれるつながり。", "ko": "소란스러워진 상황을 수습한 것은 귀신이면서도 무잔 말살을 맹세하는 타마요 씨와 유시로 씨 두 사람. 새롭게 생긴 의지할 인연."}, {"t": "05:36", "jp": "けれどそこに無惨の放った2人の鬼が現れ、俺は刀を 「くっ、では必ずこの2人から血を取ってみせますわ」の方いよな。", "pr": "けれどそこにむざんのほうっった2にんのおにがあらわれ、おれはかたなを 「くっ、ではかならずこの2にんからちをとってみせますわ」のほういよな。", "ko": "하지만 그곳에 무잔이 풀어 놓은 두 귀신이 나타나, 나는 칼을 「큭, 그럼 반드시 이 두 사람에게서 피를 받아 보이겠어요」 라고 했지."}, {"t": "05:58", "jp": "呼吸も出し尽くし、なんとか勝利を掴んだ俺は珠世さんに別れを告げて新たな任務地へと向かった。次の任務はとある屋敷に潜む鬼の討伐。", "pr": "こきゅうもだしつくし、なんとかしょうりをつかんだおれはたまよさんにわかれをつげてあらたなにんむちへとむかった。つぎのにんむはとあるやしきにひそむおにのとうばつ。", "ko": "호흡도 다 쏟아내며 가까스로 승리를 거머쥔 나는 타마요 씨에게 작별을 고하고 새로운 임무지로 향했다. 다음 임무는 어느 저택에 숨은 귀신 토벌."}, {"t": "06:19", "jp": "不思議な術を使った攻撃を仕掛けてくる鬼は強敵だった。", "pr": "ふしぎなじゅつをつかったこうげきをしかけてくるおにはきょうてきだった。", "ko": "신기한 술법을 쓰는 공격을 걸어오는 귀신은 강적이었다."}, {"t": "06:23", "jp": "けどなんとか倒すことができた。そしてこの任務で俺にとって嬉しかったのは、善逸 と伊之助に出会えたことだ。", "pr": "けどなんとかたおすことができた。そしてこのにんむでおれにとってうれしかったのは、ぜんいつ といのすけにであえたことだ。", "ko": "하지만 가까스로 쓰러뜨릴 수 있었다. 그리고 이 임무에서 나에게 기뻤던 것은 젠이츠와 이노스케를 만난 일이다."}, {"t": "06:41", "jp": "この時はまだお互いのことをよく知らなかったけど、2人 と出会えていなければ今の俺はいないと思っている。", "pr": "このときはまだおたがいのことをよくしらなかったけど、2にん とであえていなければいまのおれはいないとおもっている。", "ko": "이때는 아직 서로를 잘 몰랐지만, 두 사람을 만나지 못했다면 지금의 나는 없었을 거라 생각한다."}, {"t": "06:50", "jp": "心強い仲間だ。", "pr": "こころづよいなかまだ。", "ko": "든든한 동료다."}, {"t": "06:58", "jp": "そんな俺たちに与えられた次なる任務は、多くの隊士が行方をくらましている那多蜘蛛山。", "pr": "そんなおれたちにあたえられたつぎなるにんむは、おおくのたいしがなめがたをくらましているなたくもやま。", "ko": "그런 우리에게 주어진 다음 임무는, 많은 대원이 행방불명된 나타구모산."}, {"t": "07:13", "jp": "の調査。暗い山の中、みんなと引き離されてしまった俺は森の奥で「マ」の者の絆を口にする 子供の鬼と出会った。", "pr": "のちょうさ。くらいやまのなか、みんなとひきはなされてしまったおれはもりのおくで「ま」のもののきずなをくちにする こどものおにとであった。", "ko": "의 조사. 어두운 산속, 모두와 떨어져 버린 나는 숲속 깊은 곳에서 '가족'의 인연을 입에 담는 어린 귀신과 만났다."}, {"t": "07:23", "jp": "「お前の口にする絆は偽物だ。」 「なんて言ったの？", "pr": "「おまえのくちにするきずなはにせものだ。」 「なんていったの？", "ko": "「네가 입에 담는 인연은 가짜다.」 「뭐라고 했어?"}, {"t": "07:31", "jp": "お前今なんて言ったの？」こりゃ 前線してそう思ってた。", "pr": "おまえいまなんていったの？」こりゃ ぜんせんしてそうおもってた。", "ko": "너 지금 뭐라고 했어?」 이 녀석, 그렇게 생각하고 있는 것 같았다."}, {"t": "07:44", "jp": "けれど鬼は俺の想像より上に 刀が折られ、禰豆子も奪われた。", "pr": "けれどおにはおれのそうぞうよりうえに かたながおられ、ねずこもうばわれた。", "ko": "하지만 귀신은 내 상상보다 위였고, 칼이 부러지고 네즈코도 빼앗겼다."}, {"t": "07:54", "jp": "ナスがなくなり、死が目の前に迫ったその時、俺は父の声を聞いた。", "pr": "なすがなくなり、しがめのまえにせまったそのとき、おれはちちのこえをきいた。", "ko": "(방법이) 사라지고 죽음이 눈앞에 닥친 그때, 나는 아버지의 목소리를 들었다."}, {"t": "08:12", "jp": "「炭治郎、呼吸だ。を整えて火の神様になりきるんだ。神だ。」 「だが僕の首は糸より硬い。", "pr": "「たんじろう、こきゅうだ。をととのえてひのかみさまになりきるんだ。かみだ。」 「だがぼくのくびはいとよりかたい。", "ko": "「탄지로, 호흡이다. (호흡을) 가다듬고 불의 신이 되어라. 신이다.」 「하지만 내 목은 실보다 단단하다."}, {"t": "08:29", "jp": "切ることはできない。」 俺と禰豆子の絆は誰にも負けない。", "pr": "きることはできない。」 おれとねずこのきずなはだれにもまけない。", "ko": "벨 수는 없다.」 나와 네즈코의 인연은 누구에게도 지지 않아."}, {"t": "08:53", "jp": "父に教わった日の神楽に助けられ、そして鬼殺隊水柱の義勇さんの参戦によって事態は一転した。", "pr": "ちちにおそわったにちのかぐらにたすけられ、そしておにさつたいみずばしらのぎゆうさんのさんせんによってじたいはいってんした。", "ko": "아버지에게 배운 히노카구라에 도움을 받고, 그리고 귀살대 물의 기둥 기유 씨의 참전으로 사태는 일변했다."}, {"t": "09:01", "jp": "潜んでいた鬼は全て倒され、那田蜘蛛山での 任務は終わった。", "pr": "ひそんでいたおにはすべてたおされ、なたくもやまでの にんむはおわった。", "ko": "숨어 있던 귀신은 모두 쓰러지고, 나타구모산에서의 임무는 끝났다."}, {"t": "09:07", "jp": "先体を含め多くの仲間が傷つき亡くなった。", "pr": "せんたいをふくめおおくのなかまがきずつきなくなった。", "ko": "선배를 포함해 많은 동료가 다치고 목숨을 잃었다."}, {"t": "09:15", "jp": "聞けば善逸も伊之助も死闘を繰り広げた という。", "pr": "きけばぜんいつもいのすけもしとうをくりひろげた という。", "ko": "듣자 하니 젠이츠도 이노스케도 사투를 벌였다고 한다."}, {"t": "09:20", "jp": "善逸は鬼の毒を受けながらもその首を切り、伊之助は体が大きく硬い鬼を 相手に懸命に戦った。", "pr": "ぜんいつはおにのどくをうけながらもそのくびをきり、いのすけはからだがおおきくかたいおにを あいてにけんめいにたたかった。", "ko": "젠이츠는 귀신의 독에 당하면서도 그 목을 베었고, 이노스케는 몸집이 크고 단단한 귀신을 상대로 필사적으로 싸웠다."}, {"t": "09:30", "jp": "2人とも死力を尽くしてよく頑張った。", "pr": "2にんともしりょくをつくしてよくがんばった。", "ko": "둘 다 사력을 다해 정말 잘 버텨 주었다."}, {"t": "09:38", "jp": "生き残ってくれて本当に本当に嬉しく思う。戦いの後、意識を失っていた俺が目を覚ます とそこには並び立つ柱たちの姿があった。", "pr": "いきのこってくれてほんとうにほんとうにうれしくおもう。たたかいののち、いしきをうっていたおれがめをさます とそこにはならびたつはしらたちのすがたがあった。", "ko": "살아남아 주어서 정말 정말 기쁘게 생각한다. 싸움이 끝난 뒤, 의식을 잃었던 내가 눈을 뜨자 그곳에는 나란히 선 기둥들의 모습이 있었다."}, {"t": "09:48", "jp": "鬼殺隊を支えるまさに頼れる柱。", "pr": "おにさつたいをささえるまさにたよれるはしら。", "ko": "귀살대를 떠받치는, 그야말로 의지가 되는 기둥(주)."}, {"t": "09:59", "jp": "しかし、鬼になってしまった禰豆子を連れ、鬼殺隊士として活動をすることに対して は賛同してもらえなかった。", "pr": "しかし、おにになってしまったねずこをつれ、おにさつたいしとしてかつどうをすることにたいして はさんどうしてもらえなかった。", "ko": "하지만 귀신이 되어 버린 네즈코를 데리고 귀살대원으로 활동하는 것에 대해서는 동의를 얻지 못했다."}], "range": "00:08 ~ 09:59"}, {"title": "챕터 02", "lines": [{"t": "10:05", "jp": "隊士を束ねるお館様の発言もあって、その 場は収まったけど、これからは結果を出して認めてもらうしかない。", "pr": "たいしをたばねるおやかたさまのはつげんもあって、その ばはおさまったけど、これからはけっかをだしてみとめてもらうしかない。", "ko": "대원들을 이끄는 오야카타 님의 발언도 있어 그 자리는 수습되었지만, 앞으로는 결과를 내어 인정받는 수밖에 없다."}, {"t": "10:21", "jp": "決意新たに俺たちは柱の煉獄さんと共に無限列車に潜む鬼の討伐任務に入った。すげえ。すげえ。はええ。うまい。", "pr": "けついあらたにおれたちははしらのれんごくさんとともにむげんれつくるまにひそむおにのとうばつにんむにいっった。すげえ。すげえ。はええ。うまい。", "ko": "결의를 새로이 하고 우리는 기둥인 렌고쿠 씨와 함께 무한열차에 숨은 귀신 토벌 임무에 들어갔다. 대단해. 대단해. 빠르다. 맛있다."}, {"t": "10:25", "jp": "ん? うまい。うまいうまい。あの人が炎柱。", "pr": "ん? うまい。うまいうまい。あのにんがほのおはしら。", "ko": "응? 맛있다. 맛있어 맛있어. 저 사람이 염주(불꽃의 기둥)."}, {"t": "10:47", "jp": "あのすみません。煉獄さん。うまい。あ、もうそれはすごく分かりました。列車には夢に誘う罠が仕掛けられていた。心をもてあそぶ許しがたい所業だ。絶対に絶対に許さない。なんだろう。嫌な匂いがする。", "pr": "あのすみません。れんごくさん。うまい。あ、もうそれはすごくわかりました。れっしゃにはゆめにさそうわながしかけられていた。こころをもてあそぶゆるしがたいしょぎょうだ。ぜったいにぜったいにゆるさない。なんだろう。いやなにおいがする。", "ko": "저, 죄송합니다. 렌고쿠 씨. 맛있다. 아, 그건 정말 잘 알았습니다. 열차에는 꿈으로 유혹하는 덫이 설치되어 있었다. 마음을 농락하는 용서할 수 없는 짓이다. 절대로 절대로 용서하지 않겠다. 뭐지. 불쾌한 냄새가 난다."}, {"t": "10:56", "jp": "拝見しました。車掌さん、危険だから下がってくれ。火急の事態と判断していただきたい。その気配を隠していたのは血鬼術か。気配も探りづらかった。", "pr": "はいけんしました。しゃしょうさん、きけんだからさがってくれ。かきゅうのじたいとはんだんしていただきたい。そのけはいをかくしていたのはちおにじゅつか。けはいもさぐりづらかった。", "ko": "확인했습니다. 차장님, 위험하니 물러나 주세요. 위급한 사태로 판단해 주셨으면 합니다. 그 기척을 숨기고 있던 게 혈귀술인가. 기척도 살피기 어려웠다."}, {"t": "11:27", "jp": "しかし、罪なき人に牙を向こうものならば煉獄の 赤き遠炎が前を骨まで焼き尽くすの知ら 夢を見ながら死ねるなんて幸せだよね。", "pr": "しかし、つみなきにんにきばをむこうものならばれんごくの あかきえんほのおがまえをほねまでやきつくすのしら ゆめをみながらしねるなんてしあわせだよね。", "ko": "하지만 죄 없는 사람에게 이빨을 들이댄다면 렌고쿠의 붉은 열염이 너를 뼈까지 태워 없애리라. 꿈을 꾸면서 죽을 수 있다니 행복하지."}, {"t": "12:27", "jp": "さあ、俺の手ごたち行っておいで。しておりたちの心を壊してくるんだ。", "pr": "さあ、おれのてごたちいっておいで。しておりたちのこころをこわしてくるんだ。", "ko": "자, 내 부하들아, 가거라. 그리고 저들의 마음을 부수고 와라."}, {"t": "12:35", "jp": "見つけた。精神の核術に落ちている間は体を動かすことができないはずなのに。", "pr": "みつけた。せいしんのかくじゅつにおちているかんはからだをうごかすことができないはずなのに。", "ko": "찾았다. 정신의 핵, 술법에 빠져 있는 동안에는 몸을 움직일 수 없을 텐데."}, {"t": "12:51", "jp": "ん？ラスやれ。やるんだ。夢の中の死が現実の目覚めにつながる。つまり切るのは自分の首だ。煉獄さん。", "pr": "ん？らすやれ。やるんだ。ゆめのなかのしがげんじつのめざめにつながる。つまりきるのはじぶんのくびだ。れんごくさん。", "ko": "응? 자, 해라. 하는 거다. 꿈속의 죽음이 현실의 깨어남으로 이어진다. 즉 베는 것은 자기 자신의 목이다. 렌고쿠 씨."}, {"t": "13:11", "jp": "禰豆子頼む。縄を燃やしてくれ。", "pr": "ねずこたのむ。なわをもやしてくれ。", "ko": "네즈코, 부탁해. 밧줄을 태워 줘."}, {"t": "13:43", "jp": "おはよう。まだ寝ててよかったのに。こいつがせっかくいい夢を見せてやっていたでしょ。お前の家族みんな残殺する夢を見せることもできたんだよ。", "pr": "おはよう。まだねててよかったのに。こいつがせっかくいいゆめをみせてやっていたでしょ。おまえのかぞくみんなざんさつするゆめをみせることもできたんだよ。", "ko": "잘 잤어. 더 자고 있어도 좋았을 텐데. 이 녀석이 모처럼 좋은 꿈을 보여 주고 있었잖아. 네 가족 모두가 참살당하는 꿈을 보여 줄 수도 있었어."}, {"t": "14:02", "jp": "俺の家族を侮辱するな。手応えがほとんどない。もしこれも夢か。", "pr": "おれのかぞくをぶじょくするな。てごたえがほとんどない。もしこれもゆめか。", "ko": "내 가족을 모욕하지 마. 거의 베인 느낌이 없다. 혹시 이것도 꿈인가."}, {"t": "14:18", "jp": "死なない。首を切ったのにどうして死なないのか教えて欲しいよね。それがもう本体ではなくなっていたからだよ。", "pr": "しなない。くびをきったのにどうしてしなないのかおしえてほしいよね。それがもうほんたいではなくなっていたからだよ。", "ko": "죽지 않아. 목을 베었는데 어째서 죽지 않는지 알고 싶겠지. 그건 이미 본체가 아니게 되었기 때문이야."}, {"t": "14:29", "jp": "今喋っているこれもそうさ。頭の形をしているだけで頭じゃない。君がすやすやと 眠っている間に俺はこの記者と融合した。", "pr": "いましゃべっているこれもそうさ。あたまのかたちをしているだけであたまじゃない。くんがすやすやと ねむっているまにおれはこのきしゃとゆうごうした。", "ko": "지금 말하고 있는 이것도 그래. 머리 모양을 하고 있을 뿐 머리가 아니야. 네가 새근새근 자고 있는 동안 나는 이 열차와 융합했어."}, {"t": "14:38", "jp": "この列車の全てが俺の血であり、肉であり 、骨となった。", "pr": "このれっしゃのすべてがおれのちであり、にくであり 、ほねとなった。", "ko": "이 열차의 모든 것이 내 피이고, 살이고, 뼈가 되었다."}, {"t": "14:49", "jp": "その顔。いいね。いいね。分かってきたかな?つまりこの汽車の乗客200人が俺の体をさらに強化するための餌。そして人質。", "pr": "そのかお。いいね。いいね。わかってきたかな?つまりこのきしゃのじょうきゃく200にんがおれのからだをさらにきょうかするためのえさ。そしてひとじち。", "ko": "그 표정. 좋네. 좋아. 알아챘나? 즉 이 기차의 승객 200명이 내 몸을 더욱 강화하기 위한 먹이. 그리고 인질이야."}, {"t": "15:06", "jp": "守りきれるか、君は1人で。 雷の呼吸、壱ノ型、霹靂一閃。", "pr": "まもりきれるか、くんは1にんで。 かみなりのこきゅう、いちのかた、へきれきいっせん。", "ko": "지킬 수 있을까, 너 혼자서. 우레의 호흡, 제1형, 벽력일섬."}, {"t": "15:30", "jp": "ちゃんは俺が守る。守るか、少年。手短に話す。この汽車は 8両編成だ。", "pr": "ちゃんはおれがまもる。まもるか、しょうねん。てみじかにはなす。このきしゃは 8りょうへんせいだ。", "ko": "(여동생)은 내가 지킨다. 지킬 수 있겠나, 소년. 짧게 말하지. 이 기차는 8량 편성이다."}, {"t": "15:51", "jp": "俺は後方5両を守る。残りの 3両は黄色い少年とカマドが守る。", "pr": "おれはこうほう5りょうをまもる。のこりの 3りょうはきいろいしょうねんとかまどがまもる。", "ko": "나는 후방 5량을 지킨다. 나머지 3량은 노란 소년(젠이츠)과 카마도(탄지로)가 지킨다."}, {"t": "15:55", "jp": "君と伊之助少年はその 3両の状態に注意しつつ、鬼の首を探せ。", "pr": "くんといのすけしょうねんはその 3りょうのじょうたいにちゅういしつつ、おにのくびをさがせ。", "ko": "너와 이노스케 소년은 그 3량의 상태에 주의하면서 귀신의 목을 찾아라."}, {"t": "16:05", "jp": "殺鬼に首を切るため、全員が懸命に走って戦い、そしてついに隠された鬼の首を視界 に捉えた。", "pr": "さつおににくびをきるため、ぜんいんがけんめいにはしってたたかい、そしてついにかくされたおにのくびをしかい にとらえた。", "ko": "귀신의 목을 베기 위해 전원이 필사적으로 달리고 싸워, 마침내 숨겨진 귀신의 목을 시야에 포착했다."}, {"t": "16:13", "jp": "この一撃で骨を断ち切る神の刃。やめた。ひどいあり様だった。", "pr": "このいちげきでほねをたちきるかみのは。やめた。ひどいありさまだった。", "ko": "이 일격으로 뼈를 끊어 내는 신의 칼날. 그만뒀다. 처참한 꼴이었다."}, {"t": "16:42", "jp": "えい。おい、大丈夫か?炭治郎、しっかりしろ。お、俺はすぐ動けそうにない。他の人を助けてくれ。頼む。", "pr": "えい。おい、だいじょうぶか?たんじろう、しっかりしろ。お、おれはすぐうごけそうにない。ほかのにんをたすけてくれ。たのむ。", "ko": "에이. 어이, 괜찮아? 탄지로, 정신 차려. 나, 나는 당장은 움직일 수 없을 것 같아. 다른 사람을 도와줘. 부탁해."}, {"t": "16:56", "jp": "言ってやるよ。親分だからな。子分の頼みだからな。", "pr": "いってやるよ。おやぶんだからな。こぶんのたのみだからな。", "ko": "말해 주지. 두목이니까. 부하의 부탁이니까."}, {"t": "17:05", "jp": "全集中の常駐ができているようだな。感心、感心。", "pr": "ぜんしゅうなかのじょうちゅうができているようだな。かんしん、かんしん。", "ko": "전집중 상주가 되어 가고 있는 모양이군. 감탄, 감탄."}, {"t": "17:07", "jp": "煉獄さん、上弦は柱への第一歩だからな。柱までは 1万歩あるかもしれないがな。", "pr": "れんごくさん、じょうげんははしらへのだいいっぽだからな。はしらまでは 1まんぽあるかもしれないがな。", "ko": "렌고쿠 씨, 상현은 기둥으로 가는 첫걸음이니까. 기둥까지는 만 걸음이 남았을지도 모르지만."}, {"t": "17:15", "jp": "終わった。あとは傷を癒し、次の任務に備えるだけ。そう思っていた。", "pr": "おわった。あとはきずをいやし、つぎのにんむにそなえるだけ。そうおもっていた。", "ko": "끝났다. 이제 상처를 치유하고 다음 임무에 대비할 뿐. 그렇게 생각하고 있었다."}, {"t": "17:27", "jp": "君はもう無理せず。どうして今ここ？なぜ強いものから狙うのか。理解の邪魔になるかと思った。俺とお前の 君と俺は何の話をする？", "pr": "くんはもうむりせず。どうしていまここ？なぜつよいものからねらうのか。りかいのじゃまになるかとおもった。おれとおまえの くんとおれはなんのはなしをする？", "ko": "너는 이제 무리하지 마. 어째서 지금 여기에? 왜 강한 자부터 노리는가. 이해에 방해가 될까 싶었다. 나와 너, 너와 나는 무슨 이야기를 하지?"}, {"t": "18:05", "jp": "初対面。俺はすでに君のことが嫌いだ。", "pr": "しょたいめん。おれはすでにくんのことがきらいだ。", "ko": "첫 대면. 나는 이미 네가 싫다."}, {"t": "18:12", "jp": "俺も弱い人間が大嫌いだ。弱者の虫唾が走る。", "pr": "おれもよわいにんげんがだいきらいだ。じゃくしゃのむしずがはしる。", "ko": "나도 약한 인간이 아주 싫다. 약자는 소름이 끼친다."}, {"t": "18:22", "jp": "俺と君とでは物事の価値基準が違うようだ。では素晴らしい案にならない。", "pr": "おれとくんとではものごとのかちきじゅんがちがうようだ。ではすばらしいあんにならない。", "ko": "나와 너는 사물의 가치 기준이 다른 모양이군. 그럼 좋은 안이 되지 않겠어."}, {"t": "18:33", "jp": "破壊。いい刀だ。再生が早い。この圧迫感と凄まじい危機。これが上弦。", "pr": "はかい。いいかたなだ。さいせいがはやい。このあっぱくかんとすさまじいきき。これがじょうげん。", "ko": "파괴. 좋은 칼이다. 재생이 빠르다. 이 압박감과 엄청난 위기. 이것이 상현."}, {"t": "18:43", "jp": "お前の強さ、柱だな。その闘気、練り上げられている。至高の領域に近い。", "pr": "おまえのつよさ、はしらだな。そのとうき、ねりあげられている。しこうのりょういきにちかい。", "ko": "네 강함, 기둥이로군. 그 투기, 잘 단련되어 있다. 지고의 경지에 가깝다."}, {"t": "18:49", "jp": "俺は炎柱、煉獄杏寿郎だ。俺は杏寿郎。なぜお前が至高の領域に踏み入れないのか教えてやろう。人間だから老いるからだ。死ぬからだ。鬼になろう、杏寿郎。", "pr": "おれはほのおはしら、れんごくあんずとしおだ。おれはあんずとしお。なぜおまえがしこうのりょういきにふみいれないのかおしえてやろう。にんげんだからおいるからだ。しぬからだ。おにになろう、あんずとしお。", "ko": "나는 불꽃의 기둥, 렌고쿠 쿄주로다. 나는 쿄주로. 왜 네가 지고의 경지에 발을 들이지 못하는지 알려 주지. 인간이라서, 늙기 때문이다. 죽기 때문이다. 귀신이 되자, 쿄주로."}, {"t": "19:13", "jp": "そうすれば100年でも200年でも鍛錬し続けられる。強くなれる。", "pr": "そうすれば100ねんでも200ねんでもたんれんしつづけられる。つよくなれる。", "ko": "그러면 100년이든 200년이든 계속 단련할 수 있어. 강해질 수 있어."}, {"t": "19:20", "jp": "老いることも死ぬことも、人間という儚い生き物の美しさだ。強さというものは肉体に対してのみ使う言葉ではない。この少年は弱くない。侮辱するな。何度でも言おう。君と俺とでは価値基準が違う。俺は如何なる理由があろうとも鬼にならない。", "pr": "おいることもしぬことも、にんげんというはかないいきもののうつくしさだ。つよさというものはにくたいにたいしてのみつかうことばではない。このしょうねんはよわくない。ぶじょくするな。なんどでもいおう。くんとおれとではかちきじゅんがちがう。おれはいかなるりゆうがあろうともおににならない。", "ko": "늙는 것도 죽는 것도, 인간이라는 덧없는 생명체의 아름다움이다. 강함이란 것은 육체에 대해서만 쓰는 말이 아니다. 이 소년은 약하지 않다. 모욕하지 마라. 몇 번이고 말하지. 너와 나는 가치 기준이 다르다. 나는 어떤 이유가 있더라도 귀신이 되지 않는다."}, {"t": "19:34", "jp": "そうか。鬼にならないなら殺す。今まで 殺してきた柱たちに炎はいなかったな。", "pr": "そうか。おににならないならころす。いままで ころしてきたはしらたちにほのおはいなかったな。", "ko": "그런가. 귀신이 되지 않는다면 죽이겠다. 지금까지 죽여 온 기둥들 중에 불꽃(염주)은 없었군."}, {"t": "19:49", "jp": "そして俺の使うものもいなかった。なぜ だろうな。", "pr": "そしておれのつかうものもいなかった。なぜ だろうな。", "ko": "그리고 내가 (수하로) 부리는 자도 없었지. 어째서일까."}, {"t": "19:56", "jp": "同じくの道を極めるものとして理解しかねる。選ばれたもの、鬼にはなら ないというのに。", "pr": "おなじくのみちをきわめるものとしてりかいしかねる。えらばれたもの、おににはなら ないというのに。", "ko": "같은 길을 끝까지 파고드는 자로서 이해하기 어렵군. 선택받은 자, 귀신은 되지 않겠다고 하니."}], "range": "10:05 ~ 19:56"}, {"title": "챕터 03", "lines": [{"t": "20:04", "jp": "で多くの面積を根こそぎきる。炎の呼吸。素晴らしいぞ。本当にお前は素晴らしい。", "pr": "でおおくのめんせきをねこそぎきる。ほのおのこきゅう。すばらしいぞ。ほんとうにおまえはすばらしい。", "ko": "넓은 면적을 송두리째 벤다. 불꽃의 호흡. 훌륭하구나. 정말 너는 훌륭하다."}, {"t": "20:17", "jp": "賞賛に値する。の型連続識天破 う、杏寿郎。", "pr": "しょうさんにあたいする。のかたれんぞくしきてんは う、あんずとしお。", "ko": "찬사를 받을 만하다. (불꽃의 호흡 오의의) 형, 연속 식천파. 으, 쿄주로."}, {"t": "20:58", "jp": "母はもう長く生きられません。", "pr": "はははもうながくいきられません。", "ko": "어머니는 이제 오래 살지 못합니다."}, {"t": "21:59", "jp": "強く優しい子の母になれて幸せでした。刀を振るうのか。", "pr": "つよくやさしいこのははになれてしあわせでした。かたなをふるうのか。", "ko": "강하고 다정한 아이의 어머니가 되어 행복했어요. 칼을 휘두를 거니?"}, {"t": "22:12", "jp": "母、俺の方、あなたのような人に産んでもらえて光栄だった。う 信じられない力だ。", "pr": "はは、おれのほう、あなたのようなにんにうんでもらえてこうえいだった。う しんじられないちからだ。", "ko": "어머니, 저는, 당신 같은 분에게서 태어날 수 있어 영광이었습니다. 으, 믿을 수 없는 힘이다."}, {"t": "22:22", "jp": "みぞおちに俺の右腕が貫通しているんだぞ。しまった。夜明けが近い。早く殺してここを去らなければ。", "pr": "みぞおちにおれのみぎうでがかんつうしているんだぞ。しまった。よあけがちかい。はやくころしてここをさらなければ。", "ko": "명치에 내 오른팔이 관통하고 있는데도. 큰일이군. 새벽이 가깝다. 빨리 죽이고 이곳을 떠나야 한다."}, {"t": "22:31", "jp": "逃がせない。逃がさなければ鬼の首を。夜明けよ開ける。ここには陽光がさす。逃げなければ、逃げなければ。", "pr": "にがせない。にがさなければおにのくびを。よあけよひらける。ここにはようこうがさす。にげなければ、にげなければ。", "ko": "놓칠 수 없다. 놓치지 말고 귀신의 목을. 새벽이 밝아 온다. 여기에는 햇빛이 든다. 도망쳐야 한다, 도망쳐야 한다."}, {"t": "22:46", "jp": "絶対にさん。俺の首を切り落とすまでは。", "pr": "ぜったいにさん。おれのくびをきりおとすまでは。", "ko": "절대로 안 돼. 내 목을 베어 떨어뜨리기 전까지는."}, {"t": "23:02", "jp": "どけ。どけ。動け。戦国団のために動け。炎の呼吸。いざというときだ。うっ。", "pr": "どけ。どけ。うごけ。せんごくだんのためにうごけ。ほのおのこきゅう。いざというときだ。うっ。", "ko": "비켜. 비켜. 움직여라. (싸우기 위해) 움직여라. 불꽃의 호흡. 지금이 바로 그때다. 윽."}, {"t": "23:11", "jp": "早く太陽から距離を。逃げるな。卑怯者、逃げるな。", "pr": "はやくたいようからきょりを。にげるな。ひきょうもの、にげるな。", "ko": "빨리 태양에서 거리를. 도망치지 마라. 비겁한 놈, 도망치지 마라."}, {"t": "23:49", "jp": "何を言ってるんだ、あのガキは。脳みそが頭に詰まってないのか？俺はお前らから逃げてるんじゃない。太陽から逃げてるんだ。", "pr": "なにをいってるんだ、あのがきは。のうみそがあたまにつまってないのか？おれはおまえらからにげてるんじゃない。たいようからにげてるんだ。", "ko": "뭐라는 거야, 저 꼬맹이는. 머리에 뇌가 들어 있지 않은 건가? 나는 너희들에게서 도망치는 게 아니야. 태양에서 도망치는 거야."}, {"t": "23:59", "jp": "それにもう勝負はついているだろうが。あいつは間もなく力尽きて死ぬ。", "pr": "それにもうしょうぶはついているだろうが。あいつはかんもなくちからつきてしぬ。", "ko": "게다가 이미 승부는 났잖아. 저놈은 곧 힘이 다해 죽는다."}, {"t": "24:07", "jp": "いつだって鬼殺隊はお前らに有利な夜の闇の中で戦っているんだ。生身の人間がだ。傷だって 簡単には塞がらない。", "pr": "いつだっておにさつたいはおまえらにゆうりなよるのやみのなかでたたかっているんだ。なまみのにんげんがだ。きずだって かんたんにはふさがらない。", "ko": "언제나 귀살대는 너희에게 유리한 밤의 어둠 속에서 싸우고 있어. 맨몸의 인간이 말이야. 상처도 쉽게 아물지 않아."}, {"t": "24:15", "jp": "失った手足が戻る こともない。", "pr": "うったてあしがもどる こともない。", "ko": "잃은 팔다리가 돌아오는 일도 없어."}, {"t": "24:19", "jp": "逃げるな、バカ野郎。バカ野郎。", "pr": "にげるな、ばかやろう。ばかやろう。", "ko": "도망치지 마, 이 바보 자식아. 바보 자식아."}, {"t": "24:26", "jp": "お前なんかより煉獄さんの方がずっとすごいんだ。強いんだ。煉獄さんは負けて ない。", "pr": "おまえなんかよりれんごくさんのほうがずっとすごいんだ。つよいんだ。れんごくさんはまけて ない。", "ko": "너 따위보다 렌고쿠 씨가 훨씬 대단해. 강해. 렌고쿠 씨는 지지 않았어."}, {"t": "24:34", "jp": "誰も死なせなかった。戦い抜いた。守り抜いた。お前の負けだ。煉獄さんの 勝ちだ。", "pr": "だれもしなせなかった。たたかいぬいた。まもりぬいた。おまえのまけだ。れんごくさんの かちだ。", "ko": "아무도 죽게 하지 않았어. 끝까지 싸웠어. 끝까지 지켜 냈어. 네 패배야. 렌고쿠 씨의 승리다."}, {"t": "24:44", "jp": "ああ。ああ、こっちにおいで。", "pr": "ああ。ああ、こっちにおいで。", "ko": "아아. 아아, 이리 오렴."}, {"t": "25:10", "jp": "最後に少し話をしよう。俺はもうすぐに死ぬ。喋れるうちに喋ってしまうから聞いてくれ。", "pr": "さいごにすこしはなしをしよう。おれはもうすぐにしぬ。しゃべれるうちにしゃべってしまうからきいてくれ。", "ko": "마지막으로 조금 이야기를 하자. 나는 이제 곧 죽는다. 말할 수 있을 때 말해 둘 테니 들어 다오."}, {"t": "25:25", "jp": "弟の千寿郎には自分の心のまま正しいと思う道を進むよう伝えてほしい。父には体を大切にしてほしいと。", "pr": "おとうとのちずろうにはじぶんのこころのままただしいとおもうみちをすすむようつたえてほしい。ちちにはからだをたいせつにしてほしいと。", "ko": "동생 센주로에게는 자기 마음대로 옳다고 생각하는 길을 나아가라고 전해 주었으면 한다. 아버지께는 몸을 소중히 하시라고."}, {"t": "25:40", "jp": "それから、竈門少年。俺は君の妹を信じる。鬼殺隊の一員として認める。汽車の中であの少女が血を流しながら人間を守るのを見た。", "pr": "それから、かまどもんしょうねん。おれはくんのいもうとをしんじる。おにさつたいのいちいんとしてみとめる。きしゃのなかであのしょうじょがちをながしながらにんげんをまもるのをみた。", "ko": "그리고, 카마도 소년. 나는 네 여동생을 믿는다. 귀살대의 일원으로 인정한다. 기차 안에서 그 소녀가 피를 흘리면서 인간을 지키는 것을 보았다."}, {"t": "25:54", "jp": "命をかけて鬼と戦い人を守るものは誰が何と言おうと鬼殺隊の一員だ。胸を張って生きろ。", "pr": "いのちをかけておにとたたかいにんをまもるものはだれがなんといおうとおにさつたいのいちいんだ。むねをはっていきろ。", "ko": "목숨을 걸고 귀신과 싸우며 사람을 지키는 자는 누가 뭐라 해도 귀살대의 일원이다. 가슴을 펴고 살아라."}, {"t": "26:09", "jp": "己の弱さや無力さにどれだけ打ちのめされようと心を燃やせ。食い縛って前を向け。君が足を止めても、うずくまっても時間の流れは止まってくれない。共に寄り添って悲しんではくれない。俺がここで死ぬことは気にするな。柱ならば後輩の盾となるのは当然だ。", "pr": "おのれのよわさやむりょくさにどれだけうちのめされようとこころをもやせ。くいしばってまえをむけ。くんがあしをとめても、うずくまってもじかんのながれはとまってくれない。ともによりそってかなしんではくれない。おれがここでしぬことはきにするな。はしらならばこうはいのたてとなるのはとうぜんだ。", "ko": "자신의 약함이나 무력함에 아무리 짓눌리더라도 마음을 불태워라. 이를 악물고 앞을 봐라. 네가 발을 멈춰도, 주저앉아도 시간의 흐름은 멈춰 주지 않는다. 함께 다가와 슬퍼해 주지도 않는다. 내가 여기서 죽는 것은 신경 쓰지 마라. 기둥이라면 후배의 방패가 되는 것은 당연하다."}, {"t": "26:24", "jp": "柱ならば誰であっても同じことをする。", "pr": "はしらならばだれであってもおなじことをする。", "ko": "기둥이라면 누구라도 같은 일을 할 거다."}, {"t": "26:53", "jp": "若い芽は摘ませない。竈門少年、嘴平少年、我妻少年。もっともっと成長しろ。そして今度は君たちが鬼殺隊を支える柱となるのだ。俺は信じる。君たちを信じる。", "pr": "わかいめはつませない。かまどもんしょうねん、くちばしたいらしょうねん、わがつましょうねん。もっともっとせいちょうしろ。そしてこんどはくんたちがおにさつたいをささえるはしらとなるのだ。おれはしんじる。くんたちをしんじる。", "ko": "어린 새싹은 꺾이게 두지 않겠다. 카마도 소년, 하시비라 소년, 아가츠마 소년. 더욱더 성장해라. 그리고 이번에는 너희가 귀살대를 떠받치는 기둥이 되는 거다. 나는 믿는다. 너희를 믿는다."}, {"t": "26:54", "jp": "母上、俺はちゃんとやれただろうか。やるべきこと、果たすべきことを全うできましたか?", "pr": "ははうえ、おれはちゃんとやれただろうか。やるべきこと、はたすべきことをまっとうできましたか?", "ko": "어머니, 저는 제대로 해냈을까요. 해야 할 일, 다해야 할 일을 완수했습니까?"}, {"t": "27:26", "jp": "立派にできましたよ。そう、200人の乗客は1人として死な なかったのか。", "pr": "りっぱにできましたよ。そう、200にんのじょうきゃくは1にんとしてしな なかったのか。", "ko": "훌륭히 해냈단다. 그래, 200명의 승객은 한 사람도 죽지 않았던 건가."}, {"t": "27:57", "jp": "杏寿郎は頑張ったんだね。", "pr": "あんずとしおはがんばったんだね。", "ko": "쿄주로는 열심히 했구나."}, {"t": "28:01", "jp": "すごい子だ。寂しくはないよ。近いうちに杏寿郎やみんなのいるあの国へ行くだろう から。", "pr": "すごいこだ。さびしくはないよ。ちかいうちにあんずとしおやみんなのいるあのくにへいくだろう から。", "ko": "대단한 아이다. 외롭지 않아. 머지않아 쿄주로와 모두가 있는 그 나라로 갈 테니까."}, {"t": "28:13", "jp": "失われた命は回避しない。二度と戻らない。なぜ命を踏みつけにする?", "pr": "うしなわれたいのちはかいひしない。にどともどらない。なぜいのちをふみつけにする?", "ko": "잃어버린 목숨은 되돌아오지 않는다. 두 번 다시 돌아오지 않는다. 어째서 목숨을 짓밟는 거지?"}, {"t": "28:36", "jp": "人間だったろ。お前も。かつては痛みや苦しみにもがいて涙を流していたはずだ。", "pr": "にんげんだったろ。おまえも。かつてはいたみやくるしみにもがいてなみだをながしていたはずだ。", "ko": "인간이었잖아. 너도. 한때는 아픔이나 괴로움에 몸부림치며 눈물을 흘렸을 거다."}, {"t": "28:47", "jp": "ごちゃごちゃごちゃごちゃうるさいわね。昔のことなんか覚えちゃいないわ。私は今 鬼なんだから関係ないわよ。", "pr": "ごちゃごちゃごちゃごちゃうるさいわね。むかしのことなんかおぼえちゃいないわ。わたしはいま おになんだからかんけいないわよ。", "ko": "이러쿵저러쿵 시끄럽네. 옛날 일 따위 기억하지 않아. 나는 지금 귀신이니까 상관없어."}, {"t": "28:54", "jp": "わかった。もういい。邪魔よ。", "pr": "わかった。もういい。じゃまよ。", "ko": "알았다. 이제 됐어. 방해야."}, {"t": "29:16", "jp": "命を何だと思っているんだ。時が来た。来るぞ。これは私を嫌悪するわ。血術やれを切れ。", "pr": "いのちをなんだとおもっているんだ。ときがきた。くるぞ。これはわたしをけんおするわ。ちじゅつやれをきれ。", "ko": "목숨을 뭐라고 생각하는 거야. 때가 왔다. 온다. 이건 나를 혐오하게 만들어. 혈귀술, 어서 (목을) 베라."}, {"t": "29:29", "jp": "無限列車での戦いの後、煉獄さんからの 言葉を伝えるため、俺はご家族の元を尋ね た。", "pr": "むげんれつくるまでのたたかいののち、れんごくさんからの ことばをつたえるため、おれはごかぞくのもとをたずね た。", "ko": "무한열차에서의 싸움 뒤, 렌고쿠 씨의 말을 전하기 위해 나는 그 가족을 찾아갔다."}], "range": "20:04 ~ 29:29"}, {"title": "챕터 04", "lines": [{"t": "30:02", "jp": "お父上とはまともに会話できなかった けれど、弟の千寿郎君には煉獄さんの最後を 伝えられた。", "pr": "おちちうえとはまともにかいわできなかった けれど、おとうとのちずろうくんにはれんごくさんのさいごを つたえられた。", "ko": "아버님과는 제대로 대화하지 못했지만, 동생 센주로 군에게는 렌고쿠 씨의 마지막을 전할 수 있었다."}, {"t": "30:10", "jp": "そして話が終わり、帰ろうとした時のことだ。", "pr": "そしてはなしがおわり、かえろうとしたときのことだ。", "ko": "그리고 이야기가 끝나, 돌아가려 할 때의 일이다."}, {"t": "30:16", "jp": "炭治郎さん、これを受け取ってください。兄の日輪刀の鍔です。", "pr": "たんじろうさん、これをうけとってください。あにのにちりんかたなのつばです。", "ko": "탄지로 씨, 이것을 받아 주세요. 형의 일륜도 코등이입니다."}, {"t": "30:17", "jp": "いただけません。こんな大切なもの。俺は 持っていて欲しいんです。あなたを守ってくれます。ありがとう。", "pr": "いただけません。こんなたいせつなもの。おれは もっていてほしいんです。あなたをまもってくれます。ありがとう。", "ko": "받을 수 없습니다. 이렇게 소중한 것을. 저는 지니고 있어 주었으면 합니다. 당신을 지켜 줄 거예요. 고마워요."}, {"t": "30:29", "jp": "千寿郎君の思いに報いるためにもっと もっと鍛えなければ。", "pr": "ちずろうくんのおもいにむくいるためにもっと もっときたえなければ。", "ko": "센주로 군의 마음에 보답하기 위해서라도 더욱더 단련해야 한다."}, {"t": "30:39", "jp": "そして俺は煉獄さん のような強い柱に必ずなる。", "pr": "そしておれはれんごくさん のようなつよいはしらにかならずなる。", "ko": "그리고 나는 렌고쿠 씨 같은 강한 기둥이 반드시 되겠다."}, {"t": "30:48", "jp": "炭治郎が日輪刀をなくして 追いかけられた時の話。", "pr": "たんじろうがにちりんかたなをなくして おいかけられたときのはなし。", "ko": "탄지로가 일륜도를 잃어버려 쫓겨 다녔을 때의 이야기."}, {"t": "30:57", "jp": "したというか、あの時は無我夢中で うんうん。 励ましてくれてるのか。ありがとな、禰豆子。でもあの時の鋼鐵塚さん本当に怖かったな。", "pr": "したというか、あのときはむがむちゅうで うんうん。 はげましてくれてるのか。ありがとな、ねずこ。でもあのときのこうてつつかさんほんとうにこわかったな。", "ko": "라고 할까, 그때는 정신없었어. 응응. 격려해 주는 거니? 고마워, 네즈코. 그래도 그때의 하가네즈카 씨 정말 무서웠지."}, {"t": "31:06", "jp": "刀をなくすとはどういう了見だ貴様。万死に値する。万死に値する。すみません。", "pr": "かたなをなくすとはどういうりょうけんだきさま。ばんしにあたいする。ばんしにあたいする。すみません。", "ko": "칼을 잃어버리다니 무슨 생각이냐 이놈. 만 번 죽어 마땅하다. 만 번 죽어 마땅하다. 죄송합니다."}, {"t": "31:23", "jp": "すみません。うわあ、もう本当にごめんなさい。う、 必ず元に戻してやるからな。", "pr": "すみません。うわあ、もうほんとうにごめんなさい。う、 かならずもとにもどしてやるからな。", "ko": "죄송합니다. 으악, 정말 죄송합니다. 으, 반드시 원래대로 되돌려 줄게."}, {"t": "31:34", "jp": "そしてまた一緒に太陽の下を歩こう。", "pr": "そしてまたいっしょにたいようのしたをあるこう。", "ko": "그리고 또 함께 태양 아래를 걷자."}, {"t": "31:53", "jp": "杏寿郎を始末した俺は無惨様の元へ報告に向かった。", "pr": "あんずとしおをしまつしたおれはむざんようのもとへほうこくにむかった。", "ko": "쿄주로를 처치한 나는 무잔 님에게 보고하러 향했다."}, {"t": "31:57", "jp": "ご命令通り柱の1人は始末してまいりましたのでご安心くださいますよう。", "pr": "ごめいれいとうりはしらの1にんはしまつしてまいりましたのでごあんしんくださいますよう。", "ko": "명령하신 대로 기둥 한 명은 처치하고 왔으니 안심하시기 바랍니다."}, {"t": "32:04", "jp": "お前は何か思い違いをしているようだな、猗窩座。", "pr": "おまえはなにかおもいちがいをしているようだな、きかざ。", "ko": "너는 뭔가 착각하고 있는 모양이군, 아카자."}, {"t": "32:13", "jp": "高が柱。それを始末したから何だというのか。鬼が人間に勝つのは当然のことだろう。", "pr": "たかがはしら。それをしまつしたからなんだというのか。おにがにんげんにかつのはとうぜんのことだろう。", "ko": "고작 기둥. 그걸 처치했다고 어쨌다는 거냐. 귀신이 인간을 이기는 것은 당연한 일이지."}, {"t": "32:24", "jp": "私の望みは鬼殺隊の殲滅。1人残らず叩き殺して2度と私の視界に入らせないこと。", "pr": "わたしののぞみはおにさつたいのせんめつ。1にんのこらずたたきころして2どとわたしのしかいにいらせないこと。", "ko": "내 바람은 귀살대의 섬멸. 한 명도 남김없이 때려죽여 두 번 다시 내 시야에 들어오지 못하게 하는 것."}, {"t": "32:30", "jp": "お前は得意げに柱を殺したと報告するがあの場にはまだ3人の鬼狩りがいた。", "pr": "おまえはとくいげにはしらをころしたとほうこくするがあのばにはまだ3にんのおにかりがいた。", "ko": "너는 의기양양하게 기둥을 죽였다고 보고하지만 그 자리에는 아직 세 명의 귀신 사냥꾼이 있었다."}, {"t": "32:39", "jp": "なぜ始末してこなかった？", "pr": "なぜしまつしてこなかった？", "ko": "어째서 처치하고 오지 않았나?"}, {"t": "32:47", "jp": "お前には失望した。", "pr": "おまえにはしつぼうした。", "ko": "너에게는 실망했다."}, {"t": "32:47", "jp": "まさか柱でもない剣士から一撃を受けるとは。上弦の参も落ちたものだな。", "pr": "まさかはしらでもないけんしからいちげきをうけるとは。じょうげんのさんもおちたものだな。", "ko": "설마 기둥도 아닌 검사에게 일격을 받을 줄이야. 상현의 삼(三)도 별것 아니게 됐군."}, {"t": "32:54", "jp": "あの生意気な小僧、会った時は脳髄をぶちまけてやる。", "pr": "あのなまいきなこぞう、あったときはのうずいをぶちまけてやる。", "ko": "그 건방진 꼬마, 만나면 뇌수를 터뜨려 주겠다."}, {"t": "33:05", "jp": "蝶屋敷だ。やめてください。", "pr": "ちょうやしきだ。やめてください。", "ko": "나비 저택이다. 그만두세요."}, {"t": "33:15", "jp": "やめてください。離してください。離してください。私… うるせえな。", "pr": "やめてください。はなしてください。はなしてください。わたし… うるせえな。", "ko": "그만두세요. 놓아 주세요. 놓아 주세요. 저… 시끄럽네."}, {"t": "33:15", "jp": "黙っとけ。", "pr": "だまっとけ。", "ko": "입 다물어."}, {"t": "33:25", "jp": "女の子に何してるんだ？ 話せ。愚か者。俺は元忍びの宇髄天元様だぞ。その界隈では派手に名を馳せた男。", "pr": "おんなのこになにしてるんだ？ はなせ。おろかもの。おれはもとしのびのうずいてんげんさまだぞ。そのかいわいでははでにめいをはせたおとこ。", "ko": "여자아이에게 무슨 짓을 하는 거야? 말해라. 멍청한 놈. 나는 전직 닌자, 우즈이 텐겐 님이시다. 그 바닥에서 화려하게 이름을 떨친 남자."}, {"t": "33:39", "jp": "てめえの鼻くそみたいな頭を食らうと思うが。 葵さんたちを話せ。この人攫い目。", "pr": "てめえのはなくそみたいなあたまをくらうとおもうが。 あおいさんたちをはなせ。このにんかくいめ。", "ko": "네놈의 코딱지 같은 머리를 날려 버릴 것 같지만. 아오이 씨 일행을 풀어 줘. 이 사람 납치범 같으니."}, {"t": "33:46", "jp": "変態。変態。 てめえら、こら。俺は上官。柱だぞ。この野郎。", "pr": "へんたい。へんたい。 てめえら、こら。おれはじょうかん。はしらだぞ。このやろう。", "ko": "변태. 변태. 네놈들, 이놈. 나는 상관이다. 기둥이라고. 이 자식."}, {"t": "33:54", "jp": "お前を柱とは認めない。 むんじゃねえよ。お前が認めないから何なんだよ。この下っぱが。脳みそ爆発してんのか。", "pr": "おまえをはしらとはみとめない。 むんじゃねえよ。おまえがみとめないからなになんだよ。このしたっぱが。のうみそばくはつしてんのか。", "ko": "너를 기둥으로 인정하지 않겠다. 까불지 마. 네가 인정하지 않는다고 뭐 어쩌라는 거야. 이 졸병이. 머리가 폭발한 거냐."}, {"t": "34:06", "jp": "俺は任務で女の隊員がいるからこいつら連れて行くんだよ。", "pr": "おれはにんむでおんなのたいいんがいるからこいつらつれていくんだよ。", "ko": "나는 임무에 여자 대원이 필요해서 이 녀석들을 데려가는 거야."}, {"t": "34:10", "jp": "代わりに俺たちが行く。 今帰ったところだが俺は力があり余ってる。行ってやってもいいぜ。あ、葵ちゃんたちを話してもらおうか。", "pr": "かわりにおれたちがいく。 いまかえったところだがおれはちからがありあまってる。いってやってもいいぜ。あ、あおいちゃんたちをはなしてもらおうか。", "ko": "대신 우리가 가겠다. 방금 돌아온 참이지만 나는 힘이 남아돈다. 가 줘도 좋아. 아, 아오이 양 일행을 풀어 주시지."}, {"t": "34:34", "jp": "たとえあんたが筋肉の化け物でも俺は1歩も引かないぜ。あ、そう。じゃ、一緒に来ていただこうかね。", "pr": "たとえあんたがきんにくのばけものでもおれは1あゆもひかないぜ。あ、そう。じゃ、いっしょにきていただこうかね。", "ko": "설령 당신이 근육 괴물이라 해도 나는 한 발도 물러서지 않아. 아, 그래. 그럼 같이 와 주실까."}, {"t": "34:46", "jp": "夜明けにあっさり引き下がるな。 ただし絶対俺に逆らうなよ、お前ら。", "pr": "よあけにあっさりひきさがるな。 ただしぜったいおれにさからうなよ、おまえら。", "ko": "(상대가) 순순히 물러서는군. 단, 절대로 나에게 거역하지 마라, 너희들."}, {"t": "34:52", "jp": "で、どこ行くんだ、おっさん。 日本一色と欲にまみれたド派手な場所。", "pr": "で、どこいくんだ、おっさん。 にっぽんいちいろとよくにまみれたどはでなばしょ。", "ko": "그래서, 어디 가는 거야, 아저씨. 일본 제일로 색과 욕망에 물든 화려한 곳."}, {"t": "35:00", "jp": "鬼の住む遊郭だよ。 遊郭はこの家で準備をする。で、お前らに やってもらうことだが、遊郭に潜入してまず俺の嫁を探せ。", "pr": "おにのすむゆうかくだよ。 ゆうかくはこのいえでじゅんびをする。で、おまえらに やってもらうことだが、ゆうかくにせんにゅうしてまずおれのよめをさがせ。", "ko": "귀신이 사는 유곽이야. 유곽 (잠입은) 이 집에서 준비한다. 그래서 너희가 할 일인데, 유곽에 잠입해서 먼저 내 아내를 찾아라."}, {"t": "35:25", "jp": "話だ。 ふざけないでください。自分の個人的な嫁探しに部下を使うとは。", "pr": "はなしだ。 ふざけないでください。じぶんのこじんてきなよめさがしにぶかをつかうとは。", "ko": "이야기다. 장난치지 마세요. 자기 개인적인 아내 찾기에 부하를 쓰다니."}, {"t": "35:35", "jp": "はあ。何を勘違いしてやがる？いいや、言わせてもらおう。あんたみたいに決められないやつはモテないでしょうとも。だがしかし、鬼殺隊員である俺たちをあんた嫁が欲しいからって。", "pr": "はあ。なにをかんちがいしてやがる？いいや、いわせてもらおう。あんたみたいにきめられないやつはもてないでしょうとも。だがしかし、おにさつたいいんであるおれたちをあんたとつがほしいからって。", "ko": "하. 뭘 착각하는 거야? 아니, 말해 두겠어. 당신처럼 결단을 못 내리는 녀석은 인기 없을 거라고. 그렇지만, 귀살대원인 우리를 당신 아내가 갖고 싶다고 해서."}, {"t": "35:43", "jp": "バカか、てめえ。俺の嫁が遊郭に潜入して鬼の情報収集に励んでんだよ。音信不通になったから俺も行くんだっての。", "pr": "ばかか、てめえ。おれのとつがゆうかくにせんにゅうしておにのじょうほうしゅうしゅうにはげんでんだよ。おんしんふつうになったからおれもいくんだっての。", "ko": "바보냐, 네놈. 내 아내가 유곽에 잠입해서 귀신 정보 수집에 힘쓰고 있는 거야. 소식이 끊겨서 나도 가는 거라고."}, {"t": "36:04", "jp": "そういう妄想をしてらっしゃるんでしょう、ガキが。", "pr": "そういうもうそうをしてらっしゃるんでしょう、がきが。", "ko": "그런 망상을 하고 계신 거겠죠, 꼬맹이가."}, {"t": "36:11", "jp": "これがカラス経由で届いた手紙だ。随分多いですね。", "pr": "これがからすけいゆでとどいたてがみだ。ずいぶんおおいですね。", "ko": "이게 까마귀를 통해 도착한 편지다. 꽤 많네요."}, {"t": "36:17", "jp": "3人いるからな、嫁。3人嫁。さ、さてめえなんで嫁 3人もいんだよ。", "pr": "3にんいるからな、よめ。3にんよめ。さ、さてめえなんでよめ 3にんもいんだよ。", "ko": "셋이 있으니까, 아내가. 아내 셋. 자, 잠깐 네놈 왜 아내가 셋이나 있는 거야."}, {"t": "36:29", "jp": "ざけんなよ。なんか文句あるか？あの手紙で来る時は極力目立たぬようにと何度も念押ししてあるんですが、具体的にどうするんですか？", "pr": "ざけんなよ。なんかもんくあるか？あのてがみでくるときはきょくりょくめだたぬようにとなんどもねんおししてあるんですが、ぐたいてきにどうするんですか？", "ko": "까불지 마. 뭔가 불만 있어? 그 편지로 (유곽에) 올 때는 최대한 눈에 띄지 않게 하라고 몇 번이고 다짐받았는데, 구체적으로 어떻게 하는 겁니까?"}, {"t": "36:48", "jp": "そりゃまあ変装よ。不本意だが地味にな。すでに怪しい店は3 つに絞っているからお前らはそこで俺の嫁を探して情報を得る。", "pr": "そりゃまあへんそうよ。ふほんいだがじみにな。すでにあやしいみせは3 つにしぼっているからおまえらはそこでおれのよめをさがしてじょうほうをえる。", "ko": "그야 뭐 변장이지. 본의는 아니지만 수수하게. 이미 수상한 가게는 세 곳으로 좁혀 놨으니 너희들은 거기서 내 아내를 찾아 정보를 얻어라."}, {"t": "36:55", "jp": "時屋の須磨、京極屋のまきを、荻本屋の雛鶴。おめえ、もう死んでんじゃねえの？", "pr": "ときやのすま、きょうごくやのまきを、おぎほんやのひなつる。おめえ、もうしんでんじゃねえの？", "ko": "토키야의 스마, 쿄고쿠야의 마키오, 오기모토야의 히나츠루. 너, 이미 죽은 거 아니야?"}, {"t": "37:18", "jp": "てめえは何か意見があるか？いえ、大した才能もないのに剣士などなるからだ。だから死ぬんだ。何の価値もない知り役立たずだ。", "pr": "てめえはなにかいけんがあるか？いえ、たいしたさいのうもないのにけんしなどなるからだ。だからしぬんだ。なんのかちもないしりやくたたずだ。", "ko": "네놈은 뭔가 의견이 있나? 아뇨, 대단한 재능도 없는데 검사 같은 게 되니까. 그래서 죽는 거야. 아무런 가치도 없는, 쓸모없는 놈이다."}, {"t": "37:31", "jp": "俺は鬼殺隊の。そうか、お前火の呼吸の使い手だな。", "pr": "おれはおにさつたいの。そうか、おまえひのこきゅうのつかいてだな。", "ko": "나는 귀살대의. 그런가, 너 불의 호흡 사용자로군."}, {"t": "37:43", "jp": "火の呼吸ってもしかして日の神楽のことなのか？煉獄さんの最後を家族に伝えに行った時、いきなり殴られたのは驚いたな。", "pr": "ひのこきゅうってもしかしてにちのかぐらのことなのか？れんごくさんのさいごをかぞくにつたえにいったとき、いきなりなぐられたのはおどろいたな。", "ko": "불의 호흡이라면 혹시 히노카구라를 말하는 건가? 렌고쿠 씨의 마지막을 가족에게 전하러 갔을 때, 갑자기 맞은 건 놀랐지."}, {"t": "37:44", "jp": "始まりの呼吸。一番初めに生まれた呼吸。そして全ての呼吸は火の呼吸の派生。", "pr": "はじまりのこきゅう。いちばんはじめにうまれたこきゅう。そしてすべてのこきゅうはひのこきゅうのはせい。", "ko": "시작의 호흡. 가장 처음에 생겨난 호흡. 그리고 모든 호흡은 불의 호흡의 파생이다."}, {"t": "38:06", "jp": "あの時、真次郎さんは俺を見て火の呼吸の使い手だと言った。", "pr": "あのとき、しんじろうさんはおれをみてひのこきゅうのつかいてだといった。", "ko": "그때, 신지로 씨는 나를 보고 불의 호흡 사용자라고 말했다."}, {"t": "38:19", "jp": "ありがとう、君。天国さん、俺頑張ります。今日も大凶じゃねえか。いいか。ここからは敵の巣の中だ。気合い入れやがれ。", "pr": "ありがとう、くん。てんごくさん、おれがんばります。きょうもだいきょうじゃねえか。いいか。ここからはてきのすのなかだ。きあいいれやがれ。", "ko": "고마워, 자네. 천국에 계신 분(렌고쿠), 저 열심히 하겠습니다. 오늘도 대흉(大凶)이잖아. 잘 들어라. 여기서부터는 적의 소굴 안이다. 기합 넣어라."}, {"t": "38:41", "jp": "よし。それじゃ行動開始だ。まずは時に向かう。ついてこい。", "pr": "よし。それじゃこうどうかいしだ。まずはときにむかう。ついてこい。", "ko": "좋아. 그럼 행동 개시다. 우선 토키야로 향한다. 따라와라."}, {"t": "38:49", "jp": "いや、こりゃまた物騒な子たちだね。ちょっとうちは悪いけど、 そこをなんとかお願いできないかね。", "pr": "いや、こりゃまたぶっそうなこたちだね。ちょっとうちはわるいけど、 そこをなんとかおねがいできないかね。", "ko": "이야, 이거 또 험상궂은 아이들이네. 좀 우리는 곤란하지만, 거기를 어떻게 좀 부탁할 수 없을까."}, {"t": "39:00", "jp": "女将さんに仕込んでもらえたら光ると思うんだよな。", "pr": "じょしょうさんにしこんでもらえたらひかるとおもうんだよな。", "ko": "여주인이 가르쳐 주면 빛을 볼 것 같단 말이지."}, {"t": "39:08", "jp": "はあ。ま、まあ1人くらいならいいけど。ええ、じゃ真ん中の子をもらおうかね。", "pr": "はあ。ま、まあ1にんくらいならいいけど。ええ、じゃまんなかのこをもらおうかね。", "ko": "하. 뭐, 뭐 한 명 정도라면 괜찮지만. 그래, 그럼 가운데 아이를 받을까."}, {"t": "39:18", "jp": "素直そうだし。一生懸命働きます。本当にダメだな。お前らは 2束3文でしか売れねえじゃねえか。", "pr": "すなおそうだし。いっしょうけんめいはたらきます。ほんとうにだめだな。おまえらは 2そく3ぶんでしかうれねえじゃねえか。", "ko": "순해 보이고. 열심히 일하겠습니다. 정말 못 쓰겠군. 너희들은 헐값에밖에 안 팔리잖아."}, {"t": "39:29", "jp": "まあ、あとは小本屋と京極屋か。どうやって引き取ってもらうか。", "pr": "まあ、あとはこもとやときょうごくやか。どうやってひきとってもらうか。", "ko": "자, 남은 건 오기모토야와 쿄고쿠야인가. 어떻게 받아 가게 할까."}, {"t": "39:42", "jp": "よっ。驚屋の女将さん、窓から落ちて死んじゃったんだって。最近は足抜けしていなくなる姉さんも多いしね。", "pr": "よっ。きょうやのじょしょうさん、まどからおちてしんじゃったんだって。さいきんはあしぬけしていなくなるねえさんもおおいしね。", "ko": "이야. 오도로키야(?)의 여주인, 창문에서 떨어져 죽었다고 하더라. 요즘은 도망쳐서 사라지는 언니들도 많으니까."}, {"t": "39:54", "jp": "ねえ、さっきの足抜けっていうのは何のこと？足抜けっていうのはね、借金を返さずにここから逃げることだよ。こないだって須磨おいらんが す。", "pr": "ねえ、さっきのあしぬけっていうのはなんのこと？あしぬけっていうのはね、しゃっきんをかえさずにここからにげることだよ。こないだってすまおいらんが す。", "ko": "저기, 방금 그 '발 빼기(도주)'라는 건 무슨 말이야? 발 빼기라는 건 말이야, 빚을 갚지 않고 여기서 도망치는 거야. 얼마 전에도 스마 오이란이 (그랬어)."}], "range": "30:02 ~ 39:54"}, {"title": "챕터 05", "lines": [{"t": "40:08", "jp": "宇髄さんの奥さんだ。あ、この子はうちで引き取らせてもらうよ。", "pr": "うずいさんのおくさんだ。あ、このこはうちでひきとらせてもらうよ。", "ko": "우즈이 씨의 아내다. 아, 이 아이는 우리가 데려가겠어."}, {"t": "40:16", "jp": "発射だな。こ、やだ。だけ余ってる。あの、聞きたいことがあるんですけど、須磨を抱えらんのことで、その足抜けしたというのは本当なんですか?", "pr": "はっしゃだな。こ、やだ。だけあまってる。あの、ききたいことがあるんですけど、すまをかかえらんのことで、そのあしぬけしたというのはほんとうなんですか?", "ko": "이제 됐군. 이, 싫어. (여자가) 남아 있어. 저, 묻고 싶은 게 있는데요, 스마라는 오이란 말인데요, 그 도망쳤다는 게 사실인가요?"}, {"t": "40:34", "jp": "だけど日記が見つかっていて、それには足抜けするって書いてあったそうなの。", "pr": "だけどにっきがみつかっていて、それにはあしぬけするってかいてあったそうなの。", "ko": "그런데 일기가 발견됐는데, 거기에 도망치겠다고 쓰여 있었다고 하네."}, {"t": "40:42", "jp": "どうよこれ。あ、すごい。変な風に顔塗ったくられていたけど、落としたらこうよ。", "pr": "どうよこれ。あ、すごい。へんなかぜにかおぬったくられていたけど、おとしたらこうよ。", "ko": "어때 이거. 아, 대단해. 이상하게 얼굴이 칠해져 있었는데, 지우니까 이렇잖아."}, {"t": "40:48", "jp": "でもなんか妙にこの子がっちりしてるんだけど。と、肉付きがいい子の方がいいでしょ。", "pr": "でもなんかみょうにこのこがっちりしてるんだけど。と、にくづきがいいこのほうがいいでしょ。", "ko": "그런데 왠지 묘하게 이 아이 다부진데. 음, 살집이 있는 아이 쪽이 낫잖아."}, {"t": "40:55", "jp": "行ってみるか。あら、いこちゃん静かな子ね。お前は声が太いから絶対喋るなよ。裏声もへったくそだからすぐ男だってバレるぞ。マジで。", "pr": "いってみるか。あら、いこちゃんしずかなこね。おまえはこえがふといからぜったいしゃべるなよ。うらごえもへったくそだからすぐおとこだってばれるぞ。まじで。", "ko": "가 볼까. 어머, 이 아이 조용한 아이네. 너는 목소리가 굵으니까 절대 말하지 마라. 가성도 형편없으니까 금방 남자라고 들킨다. 진짜로."}, {"t": "41:10", "jp": "どうしろってんだ。ちくしょう。さあさあ、答えてごら。ああ、そうだ。牧だ。", "pr": "どうしろってんだ。ちくしょう。さあさあ、こたえてごら。ああ、そうだ。まきだ。", "ko": "어쩌라는 거야. 젠장. 자자, 대답해 봐. 아, 그래. 마키오다."}, {"t": "41:21", "jp": "天井ぐら。おい、こら。え。ねえ、あの子よ。三味線がすごく上手なんだって。", "pr": "てんじょうぐら。おい、こら。え。ねえ、あのこよ。しゃみせんがすごくじょうずなんだって。", "ko": "천장 위. 어이, 이놈. 어. 저기, 저 아이 말이야. 샤미센을 굉장히 잘 켠대."}, {"t": "41:51", "jp": "耳がいいみたいよ。1回聞いたら写し三味線でも琴でも弾けるらしいわ。", "pr": "みみがいいみたいよ。1かいきいたらうつししゃみせんでもこんでもひけるらしいわ。", "ko": "귀가 좋은 모양이야. 한 번 들으면 샤미센이든 거문고든 (똑같이) 켤 수 있다더라."}, {"t": "41:56", "jp": "へえ。やってやる。やってやるわ。便所掃除でも何でもいいんでもらってくださいよ。いっそタダでもいいんで、こんなのは見返してやるあの男。", "pr": "へえ。やってやる。やってやるわ。べんじょそうじでもなんでもいいんでもらってくださいよ。いっそただでもいいんで、こんなのはみかえしてやるあのおとこ。", "ko": "허. 해 주겠어. 해 주고말고. 변소 청소든 뭐든 좋으니 받아 주세요. 차라리 공짜라도 좋으니, 두고 봐라 그 남자. (반드시 되갚아 주겠어.)"}, {"t": "42:16", "jp": "あ、全体吉原一なる。なんか俺自分を見失ってた。", "pr": "あ、ぜんたいよしはらいちなる。なんかおれじぶんをみうしなってた。", "ko": "아, 전부 요시와라 제일이 된다. 왠지 나 자신을 잃어버렸었어."}, {"t": "42:35", "jp": "帯がないのよ。神よいさん来た。ヒクヒクす。", "pr": "おびがないのよ。かみよいさんきた。ひくひくす。", "ko": "오비(허리띠)가 없어. 신요(?) 씨가 왔다. (몸이) 움찔움찔거려."}, {"t": "42:45", "jp": "一大事だ。女の子が泣いてる。ちょ、めちゃくちゃなんだけど。どうしたの?この部屋。ごめん、ごめんね。君を怒ったわけじゃないのよ。", "pr": "いちだいじだ。おんなのこがないてる。ちょ、めちゃくちゃなんだけど。どうしたの?このへや。ごめん、ごめんね。くんをいかったわけじゃないのよ。", "ko": "큰일이다. 여자아이가 울고 있어. 잠깐, 엉망진창인데. 무슨 일이야 이 방. 미안, 미안해. 너를 혼낸 게 아니야."}, {"t": "43:03", "jp": "あんた人の部屋で何してんの? 鬼の音だ。", "pr": "あんたにんのへやでなにしてんの? おにのおとだ。", "ko": "당신 남의 방에서 뭐 하는 거야? 귀신의 소리(기척)다."}, {"t": "43:13", "jp": "声をかけられる直前まで全く気づかなかった。こんなことある?", "pr": "こえをかけられるちょくぜんまでまったくきづかなかった。こんなことある?", "ko": "말을 걸리기 직전까지 전혀 눈치채지 못했다. 이런 일이 있나?"}, {"t": "43:19", "jp": "おい、耳が聞こえないのかい? 勝手に入ってすみません。部屋がめちゃくちゃだったし、この子が泣いていたので。", "pr": "おい、みみがきこえないのかい? かってにいっってすみません。へやがめちゃくちゃだったし、このこがないていたので。", "ko": "어이, 귀가 안 들리는 거니? 멋대로 들어와서 죄송합니다. 방이 엉망진창이었고, 이 아이가 울고 있어서요."}, {"t": "43:30", "jp": "ぶっさいだね。お前気色悪い。死んだ方がいいんじゃない? 部屋は確かにめちゃくちゃのままだね。片付けとくように言ってたんだけど。", "pr": "ぶっさいだね。おまえきしょくわるい。しんだほうがいいんじゃない? へやはたしかにめちゃくちゃのままだね。かたづけとくようにいってたんだけど。", "ko": "못생겼네. 너 기분 나빠. 죽는 게 낫지 않아? 방은 확실히 엉망진창인 채로구나. 치워 두라고 말해 뒀는데."}, {"t": "43:46", "jp": "うるさい。ギャーじゃないよ。部屋を片付けな。ごめんなさい。ごめんなさい。すぐやります。許してください。", "pr": "うるさい。ぎゃーじゃないよ。へやをかたづけな。ごめんなさい。ごめんなさい。すぐやります。ゆるしてください。", "ko": "시끄러워. 꺅 소리 낼 거 없어. 방을 치워라. 죄송합니다. 죄송합니다. 바로 하겠습니다. 용서해 주세요."}, {"t": "44:01", "jp": "何て話してください。あのガキ。この感触からすると継承だね。失神はして いるけれども受け身を取り上がった一般人じゃない。", "pr": "なんてはなしてください。あのがき。このかんしょくからするとけいしょうだね。しっしんはして いるけれどもうけみをとりあがったいっぱんじんじゃない。", "ko": "뭐라고 말해 봐, 저 꼬맹이. 이 감촉으로 보면 (호흡) 계승자로군. 실신은 했지만 낙법을 한 걸 보니 평범한 사람이 아니야."}, {"t": "44:26", "jp": "鬼殺隊なんだろう。でも柱のような実力はない。少し時間がかかったけどうまく連れて きたわね。", "pr": "おにさつたいなんだろう。でもはしらのようなじつりょくはない。すこしじかんがかかったけどうまくつれて きたわね。", "ko": "귀살대겠지. 하지만 기둥 같은 실력은 없어. 조금 시간이 걸렸지만 잘 데려왔네."}, {"t": "44:36", "jp": "どんどんいらっしゃい。みんな殺して食ってあげる。", "pr": "どんどんいらっしゃい。みんなころしてくっってあげる。", "ko": "얼마든지 오렴. 모두 죽여서 먹어 주겠어."}, {"t": "44:47", "jp": "あの夜あの方は私に会うためにわざわざ優に来てくださった。", "pr": "あのよるあのかたはわたしにあうためにわざわざゆうにきてくださった。", "ko": "그날 밤 그분은 나를 만나기 위해 일부러 유곽에 와 주셨다."}, {"t": "44:53", "jp": "調子はどうだ? 無惨。随分人間を食ったようだが以前よりもさらに力が増している。良いことだ。", "pr": "ちょうしはどうだ? むざん。ずいぶんにんげんをくっったようだがいぜんよりもさらにちからがましている。よいことだ。", "ko": "상태는 어떠냐? 무잔. 꽤 인간을 먹은 모양이지만 이전보다 더 힘이 늘었구나. 좋은 일이다."}, {"t": "45:02", "jp": "私はお前に期待しているんだ。お前は誰よりも美しい、そして強い。柱を7人葬っ た。", "pr": "わたしはおまえにきたいしているんだ。おまえはだれよりもうつくしい、そしてつよい。はしらを7にんそうっ た。", "ko": "나는 너에게 기대하고 있다. 너는 누구보다 아름답고, 그리고 강하다. 기둥을 일곱 명 장사 지냈지."}, {"t": "45:17", "jp": "これからも もっともっと強くなる、残酷になる、特別な鬼 だ。", "pr": "これからも もっともっとつよくなる、ざんこくになる、とくべつなおに だ。", "ko": "앞으로도 더욱더 강해진다, 잔혹해진다, 특별한 귀신이다."}, {"t": "45:27", "jp": "必ずよ、あの方のお望みを叶えて差し上げなければ。早く 伊之助のところへ。", "pr": "かならずよ、あのほうのおのぞみをかなえてさしあげなければ。はやく いのすけのところへ。", "ko": "반드시, 그분의 바람을 이뤄 드려야 해. 빨리 이노스케에게로."}, {"t": "45:39", "jp": "おりの子来たのね。そ、何人いるの?", "pr": "おりのたねきたのね。そ、なんにんいるの?", "ko": "(보낸) 아이가 왔구나. 그래, 몇 명이야?"}, {"t": "45:56", "jp": "1人は黄色い頭の見にくいキでしょ。 柱は来てる?もうすぐ来る?", "pr": "1にんはきいろいあたまのみにくいきでしょ。 はしらはきてる?もうすぐくる?", "ko": "한 명은 노란 머리의 못생긴 녀석이지. 기둥은 와 있어? 곧 와?"}, {"t": "46:07", "jp": "あんたは柱じゃないわね。弱そうだものね。上弦の 6。", "pr": "あんたははしらじゃないわね。よわそうだものね。じょうげんの 6。", "ko": "너는 기둥이 아니네. 약해 보이는걸. (나는) 상현의 6이야."}, {"t": "46:11", "jp": "体どうなってる?小さんの体がない。その人を話せ。", "pr": "からだどうなってる?ちいさんのからだがない。そのにんをはなせ。", "ko": "몸이 어떻게 된 거야? 작은 아이의 몸이 없어. 그 사람을 풀어 줘."}, {"t": "46:29", "jp": "誰に向かって口を聞いてんだ?お前は。 早い。見えなかった。紐がよかった。箱は壊れてない。でも次に攻撃を食らったら壊れる。禰豆子ごめん。肩がちぎれた。しって戦えない。", "pr": "だれにむかってくちをきいてんだ?おまえは。 はやい。みえなかった。ひもがよかった。はこはこわれてない。でもつぎにこうげきをくらったらこわれる。ねずこごめん。かたがちぎれた。しってたたかえない。", "ko": "누구한테 입을 놀리는 거야? 너는. 빠르다. 보이지 않았다. 끈이 좋았다. 상자는 부서지지 않았어. 하지만 다음에 공격을 당하면 부서진다. 네즈코 미안. 어깨가 찢어졌다. 통증 때문에 싸울 수 없어."}, {"t": "46:57", "jp": "箱から出るな。自分の命が危ない時以外は。 ふん。身のこなしは悪くないわね。上手に切り離したわね。恋を閉じ込めているところ。可愛いね。", "pr": "はこからでるな。じぶんのいのちがあぶないときいがいは。 ふん。みのこなしはわるくないわね。じょうずにきりはなしたわね。こいをとじこめているところ。かわいね。", "ko": "상자에서 나오지 마. 네 목숨이 위험할 때 말고는. 흥. 몸놀림은 나쁘지 않네. 잘도 떼어 냈네. 사랑하는 걸 가둬 둔 곳. 귀엽네."}, {"t": "47:24", "jp": "ブサイクだけどなんだか愛着が湧くな。お前は死にかけのネズミのようだ。ひつる。", "pr": "ぶさいくだけどなんだかあいちゃくがわくな。おまえはしにかけのねずみのようだ。ひつる。", "ko": "못생겼지만 왠지 애착이 가네. 너는 다 죽어 가는 쥐 같구나. 으."}, {"t": "47:28", "jp": "天様、私には構わずもう行ってくださいません。", "pr": "てんさま、わたしにはかまわずもういってくださいません。", "ko": "텐겐 님, 저는 신경 쓰지 마시고 어서 가 주세요."}, {"t": "47:47", "jp": "お前はもう何もしなくていい。 あんたたち何人で来たの?", "pr": "おまえはもうなにもしなくていい。 あんたたちなんにんできたの?", "ko": "너는 이제 아무것도 하지 않아도 돼. 너희들 몇 명이서 왔어?"}, {"t": "47:52", "jp": "4人? 言わない。 正直に言ったら命だけは助けてやってもいいのよ。さっきほんな少し切り合っただけであんたの刀もう箱れしてる。それを打ったのはな刀か事じゃないでしょ。", "pr": "4にん? いわない。 しょうじきにいったらいのちだけはたすけてやってもいいのよ。さっきほんなすこしきりあっただけであんたのかたなもうはこれしてる。それをうったのはなかたなかことじゃないでしょ。", "ko": "네 명? 말 안 해. 정직하게 말하면 목숨만은 살려 줄 수도 있어. 방금 아주 조금 칼을 맞부딪쳤을 뿐인데 네 칼은 벌써 이가 나갔네. 그걸 벼린 건 형편없는 도공이겠지."}, {"t": "48:11", "jp": "違う。この刀を打った人はすごい人だ。腕のいい刀なんだ。", "pr": "ちがう。このかたなをうったにんはすごいにんだ。うでのいいかたななんだ。", "ko": "아니야. 이 칼을 벼린 사람은 대단한 사람이야. 솜씨 좋은 도공이라고."}, {"t": "48:17", "jp": "じゃあなんで折れるんだよ。間抜け。 やっぱり俺は水の呼吸を使いこなせない。俺の場合、一撃の威力はどうしても日の神楽の方が強い。体に合っているんだ。でもその強力さゆえに連発ができなかった。今は違う。俺はやれるはずだ。", "pr": "じゃあなんでおれるんだよ。まぬけ。 やっぱりおれはみずのこきゅうをつかいこなせない。おれのばあい、いちげきのいりょくはどうしてもにちのかぐらのほうがつよい。からだにあっているんだ。でもそのきょうりょくさゆえにれんぱつができなかった。いまはちがう。おれはやれるはずだ。", "ko": "그럼 왜 부러지는 거야. 멍청이. 역시 나는 물의 호흡을 능숙하게 다루지 못해. 내 경우 일격의 위력은 아무래도 히노카구라 쪽이 강해. 몸에 맞는 거야. 하지만 그 강력함 때문에 연발이 안 됐어. 지금은 달라. 나는 할 수 있을 거야."}, {"t": "48:44", "jp": "燃やせ。 心を燃やせ。遅いぜ。もう日が暮れるのに気やしねえぜ。善逸のバカ野郎が。俺は動き出す。ちょっとしよ、この胸に。", "pr": "もやせ。 こころをもやせ。おそいぜ。もうにちがくれるのにきやしねえぜ。ぜんいつのばかやろうが。おれはうごきだす。ちょっとしよ、このむねに。", "ko": "불태워라. 마음을 불태워라. 늦었어. 벌써 해가 지는데 눈치도 못 채네. 젠이츠 바보 자식이. 나는 움직이기 시작한다. 잠깐, 이 가슴에."}, {"t": "49:18", "jp": "ネズミも刀だ。向き、行くぜ。鬼大初突、ここか。", "pr": "ねずみもかたなだ。むき、いくぜ。おにだいはつとつ、ここか。", "ko": "네즈코도 칼이다. 방향, 간다. 귀신 머리 일격, 여기인가."}, {"t": "49:39", "jp": "見つけたぞ。 俺は体中の関節を外せる男を止められねえ。ああ、人間からの匂いなんだこりゃ。いや、この感触。", "pr": "みつけたぞ。 おれはからだじゅうのかんせつをはずせるおとこをやめられねえ。ああ、にんげんからのにおいなんだこりゃ。いや、このかんしょく。", "ko": "찾았다. 나는 온몸의 관절을 뺄 수 있는 남자를 막을 수 없어. 아, 인간 냄새다 이거. 아니, 이 감촉."}, {"t": "49:45", "jp": "生きてる人間だ。鬼の腹巻きの中に捕まえた人間を閉じ込めるのか。それで好きな時に出して食うんだ。お、何してんだこいつ?", "pr": "いきてるにんげんだ。おにのはらまききのなかにつかまえたにんげんをとじこめるのか。それですきなときにだしてくうんだ。お、なにしてんだこいつ?", "ko": "살아 있는 인간이다. 귀신이 배의 띠 안에 붙잡은 인간을 가둬 두는 건가. 그래서 좋아할 때 꺼내서 먹는 거다. 어, 뭐 하는 거야 이놈?"}], "range": "40:08 ~ 49:45"}, {"title": "챕터 06", "lines": [{"t": "50:14", "jp": "お前が何をしてるんだよ。 よそ様の食い扶持に入りやがって覚悟はできてんだろうね。", "pr": "おまえがなにをしてるんだよ。 よそようのくいふちにいりやがってかくごはできてんだろうね。", "ko": "네가 뭐 하는 거야. 남의 식량에 손대다니 각오는 돼 있겠지."}, {"t": "50:38", "jp": "なんだこの帯装備。キモ帯装だとは。帯はうまいこと言うもんだ。", "pr": "なんだこのおびそうび。きもおびそうだとは。おびはうまいこというもんだ。", "ko": "뭐야 이 오비(띠) 장비. 징그러운 오비 장비라니. 오비 말 한번 잘하네."}, {"t": "50:49", "jp": "本当気持ち悪いです。 誰だてめえら。宇髄の妻です。", "pr": "ほんとうきもちわるいです。 だれだてめえら。うずいのつまです。", "ko": "정말 기분 나쁘네요. 누구냐 너희들. 우즈이의 아내입니다."}, {"t": "50:55", "jp": "その子も鬼殺隊。 キャーギャーギャー。騒がしい食料め。", "pr": "そのこもおにさつたい。 きゃーぎゃーぎゃー。さわがしいしょくりょうめ。", "ko": "그 아이도 귀살대. 꺅꺅꺅. 시끄러운 식량 녀석."}, {"t": "51:05", "jp": "逃しはしないよ。すぐに帯に戻してやるからね。", "pr": "のがしはしないよ。すぐにおびにもどしてやるからね。", "ko": "놓치지 않겠어. 바로 띠 안으로 돌려보내 줄 테니까."}, {"t": "51:11", "jp": "それはこっちのセリフだ。今度は逃がしやしねえ。細切れにしてやるからかかってこいや。", "pr": "それはこっちのせりふだ。こんどはにがしやしねえ。こまぎれにしてやるからかかってこいや。", "ko": "그건 이쪽 대사다. 이번엔 놓치지 않아. 잘게 썰어 줄 테니 덤벼 봐라."}, {"t": "51:19", "jp": "何か近づいてく。上か。かせて地上からここまで風穴が開いたの。", "pr": "なにかちかづいてく。うえか。かせてちじょうからここまでかざあながひらいたの。", "ko": "뭔가 다가온다. 위인가. (땅을) 파면서 지상에서 여기까지 구멍이 뚫렸어."}, {"t": "51:30", "jp": "この気配柱。天元様負けよ。すま派手にやってたようだな。さすが俺の女房だ。", "pr": "このけはいはしら。てんげんさままけよ。すまはでにやってたようだな。さすがおれのにょうぼうだ。", "ko": "이 기척 기둥. 텐겐 님이다. 스마, 화려하게 하고 있었던 모양이군. 역시 내 아내다."}, {"t": "52:01", "jp": "これで女房たちは全員助け出した。あ、伊鶴も無事だ。あいつには誘惑を離れるように言ってやる。", "pr": "これでにょうぼうたちはぜんいんたすけだした。あ、いつるもぶじだ。あいつにはゆうわくをはなれるようにいってやる。", "ko": "이걸로 아내들은 전원 구해 냈다. 아, 히나츠루도 무사하다. 저 녀석에게는 유곽에서 벗어나 있으라고 말해 두지."}, {"t": "52:19", "jp": "すげえ、すげえぞ。さすが祭りの神だぜ。", "pr": "すげえ、すげえぞ。さすがまつりのかみだぜ。", "ko": "대단해, 대단하다. 역시 축제의 신이야."}, {"t": "52:22", "jp": "良かったよ。さて、こっからはど派手に行くぜ。しぶいわね。思ったより面白いわ。", "pr": "よかったよ。さて、こっからはどはでにいくぜ。しぶいわね。おもったよりおもしろいわ。", "ko": "다행이야. 자, 여기서부터는 화려하게 간다. 멋지네. 생각보다 재미있어."}, {"t": "52:43", "jp": "戦えてる上弦の鬼と日の神楽なら通用するんだ。帯が体に入っていってる。", "pr": "たたかえてるじょうげんのおにとにちのかぐらならつうようするんだ。おびがからだにいっっていってる。", "ko": "싸울 수 있어. 상현의 귀신과 (싸워도) 히노카구라라면 통한다. 오비가 몸에 흡수되어 들어가고 있어."}, {"t": "52:54", "jp": "いや、戻っているのか。分裂していた分が。やっぱり柱ね。柱が来てたの。", "pr": "いや、もどっているのか。ぶんれつしていたふんが。やっぱりはしらね。はしらがきてたの。", "ko": "아니, 돌아가고 있는 건가. 분열했던 만큼이. 역시 기둥이네. 기둥이 와 있었던 거야."}, {"t": "53:04", "jp": "よかった。あの方に喜んでいただけるわ。", "pr": "よかった。あのほうによろこんでいただけるわ。", "ko": "다행이야. 그분이 기뻐해 주시겠어."}, {"t": "53:14", "jp": "なんて禍々がしい匂いだ。喉の奥がしびれて痛い。", "pr": "なんてか々がしいにおいだ。のどのおくがしびれていたい。", "ko": "이 무슨 불길한 냄새냐. 목구멍 안쪽이 저리고 아프다."}, {"t": "53:24", "jp": "おい、何をしてるんだ、お前たち。人の店の前で揉め事を起こすんじゃねえぞ。", "pr": "おい、なにをしてるんだ、おまえたち。にんのみせのまえでもめごとをおこすんじゃねえぞ。", "ko": "어이, 뭐 하는 거야, 너희들. 남의 가게 앞에서 다툼을 일으키지 마라."}, {"t": "53:31", "jp": "うるさいわね。だめだ。下がってください。うわあ。", "pr": "うるさいわね。だめだ。さがってください。うわあ。", "ko": "시끄럽네. 안 돼. 물러나 주세요. 으악."}, {"t": "53:58", "jp": "待て。許さないぞ。こんなことをしておいて。", "pr": "まて。ゆるさないぞ。こんなことをしておいて。", "ko": "기다려. 용서하지 않겠다. 이런 짓을 해 놓고."}, {"t": "54:05", "jp": "何？まだ何か言ってるの？もういいわよ、ブサク。醜い人間に生きてる価値ないんだから、仲良くみんなで死に腐れろ。", "pr": "なに？まだなにかいってるの？もういいわよ、ぶさく。みにくいにんげんにいきてるかちないんだから、なかよくみんなでしにくされろ。", "ko": "뭐? 아직 뭔가 말하고 있는 거야? 이제 됐어, 못난이. 추한 인간에게 살 가치 따위 없으니까, 사이좋게 다 같이 뒈져 버려라."}, {"t": "54:18", "jp": "ひろさん、ひろさん、助けて。", "pr": "ひろさん、ひろさん、たすけて。", "ko": "히로 씨, 히로 씨, 도와줘."}, {"t": "54:45", "jp": "1人はどうしても引けない時がある。人の心を持たないものがこの世にはいる。", "pr": "1にんはどうしてもひけないときがある。にんのこころをもたないものがこのよにはいる。", "ko": "사람은 아무래도 물러설 수 없을 때가 있다. 사람의 마음을 갖지 않은 자가 이 세상에는 있다."}, {"t": "54:55", "jp": "理不尽に命を奪い反省もせず悔やむこともない。その 俺は絶対許さない。", "pr": "りふじんにいのちをうばいはんせいもせずくやむこともない。その おれはぜったいゆるさない。", "ko": "부당하게 목숨을 빼앗고 반성도 하지 않고 후회하지도 않는다. 그런 놈을 나는 절대 용서하지 않는다."}, {"t": "55:02", "jp": "失われた命は回避しない。二度と戻らない。", "pr": "うしなわれたいのちはかいひしない。にどともどらない。", "ko": "잃어버린 목숨은 되돌아오지 않는다. 두 번 다시 돌아오지 않는다."}, {"t": "55:12", "jp": "生身のものは鬼のようにはいかない。なぜ奪う？なぜ命を踏みつけにする？", "pr": "なまみのものはおにのようにはいかない。なぜうばう？なぜいのちをふみつけにする？", "ko": "맨몸의 인간은 귀신처럼은 되지 않아. 어째서 빼앗지? 어째서 목숨을 짓밟는 거지?"}, {"t": "55:27", "jp": "この言葉どこかで聞いた？何が楽しい？何が面白い？命を何だと思っているんだ？", "pr": "このことばどこかできいた？なにがたのしい？なにがおもしろい？いのちをなんだとおもっているんだ？", "ko": "이 말 어디선가 들었지? 뭐가 즐겁지? 뭐가 재미있지? 목숨을 뭐라고 생각하는 거지?"}, {"t": "55:43", "jp": "これは私じゃない。私の記憶じゃない。", "pr": "これはわたしじゃない。わたしのきおくじゃない。", "ko": "이건 내가 아니야. 내 기억이 아니야."}, {"t": "55:48", "jp": "細胞だ。無惨様の細胞の記憶。人間だったろ？お前も。かつては痛みや苦しみにもがいて涙を流していたはずだ。ごちゃごちゃごちゃごちゃうるさいわね。昔のことなんか覚えちゃいないわ。私は今鬼なんだから関係ないわよ。", "pr": "さいぼうだ。むざんようのさいぼうのきおく。にんげんだったろ？おまえも。かつてはいたみやくるしみにもがいてなみだをながしていたはずだ。ごちゃごちゃごちゃごちゃうるさいわね。むかしのことなんかおぼえちゃいないわ。わたしはいまおになんだからかんけいないわよ。", "ko": "세포다. 무잔 님의 세포의 기억. 인간이었잖아? 너도. 한때는 아픔이나 괴로움에 몸부림치며 눈물을 흘렸을 거다. 이러쿵저러쿵 시끄럽네. 옛날 일 따위 기억하지 않아. 나는 지금 귀신이니까 상관없어."}, {"t": "56:00", "jp": "分かった。もういい。そもそもなんで私の詫びが切られる？力をいだけ。", "pr": "わかった。もういい。そもそもなんでわたしのわびがきられる？ちからをいだけ。", "ko": "알았다. 이제 됐어. 애초에 어째서 내 칼이 베이는 거지? (더 많은) 힘을 다오."}, {"t": "56:23", "jp": "指先が震える。これは私、無惨様、鬼術、破裂、恵みの神国炎早。", "pr": "ゆびさきがふるえる。これはわたし、むざんさま、おにじゅつ、はれつ、めぐみのしんこくほのおそう。", "ko": "손끝이 떨린다. 이건 나, 무잔 님, 귀신술, 작렬, (기술명) 은혜의 신, 코쿠엔(?) 빠르다."}, {"t": "56:37", "jp": "お兄ちゃん、お兄ちゃんを助けて、お願い。", "pr": "おにいちゃん、おにいちゃんをたすけて、おねがい。", "ko": "오빠, 오빠를 도와줘, 제발."}, {"t": "57:07", "jp": "地面よね。人間っていうのは本当にそうよね。傷も簡単には治らないし。そうなるわよね。", "pr": "じめんよね。にんげんっていうのはほんとうにそうよね。いたもかんたんにはなおらないし。そうなるわよね。", "ko": "땅이지. 인간이라는 건 정말 그렇지. 상처도 쉽게 낫지 않고. 그렇게 되겠지."}, {"t": "57:09", "jp": "前駆だ。さよなら、無惨。記憶もやったわね。あんた。そう、あんた。", "pr": "ぜんくだ。さよなら、むざん。きおくもやったわね。あんた。そう、あんた。", "ko": "(베인) 절단이다. 잘 가, 무잔. 기억도 (그랬)지. 너. 그래, 너."}, {"t": "57:55", "jp": "あんたなのね。あの方が言ってたのはあんたなのね。", "pr": "あんたなのね。あのほうがいってたのはあんたなのね。", "ko": "너로구나. 그분이 말하던 게 너로구나."}, {"t": "58:03", "jp": "抱き。私の支配から逃れた鬼がいる。玉のように見つけて始末してくれる。お前にしか頼めない。", "pr": "だき。わたしのしはいからのがれたおにがいる。たまのようにみつけてしまつしてくれる。おまえにしかたのめない。", "ko": "(명령이다.) 내 지배에서 벗어난 귀신이 있다. 구슬처럼 찾아내서 처치해 다오. 너에게밖에 부탁할 수 없다."}, {"t": "58:22", "jp": "朝の羽織用の着物に一柄の帯の娘だ。え、もちろん殴り殺して差し上げます。", "pr": "あさのはおりようのきものにいちがらのおびのむすめだ。え、もちろんなぐりころしてさしあげます。", "ko": "아침 노을빛 하오리용 기모노에 한 무늬 오비의 처녀다. 어, 물론 때려죽여 드리겠습니다."}, {"t": "58:34", "jp": "お望みのままに。雑魚がね。ずこ。怖いわね。大して人を食ってない。なんであの方の支配から外れたのかしら。かわいそうに。", "pr": "おのぞみのままに。ざつぎょがね。ずこ。こわいわね。たいしてにんをくっってない。なんであのほうのしはいからはずれたのかしら。かわいそうに。", "ko": "바라시는 대로. 잡어가 말이야. 으. 무섭네. 인간을 별로 먹지 않았어. 어째서 그분의 지배에서 벗어났을까. 가엾게도."}, {"t": "59:11", "jp": "胴体が泣き別れになってるでしょ。動かない方がいいわよ。あんたみたいな半端 じゃ。", "pr": "どうたいがなきわかれになってるでしょ。うごかないほうがいいわよ。あんたみたいなはんぱ じゃ。", "ko": "몸통이 따로 잘려 있잖아. 움직이지 않는 게 좋아. 너 같은 어설픈 (귀신)으로는."}, {"t": "59:18", "jp": "それだけの傷すぐには再生できないだろうし。", "pr": "それだけのきずすぐにはさいせいできないだろうし。", "ko": "그만한 상처는 바로 재생하지 못할 테고."}, {"t": "59:24", "jp": "は、ちょっと待ってよな。何なの?足が再生してるんだけど。足どころかなんで立ってるの?さっき体切断したわよ。手応えがあったもの切ったのは間違いない。", "pr": "は、ちょっとまってよな。なになの?あしがさいせいしてるんだけど。あしどころかなんでたってるの?さっきからだせつだんしたわよ。てごたえがあったものきったのはまちがいない。", "ko": "하, 잠깐만. 뭐야. 다리가 재생되고 있는데. 다리는커녕 어떻게 서 있는 거야? 방금 몸을 절단했는데. 베인 느낌이 있었으니 벤 건 틀림없어."}, {"t": "59:43", "jp": "この再生速度は上限に匹敵の圧迫。急に変わった。", "pr": "このさいせいそくどはじょうげんにひってきのあっぱく。きゅうにかわった。", "ko": "이 재생 속도는 상현에 필적하는 압박감. 갑자기 변했어."}], "range": "50:14 ~ 59:43"}, {"title": "챕터 07", "lines": [{"t": "01:00:08", "jp": "また剣覚えね。次は首よ。あ、なんで切り落とした?私の背中を貫通してるのよ。一瞬で再生した。", "pr": "またつるぎおぼえね。つぎはくびよ。あ、なんできりおとした?わたしのせなかをかんつうしてるのよ。いっしゅんでさいせいした。", "ko": "또 검술이군. 다음은 목이야. 어, 왜 베어 떨어뜨렸지? 내 등을 관통하고 있는데. 순식간에 재생했어."}, {"t": "01:00:24", "jp": "そんなだった私の再生力を上回ってるじゃない。", "pr": "そんなだったわたしのさいせいちからをうわまわってるじゃない。", "ko": "이렇게나 (강했던) 내 재생력을 능가하고 있잖아."}, {"t": "01:00:44", "jp": "生きてる。帰りがなぜか痛い。だめだ。新聞するですか？", "pr": "いきてる。かえりがなぜかいたい。だめだ。しんぶんするですか？", "ko": "살아 있다. 왠지 (몸이) 아프다. 안 돼. 정신을 차려야 하는데."}, {"t": "01:01:20", "jp": "ごめんな。戦わせてごめん。痛かった。苦しいよ。分かってる。でも大丈夫だ。俺は誰も傷つけさせないから。", "pr": "ごめんな。たたかわせてごめん。いたかった。くるしいよ。わかってる。でもだいじょうぶだ。おれはだれもきずつけさせないから。", "ko": "미안해. 싸우게 해서 미안. 아팠지. 괴롭지. 알아. 하지만 괜찮아. 나는 아무도 다치게 하지 않을 테니까."}, {"t": "01:01:33", "jp": "えー。よくもまあやってくれたわね。そう、血鬼術も使えるの。鬼だけ燃やす奇妙な血鬼術。しかもこれなかなか治らないわ。ものすごく癪に触る。ものすごくね。", "pr": "えー。よくもまあやってくれたわね。そう、ちおにじゅつもつかえるの。おにだけもやすきみょうなちおにじゅつ。しかもこれなかなかなおらないわ。ものすごくしゃくにふる。ものすごくね。", "ko": "이야. 어지간히도 해 줬네. 그래, 혈귀술도 쓸 수 있는 거야. 귀신만 태우는 기묘한 혈귀술. 게다가 이거 좀처럼 낫지 않네. 엄청나게 신경에 거슬려. 엄청나게 말이야."}, {"t": "01:02:05", "jp": "まずい。このままでは身動きが取れない。すぐ攻撃が来るぞ。", "pr": "まずい。このままではみうごきがとれない。すぐこうげきがくるぞ。", "ko": "큰일이다. 이대로는 꼼짝할 수 없어. 곧 공격이 온다."}, {"t": "01:02:10", "jp": "どうする？どうする？おい、これかまど子じゃねえか。派手に鬼が進んでやがる。", "pr": "どうする？どうする？おい、これかまどこじゃねえか。はでにおにがすすんでやがる。", "ko": "어떡하지? 어떡하지? 어이, 이거 카마도 아니냐. 화려하게 (싸움이) 진행됐군."}, {"t": "01:02:23", "jp": "宇髄さん走らねえ。そっちから来たの。手間が省けた。", "pr": "うずいさんはしらねえ。そっちからきたの。てまがはぶけた。", "ko": "우즈이 씨. (안) 달려요? 그쪽에서 왔구나. 수고를 덜었네."}, {"t": "01:02:30", "jp": "うるせえな。お前と話してねえよ。うせろ。お前上弦の鬼じゃねえだろ。弱すぎなんだよ。", "pr": "うるせえな。おまえとはなしてねえよ。うせろ。おまえじょうげんのおにじゃねえだろ。よわすぎなんだよ。", "ko": "시끄럽네. 너랑 말 안 했어. 꺼져. 너 상현의 귀신 아니지. 너무 약하잖아."}, {"t": "01:02:39", "jp": "何よ、馬鹿なこと。え、食った。首が落ちてる。おい、 戦いはまだ終わってねえぞ。", "pr": "なによ、ばかなこと。え、くっった。くびがおちてる。おい、 たたかいはまだおわってねえぞ。", "ko": "뭐야, 바보 같은 소리. 어, 먹혔다. 목이 떨어졌어. 어이, 싸움은 아직 안 끝났어."}, {"t": "01:02:55", "jp": "妹をどうにかしろ。崩れ出すようなバカ鬼は戦いの場にいらねえ。", "pr": "いもうとをどうにかしろ。くずれだすようなばかおにはたたかいのばにいらねえ。", "ko": "여동생을 어떻게 좀 해. 무너지기 시작하는 멍청한 귀신은 싸움터에 필요 없어."}, {"t": "01:03:02", "jp": "地味に子守歌でも歌ってやるよ。さてと。", "pr": "じみにこもりうたでもうたってやるよ。さてと。", "ko": "수수하게 자장가라도 불러 주지. 자 그럼."}, {"t": "01:03:13", "jp": "ちょっと待ちなさいよ。どこ行く？あんたさっき私が上弦じゃないとか言ったわね。", "pr": "ちょっとまちなさいよ。どこいく？あんたさっきわたしがじょうげんじゃないとかいったわね。", "ko": "잠깐 기다려. 어디 가? 너 방금 내가 상현이 아니라고 했지."}, {"t": "01:03:21", "jp": "だってお前上弦じゃねえじゃん。 私は上弦の6よ。", "pr": "だっておまえじょうげんじゃねえじゃん。 わたしはじょうげんの6よ。", "ko": "그야 너 상현이 아니잖아. 나는 상현의 6이야."}, {"t": "01:03:26", "jp": "だったらなんで首切られてんだよ。弱すぎだろ。", "pr": "だったらなんでくびきりられてんだよ。よわすぎだろ。", "ko": "그럼 왜 목이 베인 거야. 너무 약하잖아."}, {"t": "01:03:30", "jp": "脳みそ爆発してんのか。本当に私は上弦の 6だもん。", "pr": "のうみそばくはつしてんのか。ほんとうにわたしはじょうげんの 6だもん。", "ko": "머리가 폭발한 거냐. 정말로 나는 상현의 6이라고."}, {"t": "01:03:41", "jp": "本当だもん。数字だってもらったんだから。私すごいんだから。", "pr": "ほんとうだもん。すうじだってもらったんだから。わたしすごいんだから。", "ko": "진짜라고. 숫자도 받았는걸. 나 대단하다고."}, {"t": "01:03:48", "jp": "きんな泣きじゃねえか。嘘だろ。いや、それよりこいついつまで喋ってんだ。首を切ってるのに体が崩れねえぞ。", "pr": "きんななきじゃねえか。うそだろ。いや、それよりこいついつまでしゃべってんだ。くびをきってるのにからだがくずれねえぞ。", "ko": "다 죽어 가는 주제에. 거짓말이지. 아니, 그것보다 이 녀석 언제까지 떠드는 거야. 목을 베었는데 몸이 안 무너지잖아."}, {"t": "01:03:59", "jp": "死ぬ。 死んじゃう。", "pr": "しぬ。 しんじゃう。", "ko": "죽어. 죽어 버려."}, {"t": "01:04:10", "jp": "首切られた。首切られちゃった。 お兄ちゃん 泣いてたってしょうがねえからな。", "pr": "くびきりられた。くびきりられちゃった。 おにいちゃん ないてたってしょうがねえからな。", "ko": "목이 베였어. 목이 베여 버렸어. 오빠. 울고 있어도 소용없으니까."}, {"t": "01:04:22", "jp": "首でくっつけろよなあ。", "pr": "くびでくっつけろよなあ。", "ko": "목으로 (다시) 붙여 보라고."}, {"t": "01:04:43", "jp": "おめえは本当に頭が足りねえな。 背中から出てきたもう1 体は何だ?", "pr": "おめえはほんとうにあたまがたりねえな。 せなかからでてきたもう1 からだはなんだ?", "ko": "너는 정말 머리가 모자라구나. 등에서 나온 또 한 마리는 뭐냐?"}, {"t": "01:04:48", "jp": "反射速度が引じゃねえ。 お前いいな。その顔いいな。肌もいいな。も朝も傷もねえんだな。寝たましいな。寝たましいな。死んでくれねえかな。", "pr": "はんしゃそくどがひきじゃねえ。 おまえいいな。そのかおいいな。はだもいいな。もあさもいたもねえんだな。ねたましいな。ねたましいな。しんでくれねえかな。", "ko": "반사 속도가 보통이 아니야. 너 좋네. 그 얼굴 좋네. 피부도 좋네. 멍도 상처도 없구나. 부럽네. 부럽네. 죽어 주지 않으려나."}, {"t": "01:05:05", "jp": "お兄ちゃん、こいつだけじゃないのよ。まだいるの?みんなで邪魔して私をめたの?俺の可愛い妹が足りねえ頭で一生懸命やってるの。いじめるような奴らは皆殺しだ。取り立てるぜ。俺はなあ。やら分は必ず取り立てる。", "pr": "おにいちゃん、こいつだけじゃないのよ。まだいるの?みんなでじゃましてわたしをめたの?おれのかわいいもうとがたりねえあたまでいっしょうけんめいやってるの。いじめるようなやつらはみなころしだ。とりたてるぜ。おれはなあ。やらふんはかならずとりたてる。", "ko": "오빠, 이놈만이 아니야. 또 있어? 다 같이 방해해서 나를 괴롭힌 거야? 내 귀여운 여동생이 모자란 머리로 열심히 하고 있는데. 괴롭히는 놈들은 몰살이다. 받아 내겠어. 나는 말이야. 빚은 반드시 받아 낸다."}, {"t": "01:05:39", "jp": "死ぬ時ぐるぐる巡らせろ。俺の名は妓夫太郎。", "pr": "しぬときぐるぐるめぐらせろ。おれのめいはぎゅうたろう。", "ko": "죽을 때 (인생을) 빙글빙글 되돌아봐라. 내 이름은 규타로."}, {"t": "01:05:45", "jp": "だからな。やるな。まあ、一筋縄にはいかねえわな。", "pr": "だからな。やるな。まあ、ひとすじなわにはいかねえわな。", "ko": "그러니까 말이야. 하지 마. 뭐, 호락호락 넘어가진 않겠지."}, {"t": "01:06:06", "jp": "俺たちは2人で1つだからなあ。レッツゴー。だめだ。俺の声が届かない。", "pr": "おれたちは2にんで1つだからなあ。れっつごー。だめだ。おれのこえがとどかない。", "ko": "우리는 둘이서 하나니까. 렛츠 고. 안 돼. 내 목소리가 닿지 않아."}, {"t": "01:06:24", "jp": "全然聞いてくれないよ。どうしよう。子守歌でも歌ってやれ。こんこ。", "pr": "ぜんぜんきいてくれないよ。どうしよう。こもりうたでもうたってやれ。こんこ。", "ko": "전혀 들어 주지 않아. 어떡하지. 자장가라도 불러 줘라. 콩콩(자장가 시작)."}, {"t": "01:06:38", "jp": "小山の小うさぎはなぜにお耳がござる。小さい時に母様が長いこの食べたいゆ。", "pr": "おやまのしょううさぎはなぜにおみみがござる。ちーさいときにははさまがながいこのたべたいゆ。", "ko": "작은 산의 아기 토끼는 어째서 귀가 길까. 어릴 적 어머니가 긴 잎을 먹고 싶다고 (해서)."}, {"t": "01:06:58", "jp": "これでお耳がなこさ。禰豆子、豆か。", "pr": "これでおみみがなこさ。ねずこ、まめか。", "ko": "그래서 귀가 길어졌단다. 네즈코, 잠들었나."}, {"t": "01:07:26", "jp": "寝た。母さん寝た。寝ました。", "pr": "ねた。かあさんねた。ねました。", "ko": "잠들었다. 엄마가 잠들었다. 잠들었습니다."}, {"t": "01:07:49", "jp": "俺が来たぞ。こら。伊之助、お前これあっちに忘れてたぞ。こいつのだろうが。", "pr": "おれがきたぞ。こら。いのすけ、おぜんこれあっちにわすれてたぞ。こいつのだろうが。", "ko": "내가 왔다. 이놈. 이노스케, 너 이거 저쪽에 두고 갔더라. 이 녀석 거잖아."}, {"t": "01:08:05", "jp": "取りに行かなきゃと思っていたんだ。ありがとう。伊之助。", "pr": "とりにいかなきゃとおもっていたんだ。ありがとう。いのすけ。", "ko": "가지러 가야겠다고 생각하고 있었어. 고마워. 이노스케."}, {"t": "01:08:09", "jp": "炭治郎。宇髄さん、向こうの通りだ。状況は分からないが、嫌な予感がする。", "pr": "たんじろう。うずいさん、むこうのとうりだ。じょうきょうはわからないが、いやなよかんがする。", "ko": "탄지로. 우즈이 씨, 건너편 거리다. 상황은 모르겠지만 불길한 예감이 들어."}, {"t": "01:08:15", "jp": "加勢に行こう。煉獄さんが亡くなって4ヶ月ほどが経った 頃、煉獄さんのお父上、槇寿郎さんから手紙をもらった。", "pr": "かせいにいこう。れんごくさんがなくなって4ゖがつほどがへった ごろ、れんごくさんのおちちうえ、まきとしおさんからてがみをもらった。", "ko": "가세하러 가자. 렌고쿠 씨가 돌아가신 지 4개월쯤 지났을 무렵, 렌고쿠 씨의 아버님 신지로 씨에게서 편지를 받았다."}, {"t": "01:08:30", "jp": "君には悪いことをした。杏寿郎のために泣いてくれてありがとう。", "pr": "くんにはわるいことをした。あんずとしおのためにないてくれてありがとう。", "ko": "자네에게는 못할 짓을 했네. 쿄주로를 위해 울어 줘서 고맙네."}, {"t": "01:08:39", "jp": "杏寿郎は私などと違い素晴らしい息子だった。私が教えることを放棄した後でも炎の 呼吸の指南を読み込んで鍛錬し柱となった。", "pr": "あんずとしおはわたしなどとちがいすばらしいむすこだった。わたしがおしえることをほうきしたあとでもほのおの こきゅうのしなんをよみこんでたんれんしはしらとなった。", "ko": "쿄주로는 나 같은 것과 달리 훌륭한 아들이었네. 내가 가르치기를 포기한 뒤에도 불꽃의 호흡 지침서를 읽고 단련해 기둥이 되었지."}, {"t": "01:08:50", "jp": "ルカの母親の血が濃いのだろう。杏寿郎も 千寿郎も立派な子だ。", "pr": "るかのははおやのちがこいのだろう。あんずとしおも ちずろうもりっぱなこだ。", "ko": "아내(루카)의 피가 진한 것이겠지. 쿄주로도 센주로도 훌륭한 아이다."}, {"t": "01:08:55", "jp": "そして竈門君はもっとすごい力がある。", "pr": "そしてかまどもんくんはもっとすごいちからがある。", "ko": "그리고 카마도 군은 더 대단한 힘이 있네."}, {"t": "01:09:04", "jp": "日の呼吸の選ばれた使い手は君のように生まれつき痣があるそうだ。", "pr": "にちのこきゅうのえらばれたつかいてはくんのようにうまれつきしがあるそうだ。", "ko": "해(日)의 호흡의 선택받은 사용자는 자네처럼 태어날 때부터 멍(점)이 있다고 하네."}, {"t": "01:09:05", "jp": "いえ、槇寿郎さん、この傷は生まれつきのものじゃない。これは元々弟が火鉢を倒した時にできた火傷です。さらにその上を最終選別で負傷して今の形になりました。", "pr": "いえ、まきとしおさん、このきずはうまれつきのものじゃない。これはもともとおとうとがひばちをたおしたときにできたやけどです。さらにそのうえをさいしゅうせんべつでふしょうしていまのかたちになりました。", "ko": "아뇨, 신지로 씨, 이 상처는 태어날 때부터 있던 게 아닙니다. 이건 원래 동생이 화로를 넘어뜨렸을 때 생긴 화상입니다. 게다가 그 위에 최종 선별에서 부상을 입어 지금 모양이 되었습니다."}, {"t": "01:09:16", "jp": "俺はきっと選ばれた使い手ではないのだろう。でもたとえ選ばれたものでなくても 俺は必ず鬼舞辻無惨を倒さなければならない。", "pr": "おれはきっとえらばれたつかいてではないのだろう。でもたとええらばれたものでなくても おれはかならずおにまいつじむざんをたおさなければならない。", "ko": "나는 분명 선택받은 사용자는 아닐 거다. 하지만 설령 선택받은 자가 아니더라도 나는 반드시 키부츠지 무잔을 쓰러뜨려야 한다."}, {"t": "01:09:44", "jp": "もう片方は仕留め損なったぜ。また首切られた。クソ野郎。クソ野郎。", "pr": "もうかたほうはしとめそこなったぜ。またくびきりられた。くそやろう。くそやろう。", "ko": "다른 한쪽은 처치하는 데 실패했어. 또 목이 베였어. 빌어먹을 놈. 빌어먹을 놈."}], "range": "01:00:08 ~ 01:09:44"}, {"title": "챕터 08", "lines": [{"t": "01:10:12", "jp": "お前もしかして気づいてるな。何に気づいたところで意味ねえけどな。", "pr": "おまえもしかしてきづいてるな。なににきづいたところでいみねえけどな。", "ko": "너 혹시 눈치챘구나. 뭘 눈치챈들 의미 없지만 말이야."}, {"t": "01:10:25", "jp": "しかしお前違うな。今まで殺した柱たちと違う。お前は生まれ た時から特別なやつだったんだろうな。", "pr": "しかしおまえちがうな。いままでころしたはしらたちとちがう。おまえはうまれ たときからとくべつなやつだったんだろうな。", "ko": "그런데 너 다르네. 지금까지 죽인 기둥들과 달라. 너는 태어났을 때부터 특별한 놈이었겠지."}, {"t": "01:10:36", "jp": "選ばれた才能だな。", "pr": "えらばれたさいのうだな。", "ko": "선택받은 재능이군."}, {"t": "01:10:44", "jp": "妬ましいな、才能。俺に才能なんてもんがあるように見えるか?", "pr": "ねたましいな、さいのう。おれにさいのうなんてもんがあるようにみえるか?", "ko": "부럽구나, 재능. 나에게 재능 같은 게 있는 것처럼 보이냐?"}, {"t": "01:10:53", "jp": "俺程度でそう見えるなら、てめえの人生幸せだな。何百年生きてようがこんなところに 閉じこもってりゃ世間知らずのままでも仕方ねえのか。", "pr": "おれていどでそうみえるなら、てめえのじんせいしあわせだな。なんびゃくねんいきてようがこんなところに とじこもってりゃせけんしらずのままでもしかたねえのか。", "ko": "내 정도로 그렇게 보인다면 네놈 인생은 행복하구나. 몇백 년을 살았든 이런 곳에 틀어박혀 있으면 세상 물정 모르는 채여도 어쩔 수 없는 건가."}, {"t": "01:11:01", "jp": "知らねえだろ。この国は な、広いんだぜ。", "pr": "しらねえだろ。このくには な、ひろいんだぜ。", "ko": "모르겠지. 이 나라는 말이야, 넓다고."}, {"t": "01:11:08", "jp": "すげえ奴らがうようよしてる。", "pr": "すげえやつらがうようよしてる。", "ko": "대단한 놈들이 득실득실하다."}, {"t": "01:11:18", "jp": "素性の知れねえ奴もいる。刀を握って2ヶ月で柱になるような奴もいる。俺が選ばれてる?", "pr": "すじょうのしれねえやつもいる。かたなをにぎって2ゖがつではしらになるようなやつもいる。おれがえらばれてる?", "ko": "내력을 알 수 없는 놈도 있어. 칼을 잡은 지 두 달 만에 기둥이 되는 놈도 있다. 내가 선택받았다고?"}, {"t": "01:11:26", "jp": "ふざけんじゃねえ。俺の手のひらからどれだけの命がこぼれたと思ってんだ。", "pr": "ふざけんじゃねえ。おれのてのひらからどれだけのいのちがこぼれたとおもってんだ。", "ko": "까불지 마라. 내 손바닥에서 얼마나 많은 목숨이 새어 나갔다고 생각하는 거냐."}, {"t": "01:11:38", "jp": "そ、俺は煉獄のようにはできねえ。", "pr": "そ、おれはれんごくのようにはできねえ。", "ko": "그래, 나는 렌고쿠처럼은 못 한다."}, {"t": "01:11:45", "jp": "だったらどう説明する?お前がまだ死んでない理由は何だ?", "pr": "だったらどうせつめいする?おまえがまだしんでないりゆうはなんだ?", "ko": "그렇다면 어떻게 설명할 거냐? 네가 아직 안 죽은 이유는 뭐냐?"}, {"t": "01:11:53", "jp": "俺の血は猛毒があるのについさっき取ってもお前は死なねえじゃねえか。おいな。", "pr": "おれのちはもうどくがあるのについさっきとってもおまえはしなねえじゃねえか。おいな。", "ko": "내 피에는 맹독이 있는데도 방금 (피를) 받고도 너는 죽지 않잖아. 어이."}, {"t": "01:12:00", "jp": "俺は忍びの家系なんだよ。耐性つけてるから毒は効かねえ。", "pr": "おれはしのびのかけいなんだよ。たいせいつけてるからどくはきかねえ。", "ko": "나는 닌자 가문이야. 내성을 길러서 독은 안 들어."}, {"t": "01:12:07", "jp": "何を笑ってやがる?やっぱり毒効いてるじゃねえか。じわじわとみっともねえな。", "pr": "なにをわらってやがる?やっぱりどくきいてるじゃねえか。じわじわとみっともねえな。", "ko": "뭘 웃고 있는 거냐? 역시 독이 듣고 있잖아. 야금야금, 꼴사납구나."}, {"t": "01:12:28", "jp": "100杯食えるわ。派手にな。どんなに巨戦張っても俺たちがじわじわ勝ってるんだよな。それはどうかな。この伊之助様とその手下がいるんだぜ。", "pr": "100はいくえるわ。はでにな。どんなにきょせんはってもおれたちがじわじわかってるんだよな。それはどうかな。このいのすけさまとそのてしたがいるんだぜ。", "ko": "(독을) 백 잔이라도 먹을 수 있어. 화려하게 말이야. 아무리 허세를 부려도 우리가 야금야금 이기고 있는 거야. 그건 어떨까. 이 이노스케 님과 그 부하가 있다고."}, {"t": "01:12:37", "jp": "なんだこいつら。てめえら派手な登場じゃねえか。気に入ったぜ。", "pr": "なんだこいつら。てめえらはでなとうじょうじゃねえか。きにいったぜ。", "ko": "뭐야 이놈들. 네놈들 화려한 등장이잖아. 마음에 들었어."}, {"t": "01:13:00", "jp": "まさか分裂している。だとしたら本体は間違いなくこっちの男だ。", "pr": "まさかぶんれつしている。だとしたらほんたいはまちがいなくこっちのおとこだ。", "ko": "설마 분열하고 있어. 그렇다면 본체는 틀림없이 이쪽 남자다."}, {"t": "01:13:06", "jp": "匂いが違う。匂いの重みが。手が震える。疲労からだろうか。それとも恐れ?いや、 それでもそれでも俺は、俺たちは勝つ。", "pr": "においがちがう。においのおもみが。てがふるえる。ひろうからだろうか。それともおそれ?いや、 それでもそれでもおれは、おれたちはかつ。", "ko": "냄새가 달라. 냄새의 무게가. 손이 떨린다. 피로 때문일까. 아니면 두려움? 아니, 그래도, 그래도 나는, 우리는 이긴다."}, {"t": "01:13:18", "jp": "鬼殺を。勝てないわよ。", "pr": "おにさつを。かてないわよ。", "ko": "귀살을. 못 이겨."}, {"t": "01:13:30", "jp": "柱が毒にやられてちゃね。余裕で勝つわ、ボケ雑魚が。毒回ってるくらいの足かせあってトントンなんだよ。そしててめえらの倒し方はすでに俺が看破した。同時に首を切ることだ。", "pr": "はしらがどくにやられてちゃね。よゆうでかつわ、ぼけざつぎょが。どくまわってるくらいのあしかせあってとんとんなんだよ。そしててめえらのたおしかたはすでにおれがかんぱした。どうじにくびをきることだ。", "ko": "기둥이 독에 당해서야. 여유롭게 이기겠어, 멍청한 잡어들이. 독이 도는 정도의 족쇄가 있어야 비등비등한 거야. 그리고 네놈들을 쓰러뜨리는 법은 이미 내가 간파했다. 동시에 목을 베는 거다."}, {"t": "01:13:46", "jp": "2人同時にな。そうだろう。そうじゃなけりゃそれぞれに能力を分散を取り込まねえがねえ。なるほどな。簡単だぜ。", "pr": "2にんどうじにな。そうだろう。そうじゃなけりゃそれぞれにのうりょくをぶんさんをとりこまねえがねえ。なるほどな。かんたんだぜ。", "ko": "둘 동시에 말이야. 그렇지. 그렇지 않으면 각자에게 능력을 분산시켜 흡수하지 않았겠지. 과연. 간단하잖아."}, {"t": "01:13:54", "jp": "俺たちが勝ったも同然だな。その簡単なことができねえでおりたちは死んでったからな。", "pr": "おれたちがかったもどうぜんだな。そのかんたんなことができねえでおりたちはしんでったからな。", "ko": "우리가 이긴 거나 다름없군. 그 간단한 걸 못 해서 너희들은 죽어 나갔으니까 말이야."}, {"t": "01:14:09", "jp": "そうよ。夜が明けるまで生きてた奴はいないわ。長い夜はいつも私たちを味方するから。どいつもこいつも死になさいよ。", "pr": "そうよ。よるがあけるまでいきてたやつはいないわ。ながいよるはいつもわたしたちをみかたするから。どいつもこいつもしになさいよ。", "ko": "그래. 날이 밝을 때까지 살아남은 놈은 없어. 긴 밤은 언제나 우리 편이니까. 이놈도 저놈도 죽어 버려라."}, {"t": "01:14:23", "jp": "お前あの時の。ミ水女は俺と寝ぼけバルに任せろ。", "pr": "おまえあのときの。みみずおんなはおれとねぼけばるにまかせろ。", "ko": "너 그때의. 물의 여자(여동생)는 나랑 잠꼬대 녀석(이노스케)에게 맡겨라."}, {"t": "01:14:39", "jp": "気をつけろ。おや、俺は君に言いたいことがある。耳を引っ張って怪我をさせた子に謝れ。", "pr": "きをつけろ。おや、おれはくんにいいたいことがある。みみをひっぱってけがをさせたこにあやまれ。", "ko": "조심해라. 이봐, 나는 너에게 하고 싶은 말이 있어. 귀를 잡아당겨 다치게 한 아이에게 사과해라."}, {"t": "01:14:45", "jp": "あの子たちは君の所有物じゃない。自分がされて嫌だったことは人にしちゃいけない。", "pr": "あのこたちはくんのしょゆうぶつじゃない。じぶんがされていやだったことはにんにしちゃいけない。", "ko": "그 아이들은 네 소유물이 아니야. 자신이 당해서 싫었던 일은 남에게 하면 안 돼."}, {"t": "01:15:00", "jp": "違うな。それは人にされて嫌だったこと、苦しかったことを人にやって返して取り立てる。", "pr": "ちがうな。それはにんにされていやだったこと、くるしかったことをにんにやってかえしてとりたてる。", "ko": "아니지. 그건 남에게 당해서 싫었던 일, 괴로웠던 일을 남에게 되갚아서 받아 내는 거다."}, {"t": "01:15:11", "jp": "自分が不幸だった分は幸せな奴から取り立てねえと返せねえ。", "pr": "じぶんがふこうだったふんはしあわせなやつからとりたてねえとかえせねえ。", "ko": "자기가 불행했던 만큼은 행복한 놈에게서 받아 내지 않으면 (본전을) 못 찾아."}, {"t": "01:15:19", "jp": "それが俺たちの生き方だからだ。言いがかりをつけてくる奴はみんな殺してきたんだよな。", "pr": "それがおれたちのいきかただからだ。いいがかりをつけてくるやつはみんなころしてきたんだよな。", "ko": "그게 우리가 사는 방식이니까. 트집 잡는 놈은 다 죽여 왔지."}, {"t": "01:15:30", "jp": "お前らも同じように喉笛きってやるからな。", "pr": "おまえらもおなじようにのどぶえきってやるからな。", "ko": "너희도 똑같이 목줄을 끊어 줄 테니까."}, {"t": "01:15:46", "jp": "なんだか。面倒だな。おい、おい、おい。なんだ、なんだこいつは。そうか。忍びか。元々感覚がまともじゃねえ。足が再生しない。やはり何か塗られていた、このクナイ。", "pr": "なんだか。めんどうだな。おい、おい、おい。なんだ、なんだこいつは。そうか。しのびか。もともとかんかくがまともじゃねえ。あしがさいせいしない。やはりなにかぬられていた、このくない。", "ko": "왠지. 성가시군. 어이, 어이, 어이. 뭐야, 뭐야 이 녀석은. 그렇군. 닌자인가. 원래 감각이 정상이 아니야. 다리가 재생되지 않아. 역시 뭔가 발려 있었어, 이 쿠나이에."}, {"t": "01:16:13", "jp": "おそらくの花出されたもの。体が渋い。 おしれえな。", "pr": "おそらくのはなだされたもの。からだがしぶい。 おしれえな。", "ko": "아마 등나무 꽃에서 추출한 것. 몸이 떫다(둔하다). 재미있군."}, {"t": "01:16:26", "jp": "ちくし。もう毒を分解しやがった。全開飛びな。", "pr": "ちくし。もうどくをぶんかいしやがった。ぜんかいとびな。", "ko": "젠장. 벌써 독을 분해했어. 전력으로 덤벼라."}, {"t": "01:16:38", "jp": "の呼吸さん 作戦変更ぎなくされてるぜ耳そんなに全然近づけねえこっちは 3人でカマき料にはおっさんに頑張ってもらうしかねえカバの男よりもまだこちらの方が弱い。", "pr": "のこきゅうさん さくせんへんこうぎなくされてるぜみみそんなにぜんぜんちかづけねえこっちは 3にんでかまきりょうにはおっさんにがんばってもらうしかねえかばのおとこよりもまだこちらのほうがよわい。", "ko": "소리(우즈이)의 호흡 사용자, 작전 변경을 강요당하고 있어. 그렇게나 (귀신에게) 전혀 다가가지 못해. 이쪽은 셋이서 (싸우고), 카마도 (지원)은 아저씨가 분발해 주는 수밖에 없어. 하마 같은 남자(귀신)보다는 이쪽이 아직 약해."}, {"t": "01:16:52", "jp": "まずこっちの首を切ろう。", "pr": "まずこっちのくびをきろう。", "ko": "먼저 이쪽 목을 베자."}, {"t": "01:17:01", "jp": "炭治郎、まだ動けるか?動ける。ただず井さんは敵の毒にやられているから危険な状態だ。一刻も早く決着を 来るぞ。", "pr": "たんじろう、まだうごけるか?うごける。ただずいさんはてきのどくにやられているからきけんなじょうたいだ。いっこくもはやくけっちゃくを くるぞ。", "ko": "탄지로, 아직 움직일 수 있나? 움직일 수 있어. 다만 우즈이 씨는 적의 독에 당해서 위험한 상태야. 한시라도 빨리 결판을. 온다."}, {"t": "01:17:14", "jp": "傷がどんくせえぞ。すまない。おめえ。", "pr": "きずがどんくせえぞ。すまない。おめえ。", "ko": "상처가 굼뜨군. 미안하다. 너희."}, {"t": "01:17:26", "jp": "傷が頼りにならねえ古分どもだ。やはりここは親分が出ばらなきゃならねえようだな。", "pr": "きずがたよりにならねえこふんどもだ。やはりここはおやぶんがしゅつばらなきゃならねえようだな。", "ko": "(상처 입어) 미덥지 못한 부하들이군. 역시 여기는 두목이 나서야 할 모양이군."}, {"t": "01:17:38", "jp": "バカね。今さら不細工な子が1人増えたところで何も変わらないのよ。", "pr": "ばかね。いまさらぶさいくなこが1にんふえたところでなにもかわらないのよ。", "ko": "바보네. 이제 와서 못생긴 아이가 하나 늘어난들 아무것도 변하지 않아."}, {"t": "01:17:45", "jp": "ついてこい。お前らよ。やった。伊之助。首、首、首。くっつけられないように持って遠くへ走るぞ。とりあえず俺は首持って逃げ回るから。", "pr": "ついてこい。おまえらよ。やった。いのすけ。くび、くび、くび。くっつけられないようにもってとおくへはしるぞ。とりあえずおれはくびもってにげまわるから。", "ko": "따라와라. 너희들. 좋았어. 이노스케. 목, 목, 목. 못 붙이게 들고 멀리 달리자. 일단 나는 목을 들고 도망쳐 다닐 테니까."}, {"t": "01:18:22", "jp": "お前ら、おっさんを介護しろ。分かった。気をつけろ。話しなさいよ。", "pr": "おまえら、おっさんをかいごしろ。わかった。きをつけろ。はなしなさいよ。", "ko": "너희들, 아저씨를 돌봐 줘라. 알았어. 조심해. 말해 봐."}, {"t": "01:18:26", "jp": "話せと言われて話すやつはいねえ。あとあの妓夫太郎の首を切りゃ俺たちの勝ちだ。", "pr": "はなせといわれてはなすやつはいねえ。あとあのぎゅうたろうのくびをきりゃおれたちのかちだ。", "ko": "말하라고 해서 말하는 놈은 없어. 그리고 저 규타로의 목을 베면 우리 승리다."}, {"t": "01:18:38", "jp": "伊之助。伊之助、伊之助。まずい、毒が。", "pr": "いのすけ。いのすけ、いのすけ。まずい、どくが。", "ko": "이노스케. 이노스케, 이노스케. 큰일이다, 독이."}, {"t": "01:18:44", "jp": "なんであいつがこっちに？宇髄さんは？宇髄さん危ない。", "pr": "なんであいつがこっちに？うずいさんは？うずいさんあぶない。", "ko": "왜 저놈이 이쪽으로? 우즈이 씨는? 우즈이 씨 위험해."}, {"t": "01:19:00", "jp": "俺に構うな。みんなごめん。禰豆子、泣かないでお兄ちゃん。どうしていつも謝るの？大切なのは今なんだよ。前を向こう、一緒に頑張ろうよ。戦おう。", "pr": "おれにかまうな。みんなごめん。ねずこ、なかないでおにいちゃん。どうしていつもあやまるの？たいせつなのはいまなんだよ。まえをむこう、いっしょにがんばろうよ。せんおう。", "ko": "나는 신경 쓰지 마. 모두 미안. 네즈코, 울지 마 오빠가. 어째서 늘 사과하는 거야? 중요한 건 지금이야. 앞을 보자, 함께 힘내자. 싸우자."}, {"t": "01:19:20", "jp": "あ、炭治郎。なんだお前まだ生きてんのか。運のいい やつだなあ。", "pr": "あ、たんじろう。なんだおまえまだいきてんのか。はこのいい やつだなあ。", "ko": "아, 탄지로. 뭐야 너 아직 살아 있냐. 운 좋은 녀석이군."}, {"t": "01:19:58", "jp": "まあ、運がいい以外に取り柄がねえん だろうな。", "pr": "まあ、うんがいいいがいにとりえがねえん だろうな。", "ko": "뭐, 운 좋은 것 말고는 별다른 장점이 없겠지."}], "range": "01:10:12 ~ 01:19:58"}, {"title": "챕터 09", "lines": [{"t": "01:20:05", "jp": "かわいそうにね。お前の背負ってる箱からはみ出してるのは縁だな。そりゃ姉か妹か。", "pr": "かわいそうにね。おまえのせおってるはこからはみだしてるのはへりだな。そりゃあねかいもうとか。", "ko": "가엾기도 하지. 네가 짊어진 상자에서 삐져나와 있는 건 인연(혈육)이군. 그건 누나냐 여동생이냐."}, {"t": "01:20:09", "jp": "妹だ。そうか。見た目もねえな。お前全然妹守れてねえじゃねえか。", "pr": "いもうとだ。そうか。みためもねえな。おまえぜんぜんいもうとまもれてねえじゃねえか。", "ko": "여동생이야. 그런가. (지킬) 가망도 없군. 너 전혀 여동생을 못 지키고 있잖아."}, {"t": "01:20:37", "jp": "なあ。おい、今どんな気持ちだ？1人だけとものなく生き残って なあ。", "pr": "なあ。おい、いまどんなきもちだ？1にんだけとものなくいきのこって なあ。", "ko": "이봐. 어이, 지금 어떤 기분이냐? 혼자만 변변찮게 살아남아서 말이야."}, {"t": "01:20:46", "jp": "虫けら、どうする？ 弱い弱いボロボロの身、人間 の体で俺の首を切ってみろよ。", "pr": "むしけら、どうする？ よわいよわいぼろぼろのみ、にんげん のからだでおれのくびをきってみろよ。", "ko": "벌레 같은 놈, 어쩔 거냐? 약하디약한 너덜너덜한 몸, 인간의 몸으로 내 목을 베어 봐라."}, {"t": "01:20:55", "jp": "そうか、そうか。土壇場で心が折れたか。みっともねえな。", "pr": "そうか、そうか。どたんばでこころがおれたか。みっともねえな。", "ko": "그런가, 그런가. 막판에 마음이 꺾였나. 꼴사납구나."}, {"t": "01:21:28", "jp": "あ、さて、しまいだ。 みっともねえな。みっともねえが俺は嫌いじゃねえ。俺は醜くて みっともなくて汚いものが好きだからな。", "pr": "あ、さて、しまいだ。 みっともねえな。みっともねえがおれはきらいじゃねえ。おれはみにくくて みっともなくてきたないものがすきだからな。", "ko": "아, 자 그럼, 끝이다. 꼴사납구나. 꼴사납지만 나는 싫지 않아. 나는 추하고 꼴사납고 더러운 것을 좋아하니까."}, {"t": "01:21:54", "jp": "お前の額、体のその汚い傷。いいなあ。愛着 が湧くな。", "pr": "おまえのひたい、からだのそのきたないきず。いいなあ。あいちゃく がわくな。", "ko": "네 이마(의 멍), 몸의 그 더러운 상처. 좋구나. 애착이 가는구나."}, {"t": "01:22:04", "jp": "そうだ。お前も鬼になったらどうだ？妹のためにも。", "pr": "そうだ。おまえもおにになったらどうだ？いもうとのためにも。", "ko": "그래. 너도 귀신이 되는 게 어떠냐? 여동생을 위해서라도."}, {"t": "01:22:13", "jp": "そうだ、そうだ。それがいい。鬼になったら助けてやるよ。鬼になれば一瞬で強く なれるぜ。", "pr": "そうだ、そうだ。それがいい。おにになったらたすけてやるよ。おにになればいっしゅんでつよく なれるぜ。", "ko": "그래, 그래. 그게 좋아. 귀신이 되면 도와주겠어. 귀신이 되면 순식간에 강해질 수 있어."}, {"t": "01:22:20", "jp": "不自由な肉体とはおさらばだ。 なあなあ。どうする？", "pr": "ふじゆうなにくたいとはおさらばだ。 なあなあ。どうする？", "ko": "부자유한 육체와는 작별이다. 이봐 이봐. 어쩔 거냐?"}, {"t": "01:22:34", "jp": "悔しいんだな、自分の弱さが。人は嘆く時点を俯くんだぜ。涙が溢れないようにな。俺は準備してたんだ。やけくそで続きかよ。", "pr": "くやしいんだな、じぶんのよわさが。にんはなげくじてんをふくんだぜ。なみだがあふれないようにな。おれはじゅんびしてたんだ。やけくそでつづきかよ。", "ko": "분하구나, 자신의 약함이. 사람은 한탄할 때 고개를 숙이지. 눈물이 흘러넘치지 않도록 말이야. 나는 준비하고 있었어. 자포자기로 (덤비는) 거냐."}, {"t": "01:22:56", "jp": "引かねえぜ。こんな体じゃうまく動かせねえ。毒と同時に刺された。こいつは逃げるふりしてこれを取りに行ってやがったな。瓦礫と一緒に勇者の香り袋をばらまいて毒の匂いを隠した。", "pr": "ひかねえぜ。こんなからだじゃうまくうごかせねえ。どくとどうじにさされた。こいつはにげるふりしてこれをとりにいってやがったな。がれきといっしょにゆうしゃのかおりふくろをばらまいてどくのにおいをかくした。", "ko": "물러서지 않아. 이런 몸으론 잘 움직일 수 없어. 독과 동시에 찔렸다. 이놈은 도망치는 척하며 이걸 가지러 갔던 거구나. 잔해와 함께 등나무 향주머니를 흩뿌려 독 냄새를 숨겼어."}, {"t": "01:23:19", "jp": "こいつ、こいつのくせに、人間のくせに これだけボロボロになっておいて、これ だけ力の差を見せているのに、なぜ諦めない？", "pr": "こいつ、こいつのくせに、にんげんのくせに これだけぼろぼろになっておいて、これ だけちからのさをみせているのに、なぜあきらめない？", "ko": "이놈, 이놈인 주제에, 인간인 주제에 이렇게나 너덜너덜해져 놓고, 이렇게나 힘의 차이를 보여 주고 있는데, 어째서 포기하지 않지?"}, {"t": "01:23:28", "jp": "なぜ折れない？俺を 倒そうとする意志がなぜぶれない？", "pr": "なぜおれない？おれを たおそうとするいしがなぜぶれない？", "ko": "어째서 꺾이지 않지? 나를 쓰러뜨리려는 의지가 어째서 흔들리지 않지?"}, {"t": "01:23:35", "jp": "俺は諦めない。", "pr": "おれはあきらめない。", "ko": "나는 포기하지 않아."}, {"t": "01:24:01", "jp": "ちょっと嘘でしょ？そんなやつに組み切られないでよ。こいつの枯れから抜けやがった。", "pr": "ちょっとうそでしょ？そんなやつにくみきられないでよ。こいつのかれからぬけやがった。", "ko": "잠깐 거짓말이지? 그런 놈에게 (목이) 베이지 마. 이놈의 (공격) 범위에서 빠져나갔어."}, {"t": "01:24:20", "jp": "毒がもうもう少しだったのに。あともう少しだ。この 諦めるな。", "pr": "どくがもうもうすこしだったのに。あともうすこしだ。この あきらめるな。", "ko": "독이 좀만 더였는데. 앞으로 조금만 더다. 포기하지 마라."}, {"t": "01:24:30", "jp": "諦めるな。諦めるな。諦める。いた。", "pr": "あきらめるな。あきらめるな。あきらめる。いた。", "ko": "포기하지 마. 포기하지 마. 포기한다…(아니), 있다."}, {"t": "01:24:42", "jp": "死んでない。死んでなかったこいつ。そうか。金で無理やりに心臓を止めてやがったな。毒の巡りも一時的に止まる。", "pr": "しんでない。しんでなかったこいつ。そうか。きんでむりやりにしんぞうをとめてやがったな。どくのめぐりもいちじてきにとまる。", "ko": "안 죽었어. 안 죽었구나 이놈. 그렇군. 의지로 억지로 심장을 멈췄구나. 독이 도는 것도 일시적으로 멈춘다."}, {"t": "01:24:54", "jp": "不面が完成した。勝ちに行くぞ。せるな。読めてんだよ、てめえの汚ねえ歌わよ。", "pr": "ふめんがかんせいした。かちにいくぞ。せるな。よめてんだよ、てめえのきたねえうたわよ。", "ko": "가면(?)이 완성됐다. 이기러 간다. 까불지 마라. 다 읽혔어, 네놈의 더러운 술수 따위."}, {"t": "01:25:12", "jp": "れろ竈門炭治郎。はい。だろ善逸。おや。", "pr": "れろかまどもんたんじろう。はい。だろぜんいつ。おや。", "ko": "베어라 카마도 탄지로. 네. 그렇지 젠이츠. 어라."}, {"t": "01:25:29", "jp": "こいつ何？行くぞ。なんなのよ。なんなのよ。味方 このままじゃない。", "pr": "こいつなに？いくぞ。なんなのよ。なんなのよ。みかた このままじゃない。", "ko": "이놈 뭐야? 간다. 뭐야. 뭐야. 아군이 이대로면 (위험해)."}, {"t": "01:25:47", "jp": "腕の間ねえだろうが。ういちゃんの方が私の限界が来る。俺が切るんだ。", "pr": "うでのまねえだろうが。ういちゃんのほうがわたしのげんかいがくる。おれがきるんだ。", "ko": "팔이 (성한 게) 없잖아. 네즈코 쪽이… 내 한계가 온다. 내가 벤다."}, {"t": "01:26:10", "jp": "首を止め押ししまいだ。諦めない。ずらえる。渾身の一撃じゃ足りない。", "pr": "くびをとめおししまいだ。あきらめない。ずらえる。こんしんのいちげきじゃたりない。", "ko": "목을 베어 떨어뜨리면 끝이다. 포기하지 않아. 베어 낸다. 혼신의 일격으론 부족해."}, {"t": "01:26:31", "jp": "その100倍の力をひねりさ。なんだの朝が切られる。", "pr": "その100ばいのちからをひねりさ。なんだのあさがきられる。", "ko": "그 100배의 힘을 쥐어짜라. 뭐야, 내 (목이) 베인다."}, {"t": "01:26:48", "jp": "死ね死ね死。雷の呼吸 壱の方霹靂一閃。", "pr": "しねしねし。かみなりのこきゅう いちのほうへきれきいっせん。", "ko": "죽어 죽어 죽어. 우레의 호흡 제1형 벽력일섬."}, {"t": "01:27:04", "jp": "お兄ちゃんなんとかして。お兄ちゃん 早く動けよ。", "pr": "おにいちゃんなんとかして。おにいちゃん はやくうごけよ。", "ko": "오빠 어떻게 좀 해 줘. 오빠 빨리 움직여."}, {"t": "01:27:10", "jp": "毒… なんとか呼吸で少しでも毒が回るのを遅らせる。", "pr": "どく… なんとかこきゅうですこしでもどくがまわるのをおくらせる。", "ko": "독… 어떻게든 호흡으로 조금이라도 독이 도는 걸 늦춘다."}, {"t": "01:27:57", "jp": "なんだ、何か言ってる。宇髄さんが何か… 「逃げろ」うん。", "pr": "なんだ、なにかいってる。うずいさんがなにか… 「にげろ」うん。", "ko": "뭐야, 뭔가 말하고 있어. 우즈이 씨가 뭔가… 「도망쳐」 응."}, {"t": "01:28:22", "jp": "禰豆子が助けてくれたのか。うん。他の皆は？", "pr": "ねずこがたすけてくれたのか。うん。ほかのみなは？", "ko": "네즈코가 도와준 건가. 응. 다른 모두는?"}, {"t": "01:28:31", "jp": "炭治郎。炭治郎。全身痛いよ。俺の両足これ折れてん の？", "pr": "たんじろう。たんじろう。ぜんしんいたいよ。おれのりょうあしこれおれてん の？", "ko": "탄지로. 탄지로. 온몸이 아파. 내 두 다리 이거 부러진 거야?"}, {"t": "01:28:44", "jp": "何なの？「無事か？」「よかった」「無事じゃねえよ。俺もかわいそうだけど、伊之助が やばいよ。", "pr": "なになの？「ぶじか？」「よかった」「ぶじじゃねえよ。おれもかわいそうだけど、いのすけが やばいよ。", "ko": "뭐야? 「무사하냐?」 「다행이다」 무사하지 않아. 나도 가엾지만, 이노스케가 위험해."}, {"t": "01:28:53", "jp": "心臓の音がどんどん弱くなってるよ」「伊之助どこに？」「あそこにいるよ。あそこ」 伊之助。", "pr": "しんぞうのおとがどんどんよわくなってるよ」「いのすけどこに？」「あそこにいるよ。あそこ」 いのすけ。", "ko": "심장 소리가 점점 약해지고 있어. 「이노스케 어디에?」 「저기 있어. 저기」 이노스케."}, {"t": "01:29:07", "jp": "伊之助。しっかりしろ、伊之助。", "pr": "いのすけ。しっかりしろ、いのすけ。", "ko": "이노스케. 정신 차려, 이노스케."}, {"t": "01:29:11", "jp": "毒をな、何とかしないと。どうする？どうする？今何とかしなければ伊之助は死ぬ。", "pr": "どくをな、なんとかしないと。どうする？どうする？いまなんとかしなければいのすけはしぬ。", "ko": "독을, 어떻게든 해야 해. 어쩌지? 어쩌지? 지금 어떻게든 하지 않으면 이노스케는 죽는다."}, {"t": "01:29:24", "jp": "毒でただれた皮膚が治っていく。い、伊之助。", "pr": "どくでただれたひふがなおっていく。い、いのすけ。", "ko": "독으로 짓무른 피부가 나아 간다. 이, 이노스케."}, {"t": "01:29:34", "jp": "あの、なんか食わせろ。伊之助、よかった。よかった。", "pr": "あの、なんかくわせろ。いのすけ、よかった。よかった。", "ko": "저, 뭔가 좀 먹여 줘. 이노스케, 다행이야. 다행이야."}, {"t": "01:29:45", "jp": "いやー、死なないで。死なないでください、天元様。鬼の毒なんてどうしたらいいんですか？", "pr": "いやー、しなないで。しなないでください、てんげんさま。おにのどくなんてどうしたらいいんですか？", "ko": "아, 죽지 마. 죽지 마세요, 텐겐 님. 귀신의 독 같은 건 어떻게 해야 하나요?"}, {"t": "01:29:57", "jp": "毒薬が効かないよ。うわあ。何するんですか？誰ですか、あなた？え、絵から何でも早いです。加増が。お、おい、こりゃ一体どういうことだ？毒が消えた。", "pr": "どくやくがきかないよ。うわあ。なにするんですか？だれですか、あなた？え、えからなんでもはやいです。かぞうが。お、おい、こりゃいったいどういうことだ？どくがきえた。", "ko": "해독약이 안 들어. 으악. 뭐 하는 거예요? 누구예요, 당신? 어, (등장이) 뭐든 빠르네요. 카스가이(까마귀)가. 어, 어이, 이거 대체 어떻게 된 거야? 독이 사라졌다."}], "range": "01:20:05 ~ 01:29:57"}, {"title": "챕터 10", "lines": [{"t": "01:30:21", "jp": "禰豆子の血鬼術が毒を燃やして飛ばしたんだと思います。", "pr": "ねずこのちおにじゅつがどくをもやしてとばしたんだとおもいます。", "ko": "네즈코의 혈귀술이 독을 태워 날려 버린 거라고 생각합니다."}, {"t": "01:30:38", "jp": "でも傷は治らないのでもう動かないでください。ご無事で良かったです。俺は鬼の首を探します。", "pr": "でもきずはなおらないのでもううごかないでください。ごぶじでよかったです。おれはおにのくびをさがします。", "ko": "하지만 상처는 낫지 않으니 이제 움직이지 마세요. 무사하셔서 다행입니다. 저는 귀신의 목을 찾겠습니다."}, {"t": "01:30:48", "jp": "いやいや、お前も動くなよ。死ぬぞ。確認するまではまだ安心できません。", "pr": "いやいや、おまえもうごくなよ。しぬぞ。かくにんするまではまだあんしんできません。", "ko": "이봐 이봐, 너도 움직이지 마. 죽는다. 확인할 때까지는 아직 안심할 수 없습니다."}, {"t": "01:30:58", "jp": "なんで助けてくれなかったの? 俺は柱を相手にしてたんだぞ。そもそもお前は何もしてなかったんだから柱にとどめくらいさしておけよ。", "pr": "なんでたすけてくれなかったの? おれははしらをあいてにしてたんだぞ。そもそもおまえはなにもしてなかったんだからはしらにとどめくらいさしておけよ。", "ko": "왜 도와주지 않았어? 나는 기둥
