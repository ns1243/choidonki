, {"t": "02:26:17", "jp": "鬼は死にかけていた。お願いします。兄さん、どうか弟だけは助けてください。", "pr": "おにはしにかけていた。おねがいします。にいさん、どうかおとうとだけはたすけてください。", "ko": "귀신은 죽어 가고 있었다. 부탁드립니다. 형, 부디 동생만은 살려 주세요."}, {"t": "02:26:26", "jp": "悪いのは俺だけです。僕は思い出した。兄が殺された後のことを。", "pr": "わるいのはおれだけです。ぼくはおもいだした。あにがころされたのちのことを。", "ko": "잘못한 건 저뿐입니다. 나는 떠올렸다. 형이 죽임당한 뒤의 일을."}, {"t": "02:26:48", "jp": "最愛の兄に蛆が湧き、腐っていくのを見た。自分の体にも蛆が湧き始め、 僕は死の淵を見た。", "pr": "さいあいのあににうじがわき、くさっていくのをみた。じぶんのからだにもうじがわきはじめ、 ぼくはしのふちをみた。", "ko": "가장 사랑하는 형에게 구더기가 끓고, 썩어 가는 것을 봤다. 내 몸에도 구더기가 끓기 시작하고, 나는 죽음의 문턱을 봤다."}, {"t": "02:26:56", "jp": "の準備を急いで。傷口には綺麗な布を当てなさい。", "pr": "のじゅんびをいそいで。きずぐちにはきれいなぬのをあてなさい。", "ko": "(치료) 준비를 서둘러. 상처에는 깨끗한 천을 대거라."}, {"t": "02:27:04", "jp": "運良く助けられなければそのまま死んでいただろう。記憶を失っても体が覚えている。死ぬまで消えない怒りだ。だから僕はヘドを吐くほど自分を鍛えて叩き上げたんだ。", "pr": "うんよくたすけられなければそのまましんでいただろう。きおくをうってもからだがおぼえている。しぬまできえないいかりだ。だからぼくはへどをはくほどじぶんをきたえてたたきあげたんだ。", "ko": "운 좋게 구해지지 않았다면 그대로 죽었을 거다. 기억을 잃어도 몸이 기억한다. 죽을 때까지 사라지지 않는 분노다. 그래서 나는 토할 만큼 자신을 단련해 끌어올린 거다."}, {"t": "02:27:09", "jp": "この記憶を携えて 僕は戦い続ける。", "pr": "このきおくをたずさえて ぼくはたたかいつづける。", "ko": "이 기억을 안고 나는 계속 싸운다."}, {"t": "02:27:31", "jp": "鬼を根絶するために。最初に俺の刀を作ってくれた鉄戸さんは 心臓の病気で死んでしまった。", "pr": "おにをこんぜつするために。さいしょにおれのかたなをつくってくれたてつこさんは しんぞうのびょうきでしんでしまった。", "ko": "귀신을 근절하기 위해. 처음에 내 칼을 만들어 준 테츠이도 씨는 심장병으로 죽고 말았다."}, {"t": "02:27:43", "jp": "わしは心配だよ。おや、 誰が分かってくれようか、お前。", "pr": "わしはしんぱいだよ。おや、 だれがわかってくれようか、おまえ。", "ko": "나는 걱정이야. 이런, 누가 알아줄까, 너를."}, {"t": "02:27:51", "jp": "そんなことを。お前、そんなどれだけ精一杯か、どれだけ ギリギリと余裕がないか。", "pr": "そんなことを。おまえ、そんなどれだけせいいっぱいか、どれだけ ぎりぎりとよゆうがないか。", "ko": "그런 것을. 너, 그렇게 얼마나 안간힘을 쓰는지, 얼마나 빠듯하게 여유가 없는지."}, {"t": "02:28:01", "jp": "物を覚えていられんことの不安がどれだけ か。", "pr": "ものをおぼえていられんことのふあんがどれだけ か。", "ko": "물건을 기억하지 못하는 것의 불안이 얼마나 큰지."}, {"t": "02:28:09", "jp": "そして血を吐くような努力を誰が分かってくれようか。", "pr": "そしてちをはくようなどりょくをだれがわかってくれようか。", "ko": "그리고 피를 토하는 듯한 노력을 누가 알아줄까."}, {"t": "02:28:18", "jp": "わしももう長くはない。この年ではないが、どうにもお前さんが気がかりじゃ。", "pr": "わしももうながくはない。このねんではないが、どうにもおまえさんがきがかりじゃ。", "ko": "나도 이제 오래 살지 못해. 이 나이라서가 아니라, 아무래도 네가 마음에 걸려."}, {"t": "02:28:30", "jp": "鉄道さんには心配かけたな。だけど俺は もう大丈夫だよ。", "pr": "てつどうさんにはしんぱいかけたな。だけどおれは もうだいじょうぶだよ。", "ko": "테츠이도 씨에게는 걱정 끼쳤네. 하지만 나는 이제 괜찮아."}, {"t": "02:28:37", "jp": "ありがとう。ネゴー瓦礫との匂いがきついけど、確かに匂いが2つ。", "pr": "ありがとう。ねごーがれきとのにおいがきついけど、たしかににおいが2つ。", "ko": "고마워. 으윽. 잔해 냄새가 강하지만, 분명 냄새가 두 개."}, {"t": "02:29:05", "jp": "1つは禰豆子、もう1つこれは怪しい。加減死んだか。", "pr": "1つはねずこ、もう1つこれはあやしい。かげんしんだか。", "ko": "하나는 네즈코, 또 하나 이건 수상해. 아카자(?) 죽었나."}, {"t": "02:29:19", "jp": "まだ生きてるのか。なんだ一体何なのだお前は。発砲音。禰豆子。", "pr": "まだいきてるのか。なんだいったいなになのだおまえは。はっぽうおん。ねずこ。", "ko": "아직 살아 있는 거냐. 뭐야 대체 뭐냐 너는. 발포음. 네즈코."}, {"t": "02:29:35", "jp": "くそ。瓦礫が。いたぞ。鬼の娘は動けぬようだ。", "pr": "くそ。がれきが。いたぞ。おにのむすめはうごけぬようだ。", "ko": "젠장. 잔해가. 있다. 귀신 처녀는 움직이지 못하는 모양이군."}, {"t": "02:29:55", "jp": "小僧の方はまだ生きているではないか。腹立ち早々に引き裂いてくれる。", "pr": "こぞうのかたはまだいきているではないか。はらだちそうそうにひきさいてくれる。", "ko": "꼬마 쪽은 아직 살아 있지 않은가. 화가 나니 당장 갈가리 찢어 주겠다."}], "range": "02:20:12 ~ 02:29:55"}, {"title": "챕터 16", "lines": [{"t": "02:30:03", "jp": "禰豆子、刀から手を離すんだ。禰豆子、やめろ。指が切れる。", "pr": "ねずこ、かたなからてをはなすんだ。ねずこ、やめろ。ゆびがきれる。", "ko": "네즈코, 칼에서 손을 떼는 거다. 네즈코, 그만둬. 손가락이 베인다."}, {"t": "02:30:15", "jp": "禰豆子の血で刀が燃える。温度が上がって黒い刀が赤くなる。はぜる血をまとって。これは爆血と お侍い様の刀。", "pr": "ねずこのちでかたながもえる。おんどがあがってくろいかたながあかくなる。はぜるちをまとって。これはばくちと おさむらいいようのかたな。", "ko": "네즈코의 피로 칼이 불탄다. 온도가 올라가 검은 칼이 붉어진다. 튀는 피를 두르고. 이건 폭혈과 사무라이 (검사)의 칼."}, {"t": "02:30:30", "jp": "戦う時だけ赤くなるのね。普段は黒曜石のような漆黒なのね。", "pr": "たたかうときだけあかくなるのね。ふだんはこくよういしのようなしっこくなのね。", "ko": "싸울 때만 붉어지는구나. 평소에는 흑요석 같은 칠흑이구나."}, {"t": "02:31:03", "jp": "誰だ?そうだった。これは遺伝した記憶だ。俺の刀も今赤くなった。これなら 小さくしたところでわしには勝てぬ。", "pr": "だれだ?そうだった。これはいでんしたきおくだ。おれのかたなもいまあかくなった。これなら ちーさくしたところでわしにはかてぬ。", "ko": "누구지? 그랬지. 이건 유전된 기억이다. 내 칼도 지금 붉어졌다. 이거라면 (몸을) 작게 한들 나에게는 못 이겨."}, {"t": "02:31:09", "jp": "切られたぜ。痛くも痒くもないわ。", "pr": "きられたぜ。いたくもようくもないわ。", "ko": "베였다. 아프지도 가렵지도 않아."}, {"t": "02:31:33", "jp": "神楽雲の、やれた。やれたぞ。あと1体だ。", "pr": "かぐらくもの、やれた。やれたぞ。あと1からだだ。", "ko": "(히노)카구라의… 해냈다. 해냈어. 앞으로 한 마리다."}, {"t": "02:32:15", "jp": "4体目の首を切ってる。やった。同時か。同時に切れていれば、夜か。", "pr": "4からだめのくびをきってる。やった。どうじか。どうじにきれていれば、よるか。", "ko": "네 번째 (귀신)의 목을 베고 있어. 해냈다. 동시인가. 동시에 베면, 새벽인가."}, {"t": "02:32:28", "jp": "なんだこの姿は?まるで。あ、なんだあの斬撃は?再生できぬ。焼けるように痛い。", "pr": "なんだこのすがたは?まるで。あ、なんだあのざんげきは?さいせいできぬ。やけるようにいたい。", "ko": "뭐냐 이 모습은? 마치. 아, 뭐냐 저 참격은? 재생이 안 돼. 타는 듯이 아프다."}, {"t": "02:32:41", "jp": "落ち着け、見苦しい。遅いが再生自体はできている。", "pr": "おちつけ、みぐるしい。おそいがさいせいじたいはできている。", "ko": "진정해, 꼴사납다. 느리지만 재생 자체는 되고 있다."}, {"t": "02:32:46", "jp": "攻撃は効いてる。玄弥の状態が分からないが 1体切ってくれたことで分かった。", "pr": "こうげきはきいてる。げんやのじょうたいがわからないが 1からだきってくれたことでわかった。", "ko": "공격은 듣고 있어. 겐야의 상태는 모르겠지만 한 마리 베어 준 덕에 알았다."}, {"t": "02:32:50", "jp": "おそらく4体同時に切ったところで妓夫太郎たちのようには倒せないんだ。ずっと気になっていたことがあった。違和感の正体。", "pr": "おそらく4からだどうじにきったところでぎゅうたろうたちのようにはたおせないんだ。ずっときになっていたことがあった。いわかんのしょうたい。", "ko": "아마 네 마리 동시에 벤다 해도 규타로 일행처럼은 못 쓰러뜨려. 계속 신경 쓰이던 게 있었다. 위화감의 정체."}, {"t": "02:33:23", "jp": "一瞬だけしたあの匂い。そう、あれは5体目の匂いだ。の鬼が風を使ったおかげで温泉の異の匂いが飛んでる。近い。どこかに潜んで 図に乗るなよ。", "pr": "いっしゅんだけしたあのにおい。そう、あれは5からだめのにおいだ。のおにがかぜをつかったおかげでおんせんのことのにおいがとんでる。ちかい。どこかにひそんで ずにのるなよ。", "ko": "한순간만 났던 그 냄새. 그래, 저건 다섯 번째의 냄새다. (바람의) 귀신이 바람을 쓴 탓에 온천의 유황 냄새가 날아갔어. 가깝다. 어딘가에 숨어서 우쭐대지 마라."}, {"t": "02:33:41", "jp": "上弦を倒すのは俺だ。どうしたんだ、涎が出てるぞ。", "pr": "じょうげんをたおすのはおれだ。どうしたんだ、よだれがでてるぞ。", "ko": "상현을 쓰러뜨리는 건 나다. 무슨 일이야, 침 흘리고 있어."}, {"t": "02:33:51", "jp": "柱になるのは俺だ。なるほど。そうか。分かった。俺と禰豆子が全力で援護する。", "pr": "はしらになるのはおれだ。なるほど。そうか。わかった。おれとねずこがぜんりょくでえんごする。", "ko": "기둥이 되는 건 나다. 과연. 그런가. 알았다. 나와 네즈코가 전력으로 엄호하마."}, {"t": "02:33:59", "jp": "3人で頑張ろう。はあ。危ない。もう怒り鬼が復活した。", "pr": "3にんでがんばろう。はあ。あぶない。もういかりおにがふっかつした。", "ko": "셋이서 힘내자. 하아. 위험해. 벌써 분노한 귀신이 부활했다."}, {"t": "02:34:19", "jp": "急ごう。5体目の鬼がいる。そいつの首を切るんだ。", "pr": "いそごう。5からだめのおにがいる。そいつのくびをきるんだ。", "ko": "서두르자. 다섯 번째 귀신이 있다. 그놈의 목을 베는 거다."}, {"t": "02:34:25", "jp": "5体目。鬼の位置は俺がいる。北東だ。北東にまっすぐ。どこだ?いた。", "pr": "5からだめ。おにのいちはおれがいる。ほくとうだ。ほくとうにまっすぐ。どこだ?いた。", "ko": "다섯 번째. 귀신의 위치는 내가 안다. 북동쪽이다. 북동쪽으로 곧장. 어디냐? 있다."}, {"t": "02:34:37", "jp": "ちっさくが見つけられるか、こんなもの普通。", "pr": "ちっさくがみつけられるか、こんなものふつう。", "ko": "이렇게 작은 걸 찾아낼 수 있나, 이런 거 보통."}, {"t": "02:34:54", "jp": "切れねえ。俺じゃ切れない。お前が切れ。", "pr": "きれねえ。おれじゃきれない。おまえがきれ。", "ko": "못 베겠어. 나로선 못 벤다. 네가 베어라."}, {"t": "02:35:09", "jp": "行け。なんだ声だ。耳がなんだ。俺の後ろに、後ろに何かいる。次郎、避けろ。", "pr": "いけ。なんだこえだ。みみがなんだ。おれのうしろに、うしろになにかいる。じろう、さけろ。", "ko": "가라. 뭐야 소리다. 귀가 뭐… 내 뒤에, 뒤에 뭔가 있다. 겐야, 피해라."}, {"t": "02:35:39", "jp": "禰豆子、大丈夫か?弱きをいぶる鬼畜。", "pr": "ねずこ、だいじょうぶか?よわきをいぶるきちく。", "ko": "네즈코, 괜찮아? 약한 자를 괴롭히는 귀신 같은 놈."}, {"t": "02:35:56", "jp": "不快、不愉快極まり。極悪人どもめが。6体目や。", "pr": "ふかい、ふゆかいきわまり。ごくあくにんどもめが。6からだめや。", "ko": "불쾌, 불유쾌 그지없다. 극악인 놈들이. 여섯 번째다."}, {"t": "02:36:10", "jp": "6体目じゃないのか。怒哀。他の鬼の気配が消えてる。待て。", "pr": "6からだめじゃないのか。どあい。ほかのおにのけはいがきえてる。まて。", "ko": "여섯 번째 아닌가. 음. 다른 귀신의 기척이 사라졌어. 기다려."}, {"t": "02:36:25", "jp": "なんぞ貴様、わしのすることに何か不満でもあるのか?王悪人どもめらぼ。", "pr": "なんぞきさま、わしのすることになにかふまんでもあるのか?おうあくにんどもめらぼ。", "ko": "뭐냐 네놈, 내가 하는 일에 뭔가 불만이라도 있나? 극악인 놈들이라고?"}, {"t": "02:36:39", "jp": "どうして、どうして俺たちが悪人なんだ?先ほど貴様らは手のひらに乗るような小さく弱き 物を切ろうとした。", "pr": "どうして、どうしておれたちがあくにんなんだ?さきほどきさまらはてのひらにのるようなちーさくよわき ものをきろうとした。", "ko": "어째서, 어째서 우리가 악인이냐? 방금 네놈들은 손바닥에 올라갈 만큼 작고 약한 것을 베려고 했다."}, {"t": "02:36:50", "jp": "なんという極悪。これはもう鬼畜の所業だ。小さく弱き者。誰か、誰かだ。ふざけるな。", "pr": "なんというごくあく。これはもうきちくのしょぎょうだ。ちーさくよわきもの。だれか、だれかだ。ふざけるな。", "ko": "이 무슨 극악. 이건 이미 귀신 같은 짓이다. 작고 약한 자. 누군가, 누군가다. 까불지 마라."}, {"t": "02:37:06", "jp": "お前たちのこの匂い。血の匂い。食った人間の数は。", "pr": "おまえたちのこのにおい。ちのにおい。くっったにんげんのかずは。", "ko": "너희의 이 냄새. 피 냄새. 먹은 인간의 수는."}, {"t": "02:37:11", "jp": "100や200じゃないだろう。大勢の人を殺して食っておいて被害者ぶるのはやめろ。", "pr": "100や200じゃないだろう。おおぜいのにんをころしてくっっておいてひがいしゃぶるのはやめろ。", "ko": "100이나 200이 아니겠지. 수많은 사람을 죽여 먹어 놓고 피해자인 척하는 건 그만둬라."}, {"t": "02:37:19", "jp": "ねじ曲がった性だ。絶対に許さない。悪鬼滅殺。お前の首は俺が切る。", "pr": "ねじまがったせいだ。ぜったいにゆるさない。あっきめつさつ。おまえのくびはおれがきる。", "ko": "비뚤어진 본성이다. 절대로 용서하지 않겠다. 악귀멸살. 네 목은 내가 벤다."}, {"t": "02:37:23", "jp": "俺は呼吸を使えねえだが、こんな状態じゃ刀も触れねえ。", "pr": "おれはこきゅうをつかえねえだが、こんなじょうたいじゃかたなもふれねえ。", "ko": "나는 호흡을 못 써. 게다가 이런 상태로는 칼도 못 잡아."}, {"t": "02:37:39", "jp": "ならこれしかねえ。俺は鬼を食うことで一時的だが鬼の体質に なれる。", "pr": "ならこれしかねえ。おれはおにをくうことでいちじてきだがおにのたいしつに なれる。", "ko": "그렇다면 이 방법밖에 없어. 나는 귀신을 먹음으로써 일시적이지만 귀신의 체질이 될 수 있어."}, {"t": "02:37:57", "jp": "強い鬼を食えばそれだけ再生力も上がり、 筋力も上がる。", "pr": "つよいおにをくえばそれだけさいせいりきもあがり、 きんりょくもあがる。", "ko": "강한 귀신을 먹으면 그만큼 재생력도 오르고, 근력도 오른다."}, {"t": "02:38:04", "jp": "鬼を食ってまで強くなりたかったのは柱に なって兄貴に認められたかったから。", "pr": "おにをくっってまでつよくなりたかったのははしらに なってあにきにみとめられたかったから。", "ko": "귀신을 먹어서까지 강해지고 싶었던 건 기둥이 되어 형에게 인정받고 싶었기 때문."}, {"t": "02:38:20", "jp": "そして、あの時のことを謝りたかったんだ。", "pr": "そして、あのときのことをあやまりたかったんだ。", "ko": "그리고, 그때의 일을 사과하고 싶었어."}, {"t": "02:38:33", "jp": "あの日、夜になっても戻ってこないお袋を兄貴が探しに出かけた。", "pr": "あのにち、よるになってももどってこないおふくろをあにきがさがしにでかけた。", "ko": "그날, 밤이 돼도 돌아오지 않는 어머니를 형이 찾으러 나갔다."}, {"t": "02:38:42", "jp": "そして、夜明け直前、家に侵入してきた何かが家族を殺した。", "pr": "そして、よあけちょくぜん、いえにしんにゅうしてきたなにかがかぞくをころした。", "ko": "그리고, 새벽 직전, 집에 침입해 온 무언가가 가족을 죽였다."}, {"t": "02:38:50", "jp": "獣か。夜明け。いや、狼だ。暗くて見えない。", "pr": "けものか。よあけ。いや、おおかみだ。くらくてみえない。", "ko": "짐승인가. 새벽. 아니, 늑대다. 어두워서 안 보여."}, {"t": "02:39:03", "jp": "早い。玄弥、逃げろ。兄ちゃん。", "pr": "はやい。げんや、にげろ。にいちゃん。", "ko": "빠르다. 겐야, 도망쳐. 형."}, {"t": "02:39:12", "jp": "何が起こってるんだ？さっきのは何だったんだ？兄ちゃんは 母ちゃん。", "pr": "なにがおこってるんだ？さっきのはなんだったんだ？にいちゃんは かあちゃん。", "ko": "무슨 일이 일어나는 거야? 방금 그건 뭐였지? 형은. 엄마."}, {"t": "02:39:18", "jp": "ああ、母ちゃん。母ちゃん。", "pr": "ああ、かあちゃん。かあちゃん。", "ko": "아아, 엄마. 엄마."}, {"t": "02:39:26", "jp": "なんで母ちゃんを殺したんだよ。人殺し、人殺し。", "pr": "なんでかあちゃんをころしたんだよ。ひとごろし、ひとごろし。", "ko": "왜 엄마를 죽인 거야. 살인자, 살인자."}, {"t": "02:39:40", "jp": "あの時家族を襲った狼だと思ったものは鬼 になった母ちゃんだった。", "pr": "あのときかぞくをおそったおおかみだとおもったものはおに になったかあちゃんだった。", "ko": "그때 가족을 습격한 늑대라고 생각했던 것은 귀신이 된 엄마였다."}, {"t": "02:39:45", "jp": "最愛の母を手にかけて打ちのめされていた 時、弟から罵倒されてどんな気持ちだったろうか。", "pr": "さいあいのははをてにかけてうちのめされていた とき、おとうとからばとうされてどんなきもちだったろうか。", "ko": "가장 사랑하는 어머니를 직접 죽이고 망연자실해 있을 때, 동생에게 욕먹은 형은 어떤 기분이었을까."}, {"t": "02:39:52", "jp": "「ひどいこと言ってごめん 兄ちゃん。", "pr": "「ひどいこといってごめん にいちゃん。", "ko": "「심한 말 해서 미안해 형."}], "range": "02:30:03 ~ 02:39:52"}, {"title": "챕터 17", "lines": [{"t": "02:40:01", "jp": "」喜怒哀楽の鬼の力も使える。しかも攻撃力が上がっている。", "pr": "」きどあいらくのおにのりきもつかえる。しかもこうげきりょくがあがっている。", "ko": "」 희로애락의 귀신의 힘도 쓸 수 있다. 게다가 공격력이 올라가 있다."}, {"t": "02:40:28", "jp": "霞柱さん、ごめんね。遅れちゃってギリギリだったね。頑張ったね。", "pr": "かすみはしらさん、ごめんね。おくれちゃってぎりぎりだったね。がんばったね。", "ko": "하주(안개의 기둥) 씨, 미안해. 늦어서 아슬아슬했네. 잘 버텼어."}, {"t": "02:40:40", "jp": "偉いぞ。ここからは私に任せて。時透さん。そいつは本体じゃない。", "pr": "えらいぞ。ここからはわたしにまかせて。ときとうるさん。そいつはほんたいじゃない。", "ko": "장하다. 여기서부터는 나에게 맡기고. 토키토 씨. 그놈은 본체가 아니야."}, {"t": "02:41:04", "jp": "やはりはねたじ方し、今の攻撃を食らってなお肉の形を保っているとは。そうか、娘隊体に見合わぬ 筋力、得意体質。", "pr": "やはりはねたじほうし、いまのこうげきをくらってなおにくのかたちをたもっているとは。そうか、むすめたいからだにみあわぬ きんりょく、とくいたいしつ。", "ko": "역시 (호흡으로) 튕겨 냈군. 방금 공격을 받고도 살의 형태를 유지하고 있다니. 그렇군, 처녀(체구)에 어울리지 않는 근력, 특이 체질."}, {"t": "02:41:24", "jp": "これは良い。質の良い肉を食らうことは強 さに直結する。", "pr": "これはよい。しつのよいにくをくらうことはきょう さにちょっけつする。", "ko": "이거 좋군. 질 좋은 살을 먹는 것은 강함으로 직결된다."}, {"t": "02:41:42", "jp": "しかし、まずは頭蓋と脳みそを殴りつけると するか。", "pr": "しかし、まずはずがいとのうみそをなぐりつけると するか。", "ko": "하지만, 우선은 두개골과 뇌수를 후려치기로 할까."}, {"t": "02:41:50", "jp": "「君と結婚できるのなんて熊かイノシシか牛 でしょう。", "pr": "「くんとけっこんできるのなんてくまかいのししかうし でしょう。", "ko": "「너와 결혼할 수 있는 건 곰이나 멧돼지나 소겠지."}, {"t": "02:42:02", "jp": "このお見合いはなかったことに。いっぱい食べて力の強い女の子はダメなの?", "pr": "このおみあいはなかったことに。いっぱいたべてちからのつよいおんなのこはだめなの?", "ko": "이 맞선은 없던 일로. 많이 먹고 힘이 센 여자아이는 안 되는 거야?"}, {"t": "02:42:20", "jp": "私のママの私がいられる場所ってこの世にないの?", "pr": "わたしのままのわたしがいられるばしょってこのよにないの?", "ko": "나의 나로 있을 수 있는 곳이 이 세상에 없는 거야?"}, {"t": "02:42:28", "jp": "立てた。次の攻撃来るぞ。分かってるつうの。", "pr": "たてた。つぎのこうげきくるぞ。わかってるつうの。", "ko": "일어섰다. 다음 공격 온다. 알고 있다니까."}, {"t": "02:42:37", "jp": "1番可能性のあるこの人が希望の光だ。この人さえ生きていてくれたら絶対勝てる。う、 みんなありがとう。", "pr": "1ばんかのうせいのあるこのにんがきぼうのひかりだ。このにんさえいきていてくれたらぜったいかてる。う、 みんなありがとう。", "ko": "가장 가능성 있는 이 사람이 희망의 빛이다. 이 사람만 살아 있어 주면 반드시 이긴다. 으, 모두 고마워."}, {"t": "02:42:49", "jp": "あちらなのにエマしちゃってごめんね。仲間は絶対死なせないから。", "pr": "あちらなのにえましちゃってごめんね。なかまはぜったいしなせないから。", "ko": "저쪽인데 엄살 부려서 미안해. 동료는 절대 죽게 하지 않을 테니까."}, {"t": "02:42:59", "jp": "鬼殺隊は私の大切な居場所なんだから条件だろうが何だろうが関係ないわよ。こっちは私がなんとかするから炭治郎君たちは本体を倒してもっと心拍数を上げなくちゃ。もっと血の巡りを早くして。もっと早く。", "pr": "おにさつたいはわたしのたいせつないばしょなんだからじょうけんだろうがなんだろうがかんけいないわよ。こっちはわたしがなんとかするからたんじろうくんたちはほんたいをたおしてもっとしんぱくすうをあげなくちゃ。もっとちのめぐりをはやくして。もっとはやく。", "ko": "귀살대는 내 소중한 보금자리니까 조건이든 뭐든 상관없어. 이쪽은 내가 어떻게든 할 테니까 탄지로 일행은 본체를 쓰러뜨려. 더 심박수를 올려야 해. 더 피의 순환을 빠르게. 더 빨리."}, {"t": "02:43:13", "jp": "もっと悪いやつには絶対負けない。", "pr": "もっとわるいやつにはぜったいまけけない。", "ko": "더 나쁜 놈에게는 절대 지지 않아."}, {"t": "02:43:35", "jp": "ならばれ恋の呼吸 5の揺 敵圧しい小娘。", "pr": "ならばれこいのこきゅう 5のよう てきおしいこむすめ。", "ko": "그렇다면 (받아라) 사랑의 호흡, 5형, (기술명). 가증스러운 계집애."}, {"t": "02:43:58", "jp": "絶対に行かせない。お見合いが断した日、髪の色もたくさん食べることも隠さなきゃいけないと思ったの。力も弱いふりをしたら私と結婚したいという人が現れたわ。いいのかな、これ。", "pr": "ぜったいにいかせない。おみあいがだんしたにち、かみのいろもたくさんたべることもかくさなきゃいけないとおもったの。りきもよわいふりをしたらわたしとけっこんしたいというにんがあらわれたわ。いいのかな、これ。", "ko": "절대로 가게 하지 않아. 맞선이 깨진 날, 머리 색도 많이 먹는 것도 숨겨야 한다고 생각했어. 힘도 약한 척했더니 나와 결혼하고 싶다는 사람이 나타났어. 괜찮은 걸까, 이거."}, {"t": "02:44:34", "jp": "いいのかな?私一生こうして生きてくのか な?", "pr": "いいのかな?わたしいっしょうこうしていきてくのか な?", "ko": "괜찮은 걸까? 나 평생 이렇게 살아가는 걸까?"}, {"t": "02:44:56", "jp": "いっぱい食べるのも力が強いのも髪の毛も全部私なのに私は私じゃないふり するの?", "pr": "いっぱいたべるのもちからがつよいのもかみのけもぜんぶわたしなのにわたしはわたしじゃないふり するの?", "ko": "많이 먹는 것도 힘이 센 것도 머리카락도 전부 나인데 나는 내가 아닌 척하는 거야?"}, {"t": "02:45:04", "jp": "私が私のままできること人の役に立てることはあるんじゃないかな。私の ままの私がいられる場所ってこの世にないの？", "pr": "わたしがわたしのままできることにんのやくにたてることはあるんじゃないかな。わたしの ままのわたしがいられるばしょってこのよにないの？", "ko": "내가 나인 채로 할 수 있는 일, 남에게 도움이 될 수 있는 일이 있지 않을까. 나인 채의 내가 있을 수 있는 곳이 이 세상에 없는 거야?"}, {"t": "02:45:12", "jp": "私のこと好きになってくれる人はいないの？", "pr": "わたしのことすきになってくれるにんはいないの？", "ko": "나를 좋아해 줄 사람은 없는 거야?"}, {"t": "02:45:18", "jp": "こんなのおかしいよ。おかしい。 君は神様から特別に愛された人なんだよ。みり、自分の強さを誇りなさい。君を悪く言う人はみんな君の才能を恐れ羨ましがっているだけなんだよ。", "pr": "こんなのおかしいよ。おかしい。 くんはかみさまからとくべつにあいされたにんなんだよ。みり、じぶんのつよさをほこりなさい。くんをわるくいうにんはみんなくんのさいのうをおそれうらやましがっているだけなんだよ。", "ko": "이런 거 이상해. 이상해. 너는 신에게 특별히 사랑받은 사람이야. 칸로지, 자신의 강함을 자랑스러워해. 너를 나쁘게 말하는 사람은 다 네 재능을 두려워하고 부러워할 뿐이야."}, {"t": "02:45:26", "jp": "鬼殺隊ではみんなが私を認めてくれたの。女の子なのにこんな強くっていいのかなって。", "pr": "おにさつたいではみんながわたしをみとめてくれたの。おんなのこなのにこんなつよくっていいのかなって。", "ko": "귀살대에서는 모두가 나를 인정해 줬어. 여자아이인데 이렇게 강해도 되는 걸까 하고."}, {"t": "02:45:43", "jp": "また人間じゃないみたいに言われるんじゃないのかなって怖くって力を抑えていたけどもうやめるね。", "pr": "またにんげんじゃないみたいにいわれるんじゃないのかなってこわくってちからをおさえていたけどもうやめるね。", "ko": "또 인간이 아닌 것처럼 말해지지 않을까 하고 무서워서 힘을 억눌렀었지만 이제 그만둘게."}, {"t": "02:45:53", "jp": "ありがとう、隊のみんな。仲間は絶対に死なせない。鬼殺隊は私の大切な居場所なんだから。", "pr": "ありがとう、たいのみんな。なかまはぜったいにしなせない。おにさつたいはわたしのたいせつないばしょなんだから。", "ko": "고마워, 대(隊)의 모두. 동료는 절대로 죽게 하지 않아. 귀살대는 내 소중한 보금자리니까."}, {"t": "02:46:01", "jp": "おじさんがあの鬼を止めてくれている間に体の首を切るに援 どこ行きやがった？", "pr": "おじさんがあのおにをとめてくれているまにからだのくびをきるにえん どこいきやがった？", "ko": "아저씨가 저 귀신을 막아 주는 동안에 본체의 목을 베어야… 어디로 간 거야?"}, {"t": "02:46:13", "jp": "どこだ？どこだ？貴様逃げるな。責任から逃げるな。", "pr": "どこだ？どこだ？きさまにげるな。せきにんからにげるな。", "ko": "어디냐? 어디냐? 네놈 도망치지 마라. 책임에서 도망치지 마라."}, {"t": "02:46:29", "jp": "ひ、お前はわしがかわいそうだとは思わんの。お前たち弱いものいじめをするなあ。", "pr": "ひ、おまえはわしがかわいそうだとはおもわんの。おまえたちよわいものいじめをするなあ。", "ko": "흐, 너는 내가 가엾다고는 생각 안 하느냐. 너희 약한 자 괴롭히기를 하지 마라."}, {"t": "02:46:43", "jp": "て、てめえの理屈は全部クソなんだよ。ボケ野郎が。", "pr": "て、てめえのりくつはぜんぶくそなんだよ。ぼけやろうが。", "ko": "네, 네놈의 논리는 전부 헛소리야. 멍청한 놈이."}, {"t": "02:47:13", "jp": "お前が今まで犯した罪悪。その全ての責任は必ず取らせる。絶対に逃さない。", "pr": "おまえがいままでおかしたざいあく。そのすべてのせきにんはかならずとらせる。ぜったいにのがさない。", "ko": "네가 지금까지 저지른 죄악. 그 모든 책임은 반드시 지게 하겠다. 절대로 놓치지 않는다."}, {"t": "02:47:15", "jp": "行け行け。今度こそ渾身の力だ。", "pr": "いけいけ。こんどこそこんしんのちからだ。", "ko": "가라 가라. 이번에야말로 혼신의 힘이다."}, {"t": "02:47:49", "jp": "え、炭治。レッツゴー。", "pr": "え、すみおさむ。れっつごー。", "ko": "어, 탄지로(?). 렛츠 고."}, {"t": "02:48:26", "jp": "まずい。再生が遅くなってきた。閉めた。の人間を食えば ね。", "pr": "まずい。さいせいがおそくなってきた。しめた。のにんげんをくえば ね。", "ko": "큰일이다. 재생이 느려지기 시작했어. 닫혔다. (더 많은) 인간을 먹으면."}, {"t": "02:48:39", "jp": "禰豆子待て、炭治郎使え。炭治郎それを使え。", "pr": "ねずこまて、たんじろうつかえ。たんじろうそれをつかえ。", "ko": "네즈코 기다려, 탄지로 써라. 탄지로 그걸 써라."}, {"t": "02:48:54", "jp": "返せ。ふざけるな。殺すぞ。使うな。", "pr": "かえせ。ふざけるな。ころすぞ。つかうな。", "ko": "돌려줘. 까불지 마. 죽인다. 쓰지 마."}, {"t": "02:49:07", "jp": "時任ありがとう。塩部一点が開ける。", "pr": "ときとうありがとう。しおぶいってんがひらける。", "ko": "토키토 고마워. 시야가 트인 (장소) 한 점이 열린다."}, {"t": "02:49:49", "jp": "この開けた場所はまずい。禰豆子、こっちに来なくていい。お前だ。お前なんだ。危ないのは日が刺すから。日に当たるとお前は死んでしまう。禰豆子 逃げろ。", "pr": "このひらけたばしょはまずい。ねずこ、こっちにこなくていい。おまえだ。おまえなんだ。あぶないのはにちがさすから。にちにあたるとおまえはしんでしまう。ねずこ にげろ。", "ko": "이 트인 장소는 위험해. 네즈코, 이쪽에 안 와도 돼. 너다. 너야. 위험한 건. 해가 비치니까. 햇빛에 닿으면 너는 죽어 버려. 네즈코 도망쳐."}], "range": "02:40:01 ~ 02:49:49"}, {"title": "챕터 18", "lines": [{"t": "02:50:11", "jp": "日陰になるところへ。禰豆子。", "pr": "ひかげになるところへ。ねずこ。", "ko": "그늘진 곳으로. 네즈코."}, {"t": "02:50:18", "jp": "本体は怯えだったはず。下の文字が違う。しくじった。飛べばあいつにとどめよ。", "pr": "ほんたいはおびえだったはず。したのもじがちがう。しくじった。とべばあいつにとどめよ。", "ko": "본체는 겁먹고 있었을 거다. 아래 글자가 다르다. 실수했다. (이놈이) 날면 저놈에게 마무리를."}, {"t": "02:50:33", "jp": "レッツゴー。縮めろ。体を小さくするんだ。", "pr": "れっつごー。ちぢめろ。からだをちーさくするんだ。", "ko": "렛츠 고. 줄여라. 몸을 작게 하는 거다."}, {"t": "02:50:58", "jp": "まだ登り切ってなくてもこれほど禰豆子 ああ、見えた。", "pr": "まだのぼりきってなくてもこれほどねずこ ああ、みえた。", "ko": "아직 (해가) 다 떠오르지 않았는데도 이렇게나 네즈코… 아아, 보였다."}, {"t": "02:51:23", "jp": "決断できない。決 あ。", "pr": "けつだんできない。けつ あ。", "ko": "결단을 못 내려. 결단… 아."}, {"t": "02:52:12", "jp": "Ahは鍵分けろ。本体は遠くには逃げていない。本体がいきなり遠くへ離れたなら匂いで気づいたはず。でろ。", "pr": "Ahはかぎわけろ。ほんたいはとおくにはにげていない。ほんたいがいきなりとおくへはなれたならにおいできづいたはず。でろ。", "ko": "으아. 나눠서 (찾)아라. 본체는 멀리는 도망치지 않았다. 본체가 갑자기 멀리 떨어졌다면 냄새로 눈치챘을 거다. 나와라."}, {"t": "02:53:24", "jp": "形をいろ。見つけた。 今度こそおしまいだ。引きもらを持ってみ。", "pr": "かたちをいろ。みつけた。 こんどこそおしまいだ。ひきもらをもってみ。", "ko": "모습을 (드러)내라. 찾았다. 이번에야말로 끝이다. (기술)을 (펼쳐) 봐라."}, {"t": "02:54:03", "jp": "だ。作ってくれた将棋だ。", "pr": "だ。つくってくれたしょうぎだ。", "ko": "(이건) 만들어 준 장기 (말)이다."}, {"t": "02:54:35", "jp": "滅子 ありがとう。 早く早く早く。", "pr": "めつこ ありがとう。 はやくはやくはやく。", "ko": "네즈코 고마워. 빨리 빨리 빨리."}, {"t": "02:55:18", "jp": "勝った。禰豆子を犠牲にして。 か殿のかどのあれ あ。", "pr": "かった。ねずこをぎせいにして。 かどののかどのあれ あ。", "ko": "이겼다. 네즈코를 희생해서. 우부야시키 님의 (말의) 그것… 아."}, {"t": "02:55:48", "jp": "おはよ。 たまただろ。", "pr": "おはよ。 たまただろ。", "ko": "잘 잤어. 우연이겠지."}, {"t": "02:57:03", "jp": "息子大丈夫かお前?人間に よかった。ない、大丈夫。", "pr": "むすこだいじょうぶかおまえ?にんげんに よかった。ない、だいじょうぶ。", "ko": "너 괜찮아? 인간으로 (돌아와서) 다행이야. 아니, 괜찮아."}, {"t": "02:57:16", "jp": "喋ってるだけど目も牙もそのままだ。", "pr": "しゃべってるだけどめもきばもそのままだ。", "ko": "말은 하고 있는데 눈도 송곳니도 그대로다."}, {"t": "02:57:28", "jp": "人間に戻ったわけじゃない。 うん。 で、でも 良かったね。ね。", "pr": "にんげんにもどったわけじゃない。 うん。 で、でも よかったね。ね。", "ko": "인간으로 돌아온 건 아니야. 응. 그, 그래도 다행이네. 응."}, {"t": "02:57:40", "jp": "いや、本当に良かった。 ちりになって消えたりしなくて本当に よかったよかったず無視でよかった よかったえ、 良かったな。", "pr": "いや、ほんとうによかった。 ちりになってきえたりしなくてほんとうに よかったよかったずむしでよかった よかったえ、 よかったな。", "ko": "아니, 정말 다행이야. 먼지가 되어 사라지거나 하지 않아서 정말 다행이야 다행이야. 네즈코 무사해서 다행이야 다행이야. 어, 잘됐다."}, {"t": "02:58:27", "jp": "なんじゃか。もう無理。あー、助かった。炭治郎君たち本体の首を切ったんだわ。", "pr": "なんじゃか。もうむり。あー、たすかった。たんじろうくんたちほんたいのくびをきったんだわ。", "ko": "뭐야. 이제 무리. 아, 살았다. 탄지로 일행이 본체의 목을 벤 거야."}, {"t": "02:58:42", "jp": "炭治郎大丈夫と時と君刀ありがとう。こっちこそありがとう。君のおかげで大切なものを取り戻した。", "pr": "たんじろうだいじょうぶとときとくんかたなありがとう。こっちこそありがとう。くんのおかげでたいせつなものをとりもどした。", "ko": "탄지로 괜찮아. 토키토 군 칼 고마워. 이쪽이야말로 고마워. 네 덕분에 소중한 것을 되찾았어."}, {"t": "02:59:14", "jp": "え、そんな何もしてないよ、俺。それにしても禰豆子はどうなってるの?", "pr": "え、そんななにもしてないよ、おれ。それにしてもねずこはどうなってるの?", "ko": "어, 그런 거 아무것도 안 했어, 나. 그건 그렇고 네즈코는 어떻게 된 거야?"}, {"t": "02:59:21", "jp": "いや、それがみんな勝った。勝った。みんなで勝ったよ。すごいよ。生きてるよ。良かった。", "pr": "いや、それがみんなかった。かった。みんなでかったよ。すごいよ。いきてるよ。よかった。", "ko": "아니, 그게 모두가 이겼어. 이겼어. 다 같이 이겼어. 대단해. 살아 있어. 다행이야."}, {"t": "02:59:26", "jp": "おお、良かったね。良かったね。", "pr": "おお、よかったね。よかったね。", "ko": "오, 다행이야. 다행이야."}, {"t": "02:59:48", "jp": "ついに太陽を克服するものが現れた。", "pr": "ついにたいようをこくふくするものがあらわれた。", "ko": "마침내 태양을 극복하는 자가 나타났다."}], "range": "02:50:11 ~ 02:59:48"}, {"title": "챕터 19", "lines": [{"t": "03:00:21", "jp": "よくやった。反転が長かった。このため2000年増やしたくもない同類を増やし続けたのだ。", "pr": "よくやった。はんてんがながかった。このため2000としまやしたくもないどうるいをふやしつづけたのだ。", "ko": "잘했다. (인간으로) 되돌아간 시간이 길었다. 그래서 2000년, 늘리고 싶지도 않은 동족을 계속 늘려 온 것이다."}, {"t": "03:00:32", "jp": "バレし鬼。あの娘を食って取り込めば私も 太陽を克服できる。", "pr": "ばれしおに。あのむすめをくっってとりこめばわたしも たいようをこくふくできる。", "ko": "(이건 처음 보는) 귀신. 저 처녀를 먹어 흡수하면 나도 태양을 극복할 수 있다."}, {"t": "03:00:41", "jp": "あれはまだ平安と呼ばれる時代だった。", "pr": "あれはまだへいあんとよばれるじだいだった。", "ko": "그것은 아직 헤이안이라 불리던 시대였다."}, {"t": "03:00:56", "jp": "私は医者に20歳まで生きられぬと宣告を受け、診察と投薬を受ける日々を 繰り返していた。", "pr": "わたしはいしゃに20としまでいきられぬとせんこくをうけ、しんさつととうやくをうけるひびを くりかえしていた。", "ko": "나는 의사에게 스무 살까지 살지 못한다고 선고받고, 진찰과 투약을 받는 나날을 반복하고 있었다."}, {"t": "03:01:04", "jp": "だが、止まらぬ病状の悪化に嫌気がさした 私は医者を殺した。", "pr": "だが、とまらぬびょうじょうのあっかにいやけがさした わたしはいしゃをころした。", "ko": "하지만, 멈추지 않는 병세의 악화에 진절머리가 난 나는 의사를 죽였다."}, {"t": "03:01:14", "jp": "けれども、その医者の薬が効いていたと いうのが分かったのは医者を殺して間もなくのことだった。", "pr": "けれども、そのいしゃのくすりがきいていたと いうのがわかったのはいしゃをころしてかんもなくのことだった。", "ko": "하지만, 그 의사의 약이 듣고 있었다는 것을 알게 된 것은 의사를 죽이고 얼마 안 되어서였다."}, {"t": "03:01:24", "jp": "私の体は生気が漲り、 強靭な肉体を手に入れたかと思えたが、問題があった。", "pr": "わたしのからだはせいきがみなぎり、 きょうじんなにくたいをてにいれたかとおもえたが、もんだいがあった。", "ko": "내 몸은 생기가 넘치고, 강인한 육체를 손에 넣은 듯했지만, 문제가 있었다."}, {"t": "03:01:42", "jp": "人の血肉を欲するようになった。日の光の下を歩けない。", "pr": "にんのけつにくをほっするようになった。にちのひかりのしたをあるけない。", "ko": "사람의 피와 살을 탐하게 되었다. 햇빛 아래를 걸을 수 없다."}, {"t": "03:01:49", "jp": "分かるのである。日光に当たれば死ぬのだと。この私が昼間のうち行動を制限される のは屈辱であり、怒りが募った。", "pr": "わかるのである。にっこうにあたればしぬのだと。このわたしがひるまのうちこうどうをせいげんされる のはくつじょくであり、いかりがつのった。", "ko": "아는 것이다. 햇빛을 받으면 죽는다고. 이 내가 낮 동안 행동을 제한받는 것은 굴욕이고, 분노가 쌓였다."}, {"t": "03:01:58", "jp": "私は完全な不味となるため、太陽を克服 できる体質のもの探し続けてきた。", "pr": "わたしはかんぜんなふみとなるため、たいようをこくふく できるたいしつのものさがしつづけてきた。", "ko": "나는 완전한 불사신이 되기 위해, 태양을 극복할 수 있는 체질을 가진 자를 계속 찾아왔다."}, {"t": "03:02:10", "jp": "そしてとうとう見つけた。", "pr": "そしてとうとうみつけた。", "ko": "그리고 마침내 찾아냈다."}, {"t": "03:02:18", "jp": "あの娘を食って取り込めば、私も太陽を克服 できる。", "pr": "あのむすめをくっってとりこめば、わたしもたいようをこくふく できる。", "ko": "저 처녀를 먹어 흡수하면, 나도 태양을 극복할 수 있다."}, {"t": "03:02:23", "jp": "うわ、可愛すぎて死にそう。おおり。どうしたの？禰豆子ちゃん喋ってる じゃない。", "pr": "うわ、かわいすぎてしにそう。おおり。どうしたの？ねずこちゃんしゃべってる じゃない。", "ko": "우와, 너무 귀여워서 죽을 것 같아. 오. 무슨 일이야? 네즈코 짱 말하고 있잖아."}, {"t": "03:02:36", "jp": "俺のため、俺のためかな？俺のために頑張ったんだね。とても嬉しいよ。", "pr": "おれのため、おれのためかな？おれのためにがんばったんだね。とてもうれしいよ。", "ko": "나를 위해, 나를 위해서인가? 나를 위해 힘낸 거구나. 정말 기뻐."}, {"t": "03:02:41", "jp": "俺たちついに結婚かな？血の禰豆子ちゃんも 素敵だったけど、太陽の下の禰豆子ちゃん もたまらなく素敵だよ。", "pr": "おれたちついにけっこんかな？ちのねずこちゃんも すてきだったけど、たいようのしたのねずこちゃん もたまらなくすてきだよ。", "ko": "우리 마침내 결혼인가? 피의 (모습) 네즈코 짱도 멋졌지만, 태양 아래의 네즈코 짱도 견딜 수 없이 멋져."}, {"t": "03:02:47", "jp": "素晴らしいよ。結婚したら毎日なぎ倒させてあげる から安心しておいて。", "pr": "すばらしいよ。けっこんしたらまいにちなぎたおさせてあげる からあんしんしておいて。", "ko": "훌륭해. 결혼하면 매일 (널) 지켜 줄 테니까 안심해 둬."}, {"t": "03:02:52", "jp": "お前の妹、あのイシ頭に永遠とり込みされてたぞ。", "pr": "おまえのいもうと、あのいしあたまにえいえんとりこみされてたぞ。", "ko": "네 여동생, 저 돌머리한테 줄곧 휘둘리고 있었어."}, {"t": "03:03:00", "jp": "何をですか？おかり伊之助。あいつどこにいる？ちょっと殺してくるわ。", "pr": "なにをですか？おかりいのすけ。あいつどこにいる？ちょっところしてくるわ。", "ko": "뭘요? 어이 이노스케. 그놈 어디 있어? 잠깐 죽이고 올게."}, {"t": "03:03:11", "jp": "伊之助伊之助伊之助伊之助、伊之助ってひたすら自分の名前を覚えさせてよ。", "pr": "いのすけいのすけいのすけいのすけ、いのすけってひたすらじぶんのなまえをおぼえさせてよ。", "ko": "이노스케 이노스케 이노스케 이노스케, 이노스케라고 그저 자기 이름을 외우게 시켜서."}, {"t": "03:03:18", "jp": "ああ、太陽の下の禰豆子ちゃん猛烈に可愛かったな、今回は。", "pr": "ああ、たいようのしたのねずこちゃんもうれつにかわいかったな、こんかいは。", "ko": "아아, 태양 아래의 네즈코 짱 맹렬하게 귀여웠지, 이번엔."}, {"t": "03:03:27", "jp": "炭治郎の刀鍛冶が病室に刀を届けに来た時の話だ。", "pr": "たんじろうのかたなかじがびょうしつにかたなをとどけにきたときのはなしだ。", "ko": "탄지로의 도공이 병실에 칼을 전하러 왔을 때의 이야기다."}, {"t": "03:03:37", "jp": "そうそう。鋼塚さん、わざわざ刀を届けてくれたんだよな。", "pr": "そうそう。こうつかさん、わざわざかたなをとどけてくれたんだよな。", "ko": "맞아 맞아. 하가네즈카 씨, 일부러 칼을 전해 주러 왔었지."}, {"t": "03:03:42", "jp": "鋼塚さん、怪我は大丈夫ですか？よかった。", "pr": "こうつかさん、けがはだいじょうぶですか？よかった。", "ko": "하가네즈카 씨, 부상은 괜찮으세요? 다행이다."}, {"t": "03:03:46", "jp": "あ、刀、ありがとうございます。煉獄さんの妻だ。鉄君を守ってくれてありがとうございます。は、は、あ、 ああ、すごい。", "pr": "あ、かたな、ありがとうございます。れんごくさんのつまだ。てつくんをまもってくれてありがとうございます。は、は、あ、 ああ、すごい。", "ko": "아, 칼, 감사합니다. 렌고쿠 씨의 아내(어머니)다. 코테츠 군을 지켜 주셔서 감사합니다. 하, 하, 아, 아아, 대단해."}, {"t": "03:04:07", "jp": "漆黒の深さが違う。「滅」の文字。", "pr": "しっこくのふかさがちがう。「めつ」のもじ。", "ko": "칠흑의 깊이가 다르다. 「멸(滅)」 글자."}, {"t": "03:04:24", "jp": "作者名も何も刻まず、ただこの文字だけを刻んだ。この刀の後から階級制度が始まり、柱だけが「悪鬼滅殺」の文字を刻むようになったそうだ。", "pr": "さくしゃめいもなにもきざまず、ただこのもじだけをきざんだ。このかたなののちからかいきゅうせいどがはじまり、はしらだけが「あっきめつさつ」のもじをきざむようになったそうだ。", "ko": "작자 이름도 아무것도 새기지 않고, 그저 이 글자만을 새겼다. 이 칼 이후로 계급 제도가 시작되어, 기둥만이 「악귀멸살」 글자를 새기게 되었다고 한다."}, {"t": "03:04:29", "jp": "そうなんですね。すごい刀だ。でも前の戦いでこれを使った時は文字がなかったような。", "pr": "そうなんですね。すごいかたなだ。でもまえのたたかいでこれをつかったときはもじがなかったような。", "ko": "그렇군요. 굉장한 칼이다. 그런데 지난 싸움에서 이걸 썼을 때는 글자가 없었던 것 같은데."}, {"t": "03:04:48", "jp": "だからそれは第1段階までしか研ぎ終えてないのにお前らが持ってって使ったからだろうが。錆が落とし切れてなかったんだよ。ぶち殺すぞ。", "pr": "だからそれはだい1だんかいまでしかとぎおえてないのにおまえらがもってってつかったからだろうが。さびがおとしきれてなかったんだよ。ぶちころすぞ。", "ko": "그러니까 그건 1단계까지밖에 다 갈지 못했는데 네놈들이 가져가서 썼기 때문이잖아. 녹이 다 제거되지 않았던 거야. 때려죽인다."}, {"t": "03:04:59", "jp": "すみません。今もまだ傷が治り切ってなくてずっと涙ぐんでるんだよ。ああ、痛くて痛くてたまらないんだよ。", "pr": "すみません。いまもまだきずがなおりきってなくてずっとなみだぐんでるんだよ。ああ、いたくていたくてたまらないんだよ。", "ko": "죄송합니다. 지금도 아직 상처가 다 낫지 않아서 계속 눈물이 그렁그렁해 있는 거야. 아아, 아프고 아파서 견딜 수가 없어."}, {"t": "03:05:11", "jp": "でも怪我のひどさならこいつの方も負けてないっすよ。体中の骨折れまくってるし。こいつ殺すな。", "pr": "でもけがのひどさならこいつのほうもまけてないっすよ。からだじゅうのほねおれまくってるし。こいつころすな。", "ko": "그래도 부상의 심각함이라면 이 녀석 쪽도 지지 않아요. 온몸의 뼈가 잔뜩 부러졌고. 이 녀석 죽이지 마."}, {"t": "03:05:25", "jp": "やっぱりやばい人だった。なんだこりゃ。", "pr": "やっぱりやばいにんだった。なんだこりゃ。", "ko": "역시 위험한 사람이었어. 뭐야 이거."}, {"t": "03:05:32", "jp": "ご一心で城が廃たれた後、あんまり返な場所なので捨てかれ忘れられたというところか。", "pr": "ごいっしんでしろがはいたれたのち、あんまりへんなばしょなのですてかれわすれられたというところか。", "ko": "(저택은) 성이 황폐해진 뒤, 너무 외진 곳이라 버려져 잊혀졌다는 건가."}, {"t": "03:05:43", "jp": "気に食わねえぜ。鬼の野郎が殿の様気分でいやがんのはよ。", "pr": "きにくわねえぜ。おにのやろうがどののさまきぶんでいやがんのはよ。", "ko": "마음에 안 들어. 귀신 놈이 영주님 기분을 내고 있는 게 말이야."}, {"t": "03:05:59", "jp": "不死川はどうも様子が妙だ。ああ、気に食わねえな。", "pr": "ふしかわはどうもようすがみょうだ。ああ、きにくわねえな。", "ko": "시나즈가와는 아무래도 상태가 이상해. 아아, 마음에 안 들어."}, {"t": "03:06:07", "jp": "鬼どもがこんなに群れてやがるのは見たことがない。おっぱじめか。", "pr": "おにどもがこんなにむれてやがるのはみたことがない。おっぱじめか。", "ko": "귀신들이 이렇게 무리 지어 있는 건 본 적이 없어. 시작인가."}, {"t": "03:06:09", "jp": "なんだ？待て。クソ。どうなってやがる？おい、不死川。今のは一体死ぬかよ。俺たちが最後か。", "pr": "なんだ？まて。くそ。どうなってやがる？おい、ふしかわ。いまのはいったいしぬかよ。おれたちがさいごか。", "ko": "뭐야? 기다려. 젠장. 어떻게 된 거야? 어이, 시나즈가와. 방금 그건 대체. 죽나. 우리가 마지막인가."}, {"t": "03:06:51", "jp": "待たせたようだ。申し訳ない。", "pr": "またせたようだ。もうしわけない。", "ko": "기다리게 한 모양이군. 미안하다."}, {"t": "03:07:11", "jp": "問題ない。任務ご苦労だった。甘露寺と時は上弦とやり合ったらしいな。", "pr": "もんだいない。にんむごくろうだった。かんろてらとときはじょうげんとやりあったらしいな。", "ko": "문제없다. 임무 수고했다. 칸로지와 토키토는 상현과 맞붙었다더군."}, {"t": "03:07:18", "jp": "うん。すごかったよ。なんかもう無理って感じだったけどみんなで力を合わせてね。無一郎君。", "pr": "うん。すごかったよ。なんかもうむりってかんじだったけどみんなでちからをあわせてね。むいちろうくん。", "ko": "응. 굉장했어. 뭔가 이제 무리라는 느낌이었지만 다 같이 힘을 합쳐서. 무이치로 군."}, {"t": "03:07:32", "jp": "うん。ああ、羨ましいことだぜ。なんで俺は上弦に遭遇しねえのかね。", "pr": "うん。ああ、うらやましいことだぜ。なんでおれはじょうげんにそうぐうしねえのかね。", "ko": "응. 아아, 부럽군. 어째서 나는 상현을 못 만나는 걸까."}, {"t": "03:07:41", "jp": "こればかりはな。合わないものはとんとない。", "pr": "こればかりはな。あわないものはとんとない。", "ko": "이것만큼은. 안 만나지는 건 전혀 안 만나져."}, {"t": "03:07:46", "jp": "今回のお2人ですが傷りが異常に早い。何があったんですか？", "pr": "こんかいのお2にんですがきずりがいじょうにはやい。なにがあったんですか？", "ko": "이번 두 분 말인데 상처 회복이 비정상적으로 빨라. 무슨 일이 있었던 겁니까?"}, {"t": "03:07:53", "jp": "その件も含めて親方様からお話があるだろう。大変お待たせいたしました。", "pr": "そのけんもふくめておやかたさまからおはなしがあるだろう。たいへんおまたせいたしました。", "ko": "그 건도 포함해서 오야카타 님이 말씀이 있으실 거다. 대단히 오래 기다리셨습니다."}, {"t": "03:08:02", "jp": "本日の中合会議に産屋敷輝利哉の代理を、産屋敷天音が務めさせていただきます。", "pr": "ほんじつのなかごうかいぎにうぶやしきてるとしやのだいりを、うぶやしきあまねがつとめさせていただきます。", "ko": "오늘의 주합 회의에 우부야시키 키리야 님의 대리를, 우부야시키 아마네가 맡겠습니다."}, {"t": "03:08:10", "jp": "そして当主の産屋敷輝利哉が病状の悪化により今後、皆様の前へ出ることが不可能となった旨。", "pr": "そしてとうしゅのうぶやしきてるとしやがびょうじょうのあっかによりこんご、みなさまのまえへでることがふかのうとなったむね。", "ko": "그리고 당주 우부야시키 키리야 님이 병세 악화로 인해 앞으로 여러분 앞에 나서는 것이 불가능해졌다는 뜻을."}, {"t": "03:08:19", "jp": "心よりお詫び申し上げます。すでにお聞き及びとは思いますが、日の光を克服した鬼 が現れた以上、鬼舞辻無惨は目の色を変えてそれを狙ってくるでしょう。", "pr": "こころよりおわびもうしあげます。すでにおききおよびとはおもいますが、にちのひかりをこくふくしたおに があらわれたいじょう、おにまいつじむざんはめのいろをかえてそれをねらってくるでしょう。", "ko": "진심으로 사과드립니다. 이미 들으셨으리라 생각하지만, 햇빛을 극복한 귀신이 나타난 이상, 키부츠지 무잔은 눈빛을 바꿔 그것을 노려 올 것입니다."}, {"t": "03:08:26", "jp": "大規模な総力 戦が近づいています。", "pr": "だいきぼなそうりょく せんがちかづいています。", "ko": "대규모 총력전이 다가오고 있습니다."}, {"t": "03:08:34", "jp": "上弦の肆との戦いで甘露寺様、時透様、お2人に痣が 発現したという報告が上がっております。", "pr": "じょうげんのしとのたたかいでかんろてらさま、ときとうるさま、お2にんにしが はつげんしたというほうこくがあがっております。", "ko": "상현의 사(肆)와의 싸움에서 칸로지 님, 토키토 님, 두 분에게 멍(반점)이 발현했다는 보고가 올라와 있습니다."}, {"t": "03:08:46", "jp": "戦国の時代、鬼舞辻無惨をあと一歩という ところまで追い詰めた始まりの呼吸の剣士 たち。", "pr": "せんごくのじだい、おにまいつじむざんをあといっぽという ところまでおいつめたはじまりのこきゅうのけんし たち。", "ko": "전국시대, 키부츠지 무잔을 한 걸음 남은 곳까지 몰아붙인 시작의 호흡의 검사들."}, {"t": "03:08:56", "jp": "彼らは全員に鬼の紋様と似た痣が発現して いたそうです。", "pr": "かれらはぜんいんにおにのもんようとにたしがはつげんして いたそうです。", "ko": "그들은 전원에게 귀신의 문양과 비슷한 멍이 발현해 있었다고 합니다."}, {"t": "03:09:06", "jp": "痣については伝承が曖昧な部分が多いの です。", "pr": "しについてはでんしょうがあいまいなぶぶんがおおいの です。", "ko": "멍에 대해서는 전승이 애매한 부분이 많습니다."}, {"t": "03:09:14", "jp": "お2人にはあの発現の条件をご教授願いたく存じます。", "pr": "お2にんにはあのはつげんのじょうけんをごきょうじゅねがいたくぞんじます。", "ko": "두 분께 그 발현의 조건을 가르쳐 주셨으면 합니다."}, {"t": "03:09:21", "jp": "あ、はい。あの時はですね、確かにすごく体が軽かったです。えっと、えっと、ぐわーってきました。", "pr": "あ、はい。あのときはですね、たしかにすごくからだがかるかったです。えっと、えっと、ぐわーってきました。", "ko": "아, 네. 그때는 말이죠, 확실히 굉장히 몸이 가벼웠어요. 음, 그게, 우와아 하고 왔어요."}, {"t": "03:09:33", "jp": "グッてしてグワーって心臓とかがバクンバクンして耳もキーンってしてベキベキベキーンって申し訳ありません。穴があったら入りたいです。", "pr": "ぐってしてぐわーってしんぞうとかがばくんばくんしてみみもきーんってしてべきべきべきーんってもうしわけありません。あながあったらいりたいです。", "ko": "으윽 하고 우와아 하고 심장 같은 게 두근두근하고 귀도 삐 하고 우지직우지직 하고… 죄송합니다. 쥐구멍이 있으면 들어가고 싶어요."}, {"t": "03:09:40", "jp": "では僕から前回の戦い。そこで僕は強すぎる怒りで感情の収集がつかなくなりました。", "pr": "ではぼくからぜんかいのたたかい。そこでぼくはつよすぎるいかりでかんじょうのしゅうしゅうがつかなくなりました。", "ko": "그럼 제가 지난번 싸움에 대해. 거기서 저는 너무 강한 분노로 감정 수습이 안 됐습니다."}], "range": "03:00:21 ~ 03:09:40"}, {"title": "챕터 20", "lines": [{"t": "03:10:14", "jp": "その時の心拍数は200を超えていたと思います。さらに体は燃えるように熱く、体温の数字は 39度以上になっていたはずです。", "pr": "そのときのしんぱくすうは200をこえていたとおもいます。さらにからだはもえるようにあつく、たいおんのすうじは 39どいじょうになっていたはずです。", "ko": "그때의 심박수는 200을 넘었을 거라고 생각합니다. 게다가 몸은 타는 듯이 뜨겁고, 체온 수치는 39도 이상이 되어 있었을 겁니다."}, {"t": "03:10:27", "jp": "そんな状態で動けますか？命にも関わりますよ。", "pr": "そんなじょうたいでうごけますか？いのちにもかかわりますよ。", "ko": "그런 상태로 움직일 수 있나요? 목숨에도 관계되는데요."}, {"t": "03:10:35", "jp": "そうですね。だからそこが古いにかけられるところだと思う。", "pr": "そうですね。だからそこがふるいにかけられるところだとおもう。", "ko": "그렇네요. 그러니까 거기가 운명을 가르는 부분이라고 생각해."}, {"t": "03:10:40", "jp": "なるほど。ではの発言が柱の義務となりますね。", "pr": "なるほど。ではのはつげんがはしらのぎむとなりますね。", "ko": "과연. 그럼 멍의 발현이 기둥의 의무가 되겠네요."}, {"t": "03:10:47", "jp": "良いなんとかいたします故。親方様にはご安心召されるようお伝えくださいませ。", "pr": "よいなんとかいたしますゆえ。おやかたようにはごあんしんめされるようおつたえくださいませ。", "ko": "좋게 어떻게든 하겠습니다. 오야카타 님께는 안심하시도록 전해 주세요."}, {"t": "03:10:57", "jp": "ありがとうございます。ただ1つ、あの訓練につきましては皆様 にお伝えしなければならないことがあります。", "pr": "ありがとうございます。ただ1つ、あのくんれんにつきましてはみなさま におつたえしなければならないことがあります。", "ko": "감사합니다. 다만 한 가지, 그 멍에 관해서는 여러분께 전해야 할 것이 있습니다."}, {"t": "03:11:03", "jp": "もうすでにあが発言してしまった方 は選ぶことができません。", "pr": "もうすでにあがはつげんしてしまったほう はえらぶことができません。", "ko": "이미 멍이 발현해 버린 분은 선택할 수 없습니다."}, {"t": "03:11:10", "jp": "あが発言した方はどなたも例外なく。", "pr": "あがはつげんしたかたはどなたもれいがいなく。", "ko": "멍이 발현한 분은 그 누구도 예외 없이."}, {"t": "03:11:23", "jp": "果たして私は一体どうなるのか。ナムシム天ね殿のも退出されたので失礼する。", "pr": "はたしてわたしはいったいどうなるのか。なむしむてんねどののもたいしゅつされたのでしつれいする。", "ko": "과연 나는 대체 어떻게 되는 걸까. 우부야시키 아마네 님도 퇴출(퇴장)하셨으니 실례하겠다."}, {"t": "03:11:34", "jp": "おい、待て。失礼すんじゃねえ。それぞれの今後の立ち回りも決めねえとならねえだろうが。", "pr": "おい、まて。しつれいすんじゃねえ。それぞれのこんごのたちまわりもきめねえとならねえだろうが。", "ko": "어이, 기다려. 실례하지 마라. 각자의 앞으로의 처신도 정해야 하잖아."}, {"t": "03:11:41", "jp": "6人で話し合うといい。俺には関係ない。 富岡さん、理由を説明してください。さすがに言葉が足りませんよ。", "pr": "6にんではなしあうといい。おれにはかんけいない。 とみおかさん、りゆうをせつめいしてください。さすがにことばがたりませんよ。", "ko": "여섯 명이서 의논하면 돼. 나에게는 관계없다. 토미오카 씨, 이유를 설명해 주세요. 아무래도 말이 부족해요."}, {"t": "03:11:53", "jp": "俺はお前たちとは違う。 気に食わねえぜ。 喧嘩はダメだよ。冷静に 待ち上がれ。", "pr": "おれはおまえたちとはちがう。 きにくわねえぜ。 けんかはだめだよ。れいせいに まちあがれ。", "ko": "나는 너희와는 달라. 마음에 안 들어. 싸움은 안 돼. 냉정하게 (논의를) 진행해."}, {"t": "03:12:02", "jp": "座れ。話を進める。 1つ提案がある。 うい。", "pr": "すわれ。はなしをすすめる。 1つていあんがある。 うい。", "ko": "앉아라. 이야기를 진행하지. 한 가지 제안이 있다. 으."}, {"t": "03:12:19", "jp": "合同強化訓練が始まるぞ。", "pr": "ごうどうきょうかくんれんがはじまるぞ。", "ko": "합동 강화 훈련이 시작된다."}, {"t": "03:12:29", "jp": "何なんだそれ? わかんねえ。 なるほど。 ん、急ぎ、急ぎ。お館様からの手紙だ。宮読むの。", "pr": "なになんだそれ? わかんねえ。 なるほど。 ん、いそぎ、いそぎ。おやかたさまからのてがみだ。みやよむの。", "ko": "뭐야 그게? 모르겠어. 과연. 응, 급히, 급히. 오야카타 님의 편지다. 지금 읽는 거야."}, {"t": "03:12:49", "jp": "つまりこういうことらしい。 禰豆子が太陽を克服し、鬼の没落が減った今 は嵐の前の静けさとも言える状況。", "pr": "つまりこういうことらしい。 ねずこがたいようをこくふくし、おにのぼつらくがへったいま はあらしのまえのしずけさともいえるじょうきょう。", "ko": "즉 이런 거라는 모양이다. 네즈코가 태양을 극복하고, 귀신의 (활동) 몰락(?)이 줄어든 지금은 폭풍 전의 고요라고도 할 수 있는 상황."}, {"t": "03:12:55", "jp": "大きな戦いが迫っている中でこの機を逃さ ず鬼殺隊は動き出すことになった。", "pr": "おおきなたたかいがせまっているなかでこのきをのがさ ずおにさつたいはうごきだすことになった。", "ko": "큰 싸움이 다가오는 가운데 이 기회를 놓치지 않고 귀살대는 움직이기 시작하게 되었다."}, {"t": "03:13:04", "jp": "それは 柱より下の階級のものが柱を順番に巡り 稽古をつけてもらうという新しい試み。", "pr": "それは はしらよりしたのかいきゅうのものがはしらをじゅんばんにめぐり けいこをつけてもらうというあたらしいこころみ。", "ko": "그것은 기둥보다 아래 계급인 자들이 기둥을 순서대로 돌며 수련을 받는다는 새로운 시도."}, {"t": "03:13:13", "jp": "その名も柱稽古。だけど俺はその前に、お館様からの約束を守らなければならなくて。炭治郎、怪我の具合はどうだい?情けないことに私は動けなくなってしまってね。義勇と話がしたいんだけれど、もうできそうにない。", "pr": "そのめいもはしらけいこ。だけどおれはそのまえに、おやかたさまからのやくそくをまもらなければならなくて。たんじろう、けがのぐあいはどうだい?なさけないことにわたしはうごけなくなってしまってね。ぎゆうとはなしがしたいんだけれど、もうできそうにない。", "ko": "그 이름하여 기둥 수련. 그런데 나는 그 전에, 오야카타 님과의 약속을 지켜야 해서. 탄지로, 부상 상태는 어떠니? 한심하게도 나는 움직일 수 없게 되어 버렸단다. 기유와 이야기를 하고 싶은데, 이제 할 수 있을 것 같지 않구나."}, {"t": "03:13:43", "jp": "今はとても大事な時だからみんなで一丸となって頑張りたいと思っているんだ。義勇と話をしてやってくれないだろうか。", "pr": "いまはとてもだいじなときだからみんなでいちがんとなってがんばりたいとおもっているんだ。ぎゆうとはなしをしてやってくれないだろうか。", "ko": "지금은 아주 중요한 때니까 다 같이 한마음으로 힘내고 싶다고 생각하고 있단다. 기유와 이야기를 해 주지 않겠니."}, {"t": "03:13:55", "jp": "ごめんください。富岡さん、義勇さん、俺です。いらっしゃいますか?", "pr": "ごめんください。とみおかさん、ぎゆうさん、おれです。いらっしゃいますか?", "ko": "실례합니다. 토미오카 씨, 기유 씨, 저예요. 계세요?"}, {"t": "03:14:02", "jp": "放っておけば帰るだろう。 じゃあ入ります。", "pr": "ほうっっておけばかえるだろう。 じゃあいります。", "ko": "내버려 두면 돌아가겠지. 그럼 들어갑니다."}, {"t": "03:14:15", "jp": "入ります。いや、帰りますだな。聞き間違いだ。っていう感じでみんなで稽古してるんですけど、俺あと 7日で復帰が出るから稽古つけてもらっていいですか？", "pr": "いります。いや、かえりますだな。ききまちがいだ。っていうかんじでみんなでけいこしてるんですけど、おれあと 7にちでふっきがでるからけいこつけてもらっていいですか？", "ko": "들어갑니다. 아니, 돌아갑니다구나. 잘못 들은 거다. (라)는 식으로 다 같이 수련하고 있는데요, 저 앞으로 7일이면 복귀 (허가)가 나니까 수련 시켜 주실 수 있나요?"}, {"t": "03:14:31", "jp": "つけない。どうしてですか？じあり怒っている匂いがするんですけど何に怒ってるんですか？", "pr": "つけない。どうしてですか？じありいかっているにおいがするんですけどなににいかってるんですか？", "ko": "안 시킨다. 어째서요? 화나 있는 냄새가 나는데 뭐에 화나신 거예요?"}, {"t": "03:14:38", "jp": "お前が水の呼吸を極めなかったことを怒ってる。お前は水柱にならなければならなかった。", "pr": "おまえがみずのこきゅうをきわめなかったことをいかってる。おまえはみずばしらにならなければならなかった。", "ko": "네가 물의 호흡을 끝까지 파고들지 않은 것에 화나 있다. 너는 물의 기둥(수주)이 되어야 했다."}, {"t": "03:14:46", "jp": "水柱が不在の今。一刻も早く誰かが水柱にならなければならない。", "pr": "みずばしらがふざいのいま。いっこくもはやくだれかがみずばしらにならなければならない。", "ko": "수주가 부재중인 지금. 한시라도 빨리 누군가가 수주가 되어야 한다."}, {"t": "03:14:52", "jp": "水柱が不在？義勇さんがいるじゃないですか。俺は水柱じゃない。帰れ。", "pr": "みずばしらがふざい？ぎゆうさんがいるじゃないですか。おれはみずばしらじゃない。かえれ。", "ko": "수주가 부재? 기유 씨가 있잖아요. 나는 수주가 아니다. 돌아가라."}, {"t": "03:15:08", "jp": "俺は最終選別を突破してない。最終選別って藤の花の山のですか？", "pr": "おれはさいしゅうせんべつをとっぱしてない。さいしゅうせんべつってふじのはなのやまのですか？", "ko": "나는 최종 선별을 돌파하지 못했다. 최종 선별이라면 등나무 꽃 산의 그거 말인가요?"}, {"t": "03:15:16", "jp": "あの年に俺は俺と同じく鬼に身内を殺された少年。鱗滝さんという師匠の神の少年と共に選別を受けた。", "pr": "あのねんにおれはおれとおなじくおににみうちをころされたしょうねん。うろこたきさんというししょうのかみのしょうねんとともにせんべつをうけた。", "ko": "그해에 나는, 나와 똑같이 귀신에게 가족을 잃은 소년. 우로코다키 씨라는 스승의 (제자인) 소년과 함께 선별을 받았다."}, {"t": "03:15:31", "jp": "あの年の選別で死んだのは錆兎1人だけだ 。", "pr": "あのねんのせんべつでしんだのはさびうさぎ1にんだけだ 。", "ko": "그해 선별에서 죽은 건 사비토 한 사람뿐이다."}, {"t": "03:15:45", "jp": "彼があの山の鬼をほとんど1人で倒して しまったんだ。", "pr": "かれがあのやまのおにをほとんど1にんでたおして しまったんだ。", "ko": "그가 그 산의 귀신을 거의 혼자서 쓰러뜨려 버렸다."}, {"t": "03:15:56", "jp": "俺は確かに7日間生き延びて選別に受かっ たが、一体の鬼も倒さず助けられただけの人間が果たして選別に通ったと言えるの だろう가.", "pr": "おれはたしかに7にちかんいきのびてせんべつにうかっ たが、いったいのおにもたおさずたすけられただけのにんげんがはたしてせんべつにかよったといえるの だろう", "ko": "나는 확실히 7일간 살아남아 선별에 합격했지만, 한 마리의 귀신도 쓰러뜨리지 않고 도움받기만 한 인간이 과연 선별을 통과했다고 할 수 있는 걸까."}, {"t": "03:16:10", "jp": "나는 수주가 되어도 될 사람이 아니야. 애초에 기둥들과 어깨를 나란히 할 사람조차 아니야.", "pr": "", "ko": "나는 수주가 되어도 될 사람이 아니야. 애초에 기둥들과 어깨를 나란히 할 사람조차 아니야."}, {"t": "03:16:18", "jp": "이제 나에게 신경 쓰지 마. 시간 낭비야. 그렇구나.", "pr": ".", "ko": "이제 나에게 신경 쓰지 마. 시간 낭비야. 그렇구나."}, {"t": "03:16:27", "jp": "사비토는 기유 씨와 함께 선별을 받았구나.", "pr": ".", "ko": "사비토는 기유 씨와 함께 선별을 받았구나."}, {"t": "03:16:31", "jp": "사비토가 살아있었다면 대단한 검사가 되었을 텐데. 그것 때문에 기유 씨는 자신이 죽었으면 좋았을 거라고 생각하는구나.", "pr": ".     .", "ko": "사비토가 살아 있었다면 대단한 검사가 되었을 텐데. 그것 때문에 기유 씨는 자신이 죽었으면 좋았을 거라고 생각하는구나."}, {"t": "03:16:41", "jp": "알아. 나도 똑같이 생각했으니까.", "pr": ".  .", "ko": "알아. 나도 똑같이 생각했으니까."}, {"t": "03:16:49", "jp": "렌고쿠 씨, 아무리 비참하고 부끄러워도 살아가야 해.", "pr": "", "ko": "렌고쿠 씨, 아무리 비참하고 부끄러워도 살아가야 해."}, {"t": "03:16:58", "jp": "기유 씨. 기유 씨는 사비토에게 맡겨진 것을 이어가지 않을 건가요?", "pr": "", "ko": "기유 씨. 기유 씨는 사비토에게 맡겨진 것을 이어 가지 않을 건가요?"}, {"t": "03:17:07", "jp": "너는 절대 죽지 마.", "pr": "", "ko": "너는 절대 죽지 마."}, {"t": "03:17:34", "jp": "누나가 목숨을 걸고 이어준 목숨을. 맡겨진 미래를 너도 이어가. 아파. 왜 잊고 있었지? 그와의 그 대화, 중요한 일이었잖아.", "pr": ".   ,", "ko": "누나가 목숨을 걸고 이어 준 목숨을. 맡겨진 미래를 너도 이어 가. 아파. 왜 잊고 있었지? 그와의 그 대화, 중요한 일이었잖아."}, {"t": "03:17:42", "jp": "츠코 누나, 사비토, 미숙해서 미안해.", "pr": ",", "ko": "츠타코 누나, 사비토, 미숙해서 미안해."}, {"t": "03:18:04", "jp": "그래. 빨리 먹기 시합을 하는 건 어때? 시합에서 내가 이기면 힘내서 훈련하지 않을래요? 같은.", "pr": ".    ?    ? .", "ko": "그래. 빨리 먹기 시합을 하는 건 어때? 시합에서 내가 이기면 힘내서 훈련하지 않을래요? 같은."}, {"t": "03:18:28", "jp": "なんで遅い、遅い、遅い、遅い。まず基礎体力がなさすぎるわ。走るとかいう単純なことがさ。こんなに遅かったら上弦に勝つなんて夢のまた夢よ。", "pr": "なんでおそい、おそい、おそい、おそい。まずきそたいりょくがなさすぎるわ。はしるとかいうたんじゅんなことがさ。こんなにおそかったらじょうげんにかつなんてゆめのまたゆめよ。", "ko": "왜 이렇게 느려, 느려, 느려, 느려. 우선 기초 체력이 너무 없어. 달리기 같은 단순한 게 말이야. 이렇게 느려서야 상현에 이기는 건 꿈의 또 꿈이야."}, {"t": "03:18:52", "jp": "おお。柱稽古が始まってしばらく、俺は怪我をしていたから出遅れたけど、ようやく全快し念願叶って大参加。", "pr": "おお。はしらけいこがはじまってしばらく、おれはけがをしていたからでおくれたけど、ようやくぜんかいしねんがんかなっておおみか。", "ko": "오. 기둥 수련이 시작되고 한동안, 나는 부상당해 있어서 늦게 합류했지만, 드디어 완쾌해 염원이 이루어져 (수련에) 대참가."}, {"t": "03:19:07", "jp": "まずは宇髄さんのところで基礎体力を向上させて、それから順繰り柱の元を回っていく。", "pr": "まずはうずいさんのところできそたいりょくをこうじょうさせて、それからじゅんくりはしらのもとをまわっていく。", "ko": "우선은 우즈이 씨한테서 기초 체력을 향상시키고, 그러고 나서 차례차례 기둥들을 돌아간다."}, {"t": "03:19:15", "jp": "強くなるための稽古、柱につけてくれるなんて本当に贅沢なことだ。あいつはもう合格だな。", "pr": "つよくなるためのけいこ、はしらにつけてくれるなんてほんとうにぜいたくなことだ。あいつはもうごうかくだな。", "ko": "강해지기 위한 수련, 기둥이 시켜 준다니 정말 사치스러운 일이다. 저 녀석은 이제 합격이군."}, {"t": "03:19:29", "jp": "宇髄さんの指導を終えた俺は、次の柱の元へ。", "pr": "うずいさんのしどうをおえたおれは、つぎのはしらのもとへ。", "ko": "우즈이 씨의 지도를 마친 나는, 다음 기둥에게로."}, {"t": "03:19:38", "jp": "君、本当なら今3回は死んでるよ。お時透君。あ、炭治郎待ってたよ。", "pr": "くん、ほんとうならいま3かいはしんでるよ。おときとうるくん。あ、たんじろうまってたよ。", "ko": "너, 원래대로라면 지금 세 번은 죽었어. 어 토키토 군. 아, 탄지로 기다렸어."}, {"t": "03:19:52", "jp": "そうして時透君との稽古が始まった。時透君が教えてくれるのは主に筋肉の使い方。", "pr": "そうしてときとうるくんとのけいこがはじまった。ときとうるくんがおしえてくれるのはおもにきんにくのつかいかた。", "ko": "그렇게 토키토 군과의 수련이 시작됐다. 토키토 군이 가르쳐 주는 건 주로 근육 사용법."}], "range": "03:10:14 ~ 03:19:52"}, {"title": "챕터 21", "lines": [{"t": "03:20:02", "jp": "流れるように筋肉の切り替えを行うことで、高速の打ち込みと移動が可能になるとの ことだけど。", "pr": "ながれるようにきんにくのきりかえをおこなうことで、こうそくのうちこみといどうがかのうになるとの ことだけど。", "ko": "흐르듯이 근육 전환을 함으로써, 고속의 베기와 이동이 가능해진다는 거지만."}, {"t": "03:20:09", "jp": "そうそう。炭治郎、さっきより早くなってる よ。", "pr": "そうそう。たんじろう、さっきよりはやくなってる よ。", "ko": "맞아 맞아. 탄지로, 아까보다 빨라지고 있어."}, {"t": "03:20:17", "jp": "僕、木刀でも呼吸を使えば技は出せる。次は 思い切ってさらに切り込んでみよう。", "pr": "ぼく、ぼくとうでもこきゅうをつかえばわざはだせる。つぎは おもいきってさらにきりこんでみよう。", "ko": "나, 목검으로도 호흡을 쓰면 기술은 낼 수 있어. 다음은 과감하게 더 파고들어 보자."}, {"t": "03:20:24", "jp": "それくらいやらないと時透君に認めてもらえ ない。", "pr": "それくらいやらないとときとうるくんにみとめてもらえ ない。", "ko": "그 정도 하지 않으면 토키토 군에게 인정받지 못해."}, {"t": "03:20:31", "jp": "次の柱のところに行っていいよ、炭治郎。え、もういいの?", "pr": "つぎのはしらのところにいっていいよ、たんじろう。え、もういいの?", "ko": "다음 기둥한테 가도 돼, 탄지로. 어, 벌써 돼?"}, {"t": "03:20:39", "jp": "だって炭治郎、言ったことちゃんとできてるもん。 じゃ、じゃあ俺たちも 何言ってるの？", "pr": "だってたんじろう、いったことちゃんとできてるもん。 じゃ、じゃあおれたちも なにごとってるの？", "ko": "왜냐면 탄지로, 말한 거 제대로 하고 있는걸. 그, 그럼 우리도. 무슨 소리 하는 거야?"}, {"t": "03:20:48", "jp": "君たちはダメだよ。楽がすごい。", "pr": "くんたちはだめだよ。らくがすごい。", "ko": "너희는 안 돼. (실력) 차이가 굉장해."}, {"t": "03:20:59", "jp": "時と君。どこ行くだろう？すみません。ああ、炭治郎君、久しぶり。おいでませ、我が家へ。", "pr": "ときとくん。どこいくだろう？すみません。ああ、たんじろうくん、ひさしぶり。おいでませ、わがやへ。", "ko": "토키토 군. 어디 가는 거지? 실례합니다. 아아, 탄지로 군, 오랜만이야. 어서 와, 우리 집에."}, {"t": "03:21:15", "jp": "ごぶ沙汰してます。お元気そうでよかった。今日から一緒に頑張ろうね。", "pr": "ごぶさたしてます。おげんきそうでよかった。きょうからいっしょにがんばろうね。", "ko": "오랜만이에요. 건강해 보이셔서 다행이에요. 오늘부터 같이 힘내요."}, {"t": "03:21:21", "jp": "ここではどんな稽古？えっと、まずはお着替えをしてもらって、それから着替え。す、 技の切れには体の柔軟はとっても大事だからね。", "pr": "ここではどんなけいこ？えっと、まずはおきがえをしてもらって、それからきがえ。す、 わざのきれにはからだのじゅうなんはとってもだいじだからね。", "ko": "여기서는 어떤 수련? 음, 우선은 갈아입어 주고, 그러고 나서 갈아입고. 기술의 예리함에는 몸의 유연함이 아주 중요하니까."}, {"t": "03:21:35", "jp": "柔らかく可動域を大きく取れるようにほぐしていきましょう。さ、始めるよ。", "pr": "やわらかくかどういきをおおきくとれるようにほぐしていきましょう。さ、はじめるよ。", "ko": "부드럽게 가동 범위를 크게 잡을 수 있도록 풀어 가요. 자, 시작할게."}, {"t": "03:21:50", "jp": "うん。とってもいいよ、炭治郎君。この調子でもっとほぐしていこうね。も、もっとですか？", "pr": "うん。とってもいいよ、たんじろうくん。このちょうしでもっとほぐしていこうね。も、もっとですか？", "ko": "응. 아주 좋아, 탄지로 군. 이 상태로 더 풀어 가자. 더, 더요?"}, {"t": "03:22:02", "jp": "こんな感じでとにかくほぐしてほぐしてほぐしまくりましょうね。", "pr": "こんなかんじでとにかくほぐしてほぐしてほぐしまくりましょうね。", "ko": "이런 식으로 어쨌든 풀고 풀고 풀어 대자고요."}, {"t": "03:22:11", "jp": "ほぐしというより力技だけど。炭治郎君もやってみようか。", "pr": "ほぐしというよりちからわざだけど。たんじろうくんもやってみようか。", "ko": "푸는 거라기보다 힘으로 (밀어붙이는) 기술이지만. 탄지로 군도 해 볼까."}, {"t": "03:22:17", "jp": "え、か、炭治郎。お前を待っていた。甘露寺からお前の話は 聞いた。", "pr": "え、か、たんじろう。おまえをまっていた。かんろてらからおまえのはなしは きいた。", "ko": "어, 카, 탄지로. 너를 기다리고 있었다. 칸로지에게서 네 이야기는 들었다."}, {"t": "03:22:33", "jp": "随分とまあ楽しく稽古つけてもらったようだな。俺は甘露寺のように 甘くないからな。", "pr": "ずいぶんとまあたのしくけいこつけてもらったようだな。おれはかんろてらのように あまくないからな。", "ko": "꽤나 즐겁게 수련을 받은 모양이군. 나는 칸로지처럼 무르지 않으니까."}, {"t": "03:22:41", "jp": "しょっぱなからとてつもなく嫌われている。", "pr": "しょっぱなからとてつもなくきらわれている。", "ko": "시작부터 엄청나게 미움받고 있다."}, {"t": "03:22:49", "jp": "お前にはこの障害物を避けつつ、俺を振ってもらう。この括られている人たちは何か罪を犯しましたか？", "pr": "おまえにはこのしょうがいぶつをさけつつ、おれをふってもらう。このくくられているにんたちはなにかつみをおかしましたか？", "ko": "너에게는 이 장애물을 피하면서, 나를 베어 주겠다(?). 이 묶여 있는 사람들은 무슨 죄를 지었나요?"}, {"t": "03:23:00", "jp": "まあそうだな。弱い罪、覚えない罪、手間を取らせる罪、イラつかせる罪というところだ。", "pr": "まあそうだな。よわいつみ、おぼえないつみ、てまをとらせるつみ、いらつかせるつみというところだ。", "ko": "뭐 그렇지. 약한 죄, (못) 외우는 죄, 수고를 끼치는 죄, 짜증 나게 하는 죄라는 거다."}, {"t": "03:23:10", "jp": "もう偉いこっちゃ。世にも恐ろしい訓練が始まった。", "pr": "もうえらいこっちゃ。よにもおそろしいくんれんがはじまった。", "ko": "이거 큰일이네. 세상에 다시없이 무서운 훈련이 시작됐다."}, {"t": "03:23:20", "jp": "今までにない緊張感で手がブルブル震える中、伊黒さんの攻撃が何度も飛んでくる。", "pr": "いままでにないきんちょうかんでてがぶるぶるふるえるなか、いぐろさんのこうげきがなんどもとんでくる。", "ko": "지금까지 없던 긴장감으로 손이 부들부들 떨리는 가운데, 이구로 씨의 공격이 몇 번이고 날아온다."}, {"t": "03:23:27", "jp": "この人の太刀筋本当にやばい。伊黒さんどこに？やるな。少しでも気を抜いたら本気で怪我しそうだぜ。", "pr": "このにんのたちすじほんとうにやばい。いぐろさんどこに？やるな。すこしでもきをぬいたらほんきでけがしそうだぜ。", "ko": "이 사람의 칼솜씨 정말 굉장하다. 이구로 씨 어디에? 잘하는군. 조금이라도 방심하면 진짜로 다칠 것 같아."}, {"t": "03:23:45", "jp": "しかし時と、お前は毎日こんな遠いところ まで来て昼間の稽古は大丈夫なのか？", "pr": "しかしときと、おまえはまいにちこんなとおいところ まできてひるまのけいこはだいじょうぶなのか？", "ko": "그런데 토키토, 너는 매일 이렇게 먼 곳까지 와서 낮의 수련은 괜찮은 거냐?"}, {"t": "03:23:59", "jp": "隊士たちは稽古になってるかもしれないけど、僕 には十分じゃなくて。", "pr": "たいしたちはけいこになってるかもしれないけど、ぼく にはじゅうぶんじゃなくて。", "ko": "대원들은 수련이 될지 모르지만, 나에게는 충분하지 않아서."}, {"t": "03:24:07", "jp": "まあな。にと、は柱同士で打ち合えるこっちこそが 本当の柱稽古だ。", "pr": "まあな。にと、ははしらどうしでうちあえるこっちこそが ほんとうのはしらけいこだ。", "ko": "그렇긴 하지. 토키토는, (우리는) 기둥끼리 맞붙을 수 있는 이쪽이야말로 진짜 기둥 수련이다."}, {"t": "03:24:15", "jp": "そういえば、炭治郎は今、伊黒さんのところですよね。稽古はどんな感じ？", "pr": "そういえば、たんじろうはいま、いぐろさんのところですよね。けいこはどんなかんじ？", "ko": "그러고 보니, 탄지로는 지금, 이구로 씨한테 있죠? 수련은 어때?"}, {"t": "03:24:25", "jp": "どうもこうもない。まだ俺には届かない。俺はあいつを認めない。", "pr": "どうもこうもない。まだおれにはとどかない。おれはあいつをみとめない。", "ko": "어떻고 자시고 없다. 아직 나에게는 못 미쳐. 나는 그놈을 인정 안 해."}, {"t": "03:24:32", "jp": "て厳しいな。訓練終了だ。じゃあな、次の稽古に進むといい。さっさと死ね、ゴミかす。馴れ馴れしく甘露寺と喋るな。", "pr": "ていかめしいな。くんれんしゅうりょうだ。じゃあな、つぎのけいこにすすむといい。さっさとしね、ごみかす。なれなれしくかんろてらとしゃべるな。", "ko": "엄격하네. 훈련 종료다. 그럼, 다음 수련으로 나아가는 게 좋아. 어서 죽어, 쓰레기 찌꺼기. 친한 척 칸로지와 떠들지 마라."}, {"t": "03:25:04", "jp": "ありがとうございました。いや、聞いたことのある声だな。善逸、逃してくれ。炭治郎ぞ。", "pr": "ありがとうございました。いや、きいたことのあるこえだな。ぜんいつ、のがしてくれ。たんじろうぞ。", "ko": "감사했습니다. 어, 들어 본 적 있는 목소리군. 젠이츠, 살려 줘. 탄지로다."}, {"t": "03:25:18", "jp": "選べ。訓練に戻るか、俺に殺されるか。", "pr": "えらべ。くんれんにもどるか、おれにころされるか。", "ko": "골라라. 훈련으로 돌아갈래, 나에게 죽을래."}, {"t": "03:25:34", "jp": "うるさい。運べ。あ、はい。不死川さんの訓練は善逸が唸るのも分かる厳しさだった。とにかく不死川さんに切りかかっていくという単純な打ち込みだったが、ヘドをぶちまけて失神するまでが一区切りでそれまで休憩なしだった。", "pr": "うるさい。はこべ。あ、はい。ふしかわさんのくんれんはぜんいつがうなるのもわかるいかめしさだった。とにかくふしかわさんにきりかかっていくというたんじゅんなうちこみだったが、へどをぶちまけてしっしんするまでがひとくぎりでそれまできゅうけいなしだった。", "ko": "시끄러워. 운반해라. 아, 네. 시나즈가와 씨의 훈련은 젠이츠가 끙끙댈 만한 엄격함이었다. 어쨌든 시나즈가와 씨에게 베어 들어간다는 단순한 (것)이었지만, 토하고 실신할 때까지가 한 단락으로 그때까지 휴식 없었다."}, {"t": "03:26:07", "jp": "それがてめえの実力か。つまらねえな。上弦相手に生き残ったのはただのぐれかよ。", "pr": "それがてめえのじつりょくか。つまらねえな。じょうげんあいてにいきのこったのはただのぐれかよ。", "ko": "그게 네놈 실력이냐. 시시하군. 상현 상대로 살아남은 게 고작 우연이냐."}, {"t": "03:26:11", "jp": "もう1本お願いします。お望みだってんならとことん痛めつけてやら。死抜きで来いや。クソが。おら。", "pr": "もう1ほんおねがいします。おのぞみだってんならとことんいためつけてやら。しぬきでこいや。くそが。おら。", "ko": "한 번 더 부탁드립니다. 원한다면 철저하게 아프게 해 주마. 죽을 각오로 와라. 빌어먹을. 와라."}, {"t": "03:26:33", "jp": "待ってくれ兄貴。話したいことがあるんだ。しつけえんだよ。俺には弟なんていねえ。いい加減にしねえとぶち殺すぞ。", "pr": "まってくれあにき。はなしたいことがあるんだ。しつけえんだよ。おれにはおとうとなんていねえ。いいかげんにしねえとぶちころすぞ。", "ko": "기다려 줘 형. 하고 싶은 얘기가 있어. 끈질긴 놈이군. 나에게 동생 따위 없어. 적당히 안 하면 때려죽인다."}, {"t": "03:26:46", "jp": "ずっと俺は兄貴に謝りたくて。心底どうでもいいわ。うせろ。", "pr": "ずっとおれはあにきにあやまりたくて。しんそこどうでもいいわ。うせろ。", "ko": "줄곧 나는 형에게 사과하고 싶어서. 진심으로 아무래도 상관없어. 꺼져."}, {"t": "03:26:54", "jp": "そんな俺、鬼を食ってまで戦ってきたんだぜ。なんだと？今なんつった？てめえ鬼を食っただと？", "pr": "そんなおれ、おにをくっってまでたたかってきたんだぜ。なんだと？いまなんつった？てめえおにをくっっただと？", "ko": "그런 나, 귀신을 먹어서까지 싸워 왔다고. 뭐라고? 방금 뭐랬어? 네놈 귀신을 먹었다고?"}, {"t": "03:27:15", "jp": "けや。うわ。あれ？炭治郎か。やめてください。う、おっさんが暴れてんのに。", "pr": "けや。うわ。あれ？たんじろうか。やめてください。う、おっさんがあばれてんのに。", "ko": "베어라. 으악. 어라? 탄지로냐. 그만두세요. 으, 아저씨가 날뛰고 있는데."}, {"t": "03:27:36", "jp": "来るぞ。来る。いい時をしてるぜ。てめえは。死にてえようだからお望み通りに殺してやるよ。", "pr": "くるぞ。くる。いいときをしてるぜ。てめえは。しにてえようだからおのぞみとうりにころしてやるよ。", "ko": "온다. 온다. 좋은 (각오를) 하고 있군. 네놈은. 죽고 싶은 모양이니 원하는 대로 죽여 주마."}, {"t": "03:28:00", "jp": "この後はもうぐったぐだのぐっちゃぐちゃ。夕方近くまで乱闘が続き、上から正式にお叱りを受け風柱との修行は中断の上接近禁止が命じられた。", "pr": "こののちはもうぐったぐだのぐっちゃぐちゃ。ゆうがたちかくまでらんとうがつづき、うえからせいしきにおしかりをうけかぜはしらとのしゅぎょうはちゅうだんのじょうせつきんきんしがめいじられた。", "ko": "이 뒤로는 이미 엉망진창의 뒤죽박죽. 저녁 무렵까지 난투가 이어져, 위에서 정식으로 꾸지람을 받고 풍주와의 수련은 중단에 더해 접근 금지가 명령됐다."}, {"t": "03:28:20", "jp": "岩柱悲鳴嶼行冥。ようこそ我が修行場へ。最も重要なのは体の中心、足腰である。強靭な足腰で体を安定させること は正確な攻撃と崩れぬ防御へとつながる。", "pr": "いわはしらひめいしょぎょうめい。ようこそわがしゅぎょうばへ。もっともじゅうようなのはからだのちゅうしん、あしこしである。きょうじんなあしこしでからだをあんていさせること はせいかくなこうげきとくずれぬぼうぎょへとつながる。", "ko": "암주(바위의 기둥) 히메지마 교메이. 어서 와라 내 수련장에. 가장 중요한 것은 몸의 중심, 하반신이다. 강인한 하반신으로 몸을 안정시키는 것은 정확한 공격과 무너지지 않는 방어로 이어진다."}, {"t": "03:28:53", "jp": "まず滝に打たれる修行をしてもらい、丸太3本を担ぐ修行。最後にあの岩を1丁先まで 押して運ぶ修行。", "pr": "まずたきにうたれるしゅぎょうをしてもらい、まるた3ほんをかつぐしゅぎょう。さいごにあのいわを1ちょうさきまで おしてはこぶしゅぎょう。", "ko": "우선 폭포를 맞는 수련을 하고, 통나무 세 개를 짊어지는 수련. 마지막으로 저 바위를 일정 거리 앞까지 밀어 옮기는 수련."}, {"t": "03:29:04", "jp": "私の修行はこの3つのみ。簡単なもの。すみません。", "pr": "わたしのしゅぎょうはこの3つのみ。かんたんなもの。すみません。", "ko": "내 수련은 이 세 가지뿐. 간단한 것. 죄송합니다."}, {"t": "03:29:14", "jp": "善逸が気絶しました。川につけなさい。あ、ティー。そして悲鳴嶼さんの修行は始まった。悲鳴嶼さんが言っていた通り、修行自体はとても簡単だった。ただ、その簡単なことがきつい。純粋にとてもきつい。", "pr": "ぜんいつがきぜつしました。かわにつけなさい。あ、てぃー。そしてひめいしょさんのしゅぎょうははじまった。ひめいしょさんがいっていたとうり、しゅぎょうじたいはとてもかんたんだった。ただ、そのかんたんなことがきつい。じゅんすいにとてもきつい。", "ko": "젠이츠가 기절했어요. 강에 담가라. 아, 으. 그리고 히메지마 씨의 수련은 시작됐다. 히메지마 씨가 말한 대로, 수련 자체는 아주 간단했다. 다만, 그 간단한 게 힘들다. 순수하게 아주 힘들다."}, {"t": "03:29:42", "jp": "冷たい滝の水を耐える修行は文字通り首の 骨が折れそうなほど過酷だったし、丸太担ぎは肩と腰にかかる負担がとんでも なかった。", "pr": "つめたいたきのみずをたえるしゅぎょうはもじどおりくびの ほねがおれそうなほどかこくだったし、まるたかつぎはかたとこしにかかるふたんがとんでも なかった。", "ko": "차가운 폭포 물을 견디는 수련은 문자 그대로 목뼈가 부러질 것 같을 만큼 가혹했고, 통나무 짊어지기는 어깨와 허리에 걸리는 부담이 어마어마했다."}, {"t": "03:29:54", "jp": "あとは大岩を一丁運べばいいんだけど。", "pr": "あとはおおいわをいっちょうはこべばいいんだけど。", "ko": "이제 큰 바위를 일정 거리 옮기면 되는데."}], "range": "03:20:02 ~ 03:29:54"}, {"title": "챕터 22", "lines": [{"t": "03:30:07", "jp": "今日も駄目だった。お前、期待の眼差し濃くなってないか？", "pr": "きょうもだめだった。おまえ、きたいのまなざしこくなってないか？", "ko": "오늘도 안 됐다. 너, 기대의 눈빛이 짙어지지 않았냐?"}, {"t": "03:30:13", "jp": "あ、玄弥大丈夫だったのか？あの後連絡取れなくなってたから心配してた。", "pr": "あ、げんやだいじょうぶだったのか？あのこうれんらくとれなくなってたからしんぱいしてた。", "ko": "아, 겐야 괜찮았던 거야? 그 뒤로 연락이 안 돼서 걱정했어."}, {"t": "03:30:20", "jp": "謹慎してたんだよ。悲鳴嶼さんに叱られてさ。悪かったな。巻き込んじゃってくれてありがとうよ。", "pr": "きんしんしてたんだよ。ひめいしょさんにしかられてさ。わるかったな。まきこんじゃってくれてありがとうよ。", "ko": "근신하고 있었어. 히메지마 씨한테 혼나서. 미안했어. 휘말리게 해 (지켜) 줘서 고마워."}, {"t": "03:30:30", "jp": "それはそうと、お前ら反復動作はやってんの？うん。やってねえのか。悲鳴嶼さんも教えるの うまくねえからな。", "pr": "それはそうと、おまえらはんぷくどうさはやってんの？うん。やってねえのか。ひめいしょさんもおしえるの うまくねえからな。", "ko": "그건 그렇고, 너희 반복 동작은 하고 있어? 응. 안 하는 거냐. 히메지마 씨도 가르치는 게 서투니까."}, {"t": "03:30:40", "jp": "よく見て盗まねえと駄目だぞ。やること自体は簡単だ。集中を 極限まで高めるためにあらかじめ決めておいた動作をするんだ。", "pr": "よくみてぬすまねえとだめだぞ。やることじたいはかんたんだ。しゅうちゅうを きょくげんまでたかめるためにあらかじめきめておいたどうさをするんだ。", "ko": "잘 보고 (기술을) 훔치지 않으면 안 돼. 하는 것 자체는 간단해. 집중을 극한까지 높이기 위해 미리 정해 둔 동작을 하는 거야."}, {"t": "03:30:48", "jp": "例えば悲鳴嶼さんや 俺の場合は念仏を唱える。", "pr": "たとえばひめいしょさんや おれのばあいはねんぶつをとなえる。", "ko": "예를 들면 히메지마 씨나 내 경우는 염불을 외워."}, {"t": "03:30:55", "jp": "南無阿弥陀仏ってな。そうすることで怒りや憎しみの記憶を思い出して、心拍と体温の上昇につなげる。全ての感覚を一気に開く感じだな。", "pr": "なむあみだぶつってな。そうすることでいかりやにくしみのきおくをおもいだして、しんぱくとたいおんのじょうしょうにつなげる。すべてのかんかくをいっきにひらくかんじだな。", "ko": "나무아미타불 하고 말이야. 그렇게 함으로써 분노나 증오의 기억을 떠올려서, 심박과 체온 상승으로 이어지게 해. 모든 감각을 단숨에 여는 느낌이지."}, {"t": "03:31:11", "jp": "反復動作。極限の集中。反復動作をすることにより、いつでも一瞬で集中を極限まで高められる。", "pr": "はんぷくどうさ。きょくげんのしゅうちゅう。はんぷくどうさをすることにより、いつでもいっしゅんでしゅうちゅうをきょくげんまでたかめられる。", "ko": "반복 동작. 극한의 집중. 반복 동작을 함으로써, 언제든 한순간에 집중을 극한까지 높일 수 있다."}, {"t": "03:31:33", "jp": "よし、一応動かせた。南無阿弥陀仏。南無阿弥陀仏。", "pr": "よし、いちおううごかせた。なむあみだぶつ。なむあみだぶつ。", "ko": "좋아, 일단 움직였다. 나무아미타불. 나무아미타불."}, {"t": "03:31:48", "jp": "悲鳴嶼さん。岩の訓練も達成した。それに加えて里での正しき行動。私は君を認める。", "pr": "ひめいしょさん。いわのくんれんもたっせいした。それにくわえてさとでのただしきこうどう。わたしはくんをみとめる。", "ko": "히메지마 씨. 바위 훈련도 달성했다. 게다가 마을에서의 올바른 행동. 나는 너를 인정한다."}, {"t": "03:32:02", "jp": "里。君は刀鍛冶の里で鬼の妹の命より人間の命を優先した。", "pr": "さと。くんはかたなかじのさとでおにのいもうとのいのちよりにんげんのいのちをゆうせんした。", "ko": "마을. 너는 도공 마을에서 귀신 여동생의 목숨보다 인간의 목숨을 우선했다."}, {"t": "03:32:14", "jp": "あ、それは違います。決断したのは禰豆子であって俺ではありません。俺は決断ができず、危うく里の人が死ぬところでした。認められては困ります。どのような時も間違いのない道を進みたいと思っていますが、先のことは分かりません。だって誰かが助けてくれて、俺は結果違わ ずに済んでいるだけです。", "pr": "あ、それはちがいます。けつだんしたのはねずこであっておれではありません。おれはけつだんができず、あやうくさとのにんがしぬところでした。みとめられてはこまります。どのようなときもまちがいのないみちをすすみたいとおもっていますが、さきのことはわかりません。だってだれかがたすけてくれて、おれはけっかちがわ ずにすんでいるだけです。", "ko": "아, 그건 다릅니다. 결단한 건 네즈코이지 제가 아닙니다. 저는 결단을 못 내려서, 하마터면 마을 사람이 죽을 뻔했습니다. 인정받으면 곤란합니다. 어떤 때라도 틀림없는 길을 나아가고 싶다고 생각하지만, 앞일은 모릅니다. 그저 누군가가 도와줘서, 제가 결과적으로 (길을) 틀리지 않고 있을 뿐입니다."}, {"t": "03:32:40", "jp": "やはりこの子供は違う。疑いは晴れた。誰が何と言おうと私は君を認める。竈門炭治郎。", "pr": "やはりこのこどもはちがう。うたがいははれた。だれがなんといおうとわたしはくんをみとめる。かまどもんたんじろう。", "ko": "역시 이 아이는 다르다. 의심은 걷혔다. 누가 뭐라 해도 나는 너를 인정한다. 카마도 탄지로."}, {"t": "03:33:07", "jp": "え、どうしてですか？かつて私は面倒を見ていた子供の虚言によって投獄されたことがあった。証言をしたのは 4歳の子供。", "pr": "え、どうしてですか？かつてわたしはめんどうをみていたこどものきょげんによってとうごくされたことがあった。しょうげんをしたのは 4としのこども。", "ko": "어, 어째서요? 예전에 나는 돌보던 아이의 거짓말 때문에 투옥된 적이 있었다. 증언을 한 건 네 살짜리 아이."}, {"t": "03:33:20", "jp": "罪はない。だが、お館様が助けてくださらね ば、私は処刑されていた。", "pr": "つみはない。だが、おやかたさまがたすけてくださらね ば、わたしはしょけいされていた。", "ko": "죄는 없다. 하지만, 오야카타 님이 도와주시지 않았다면, 나는 처형되었을 거다."}, {"t": "03:33:29", "jp": "それから私は本当に疑い深くなったように思う。子供と いうのは純粋無垢で弱く、すぐ嘘をつき、 残酷なことを平気でする画欲の塊だ。", "pr": "それからわたしはほんとうにうたがいぶかくなったようにおもう。こどもと いうのはじゅんすいむくでよわく、すぐうそをつき、 ざんこくなことをへいきでするがよくのかいだ。", "ko": "그 뒤로 나는 정말로 의심이 많아진 것 같다. 아이라는 것은 순수무구하고 약하며, 금방 거짓말을 하고, 잔혹한 짓을 태연히 하는 화의 덩어리다."}, {"t": "03:33:45", "jp": "しかし君は逃げず、目をそらさず、嘘を つかず、素直でひたむきだった。", "pr": "しかしくんはにげず、めをそらさず、うそを つかず、すなおでひたむきだった。", "ko": "하지만 너는 도망치지 않고, 눈을 돌리지 않고, 거짓말을 하지 않고, 솔직하고 한결같았다."}, {"t": "03:33:57", "jp": "未来に不安があるのは誰しも同じ。君が道を間違えぬ よう。", "pr": "みらいにふあんがあるのはだれしもおなじ。くんがみちをまちがえぬ よう。", "ko": "미래에 불안이 있는 것은 누구나 마찬가지. 네가 길을 틀리지 않도록."}, {"t": "03:34:07", "jp": "これからは私も手助けしよう。 私の訓練は完了した。", "pr": "これからはわたしもてだすけしよう。 わたしのくんれんはかんりょうした。", "ko": "앞으로는 나도 도와주마. 내 훈련은 완료됐다."}, {"t": "03:34:19", "jp": "よくやり遂げたな。 よし、じゃあ次は素手で殺し合うか。", "pr": "よくやりとげたな。 よし、じゃあつぎはすででころしあうか。", "ko": "잘 해냈군. 좋아, 그럼 다음은 맨손으로 죽일 듯이 싸울까."}, {"t": "03:34:35", "jp": "待った、待った、待った。ちょっと待ってくださいよ。殺し合ったら行けません。", "pr": "まった、まった、まった。ちょっとまってくださいよ。ころしあったらいけません。", "ko": "잠깐, 잠깐, 잠깐. 잠깐만 기다려 주세요. 죽일 듯이 싸우면 안 돼요."}, {"t": "03:34:42", "jp": "うるせえんだよ、てめえは。そもそも接触禁止だろうが。", "pr": "うるせえんだよ、てめえは。そもそもせっしょくきんしだろうが。", "ko": "시끄러워, 네놈은. 애초에 접촉 금지잖아."}, {"t": "03:34:47", "jp": "おはぎの取り合いですか？もしそうなら俺が腹いっぱいになるまで作りますから。ふざけてやがるな。", "pr": "おはぎのとりあいですか？もしそうならおれがはらいっぱいになるまでつくりますから。ふざけてやがるな。", "ko": "오하기(경단) 쟁탈전이에요? 만약 그렇다면 제가 배부를 때까지 만들 테니까요. 까불고 있군."}, {"t": "03:34:58", "jp": "え？いやいや、真面目です。不死川さんおはぎ大好きですよね。不死川さんちで稽古をつけてもらっていた時、ずっとほのかにもち米とあんこの匂いしてたし。", "pr": "え？いやいや、まじめです。ふしかわさんおはぎだいすきですよね。ふしかわさんちでけいこをつけてもらっていたとき、ずっとほのかにもちこめとあんこのにおいしてたし。", "ko": "어? 아니 아니, 진지해요. 시나즈가와 씨 오하기 정말 좋아하시죠. 시나즈가와 씨네서 수련받을 때, 줄곧 은은하게 찹쌀과 팥소 냄새가 났고."}, {"t": "03:35:13", "jp": "不死川はおはぎが好きなのか？ 美味しいですよね、おはぎ。こし餡ですか？つぶ餡ですか？", "pr": "ふしかわはおはぎがすきなのか？ おいしいですよね、おはぎ。こしあんですか？つぶあんですか？", "ko": "시나즈가와는 오하기를 좋아하는 거냐? 맛있죠, 오하기. 고운 팥소예요? 알갱이 팥소예요?"}, {"t": "03:35:21", "jp": "俺もおばあちゃんのおはぎが大好きで。 あら。", "pr": "おれもおばあちゃんのおはぎがだいすきで。 あら。", "ko": "저도 할머니의 오하기를 정말 좋아해서. 어머."}, {"t": "03:35:34", "jp": "不死川は怒ってどこかへ行ってしまった。 そうですか。 どうして喧嘩してたんですか？", "pr": "ふしかわはいかってどこかへいってしまった。 そうですか。 どうしてけんかしてたんですか？", "ko": "시나즈가와는 화내며 어디론가 가 버렸다. 그래요? 어째서 싸우고 있었던 거예요?"}, {"t": "03:35:43", "jp": "喧嘩ではなく柱稽古の一環で、柱は柱同士で手合わせしているんだ。", "pr": "けんかではなくはしらけいこのいっかんで、はしらははしらどうしでてあいわせしているんだ。", "ko": "싸움이 아니라 기둥 수련의 일환으로, 기둥은 기둥끼리 겨루고 있는 거다."}, {"t": "03:35:49", "jp": "ああ、そうか。通りで木刀だったし。そうか、そうか。邪魔してすみません。", "pr": "ああ、そうか。とうりでぼくとうだったし。そうか、そうか。じゃましてすみません。", "ko": "아아, 그렇구나. 어쩐지 목검이었고. 그렇구나, 그렇구나. 방해해서 죄송합니다."}, {"t": "03:35:57", "jp": "いや、そんなことはない。品川の好物が分かってよかった。今度は懐におはぎを忍ばせておいて、品川に会う時あげようと思う。", "pr": "いや、そんなことはない。しながわのこうぶつがわかってよかった。こんどはふところにおはぎをしのばせておいて、しながわにあうときあげようとおもう。", "ko": "아니, 그렇지 않다. 시나즈가와의 좋아하는 음식을 알게 돼서 다행이다. 다음엔 품에 오하기를 숨겨 두고, 시나즈가와를 만날 때 주려고 한다."}, {"t": "03:36:08", "jp": "ああ。それはいいですね。そうしたらきっと仲良くなれると思う。", "pr": "ああ。それはいいですね。そうしたらきっとなかよくなれるとおもう。", "ko": "아아. 그거 좋네요. 그러면 분명 사이좋아질 수 있을 거라고 생각해요."}, {"t": "03:36:15", "jp": "ん？それじゃあ柱稽古は義勇さんで最後ってことですか？", "pr": "ん？それじゃあはしらけいこはぎゆうさんでさいごってことですか？", "ko": "응? 그럼 기둥 수련은 기유 씨로 마지막이라는 건가요?"}, {"t": "03:36:22" const YT_ID = "n-3Qt3NMXgI";
const STORE_KEY = 'kimetsu_marks_v1';

function timeToSec(t){
  if(!t) return null;
  const p = t.split(':').map(n=>parseInt(n,10));
  if(p.some(isNaN)) return null;
  if(p.length===2) return p[0]*60+p[1];
  if(p.length===3) return p[0]*3600+p[1]*60+p[2];
  return null;
}
function ytLink(t){
  const s = timeToSec(t);
  if(s===null) return null;
  return 'https://youtu.be/'+YT_ID+'?t='+s+'s';
}

let marks = {};
try { marks = JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e){ marks = {}; }
function saveMarks(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(marks)); }catch(e){} }
function keyOf(ci,li){ return ci+'_'+li; }
function getMark(ci,li){ return marks[keyOf(ci,li)] || {}; }
function toggleMark(ci,li,type){
  const k=keyOf(ci,li);
  if(!marks[k]) marks[k]={};
  marks[k][type] = !marks[k][type];
  if(!marks[k].imp && !marks[k].que && !marks[k].done) delete marks[k];
  saveMarks();
}
function countType(type){ let c=0; for(const k in marks){ if(marks[k][type]) c++; } return c; }

const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('overlay');
const hamburger=document.getElementById('hamburger');
const chapterList=document.getElementById('chapterList');
const main=document.getElementById('main');

let view = {mode:'chapter', idx:0};
let reviewFilter = 'all';

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildMenu(){
  chapterList.innerHTML='';
  const total = Object.keys(marks).length;
  const rb=document.createElement('button');
  rb.className='review-link'+(view.mode==='review'?' active':'');
  rb.innerHTML='<span>📌 체크한 대사 모아보기</span><span class="cnt">'+total+'</span>';
  rb.onclick=()=>{ view={mode:'review'}; reviewFilter='all'; render(); closeMenu(); };
  chapterList.appendChild(rb);
  const sep=document.createElement('div'); sep.className='list-sep'; sep.textContent='챕터';
  chapterList.appendChild(sep);
  DATA.forEach((ch,i)=>{
    const b=document.createElement('button');
    b.className='ch-link'+(view.mode==='chapter'&&view.idx===i?' active':'');
    b.innerHTML='<span class="num">'+String(i+1).padStart(2,'0')+'</span>'+
      '<span class="label"><span class="nm">'+esc(ch.title)+'</span>'+
      (ch.range?'<span class="rg">'+esc(ch.range)+'</span>':'')+'</span>';
    b.onclick=()=>{ view={mode:'chapter',idx:i}; render(); closeMenu(); };
    chapterList.appendChild(b);
  });
}

function lineHTML(ci,li,ln,showChap){
  const m=getMark(ci,li);
  const cls=['line'];
  if(m.imp)cls.push('has-imp'); if(m.que)cls.push('has-que'); if(m.done)cls.push('has-done');
  const link = ytLink(ln.t);
  const timeEl = ln.t
    ? (link
        ? '<a class="time" href="'+link+'" target="_blank" rel="noopener" title="이 장면부터 유튜브 재생"><span class="yt">▶</span>'+esc(ln.t)+'</a>'
        : '<span class="time">'+esc(ln.t)+'</span>')
    : '';
  return '<div class="'+cls.join(' ')+'" data-ci="'+ci+'" data-li="'+li+'">'+
    '<div class="line-top">'+timeEl+(showChap?'<span class="chap-tag">'+esc(DATA[ci].title)+'</span>':'')+'</div>'+
    '<div class="jp">'+esc(ln.jp)+'</div>'+
    (ln.pr?'<div class="pr">'+esc(ln.pr)+'</div>':'')+
    (ln.ko?'<div class="ko">'+esc(ln.ko)+'</div>':'')+
    '<div class="marks">'+
      '<button class="mark-btn imp'+(m.imp?' on':'')+'" data-type="imp"><span class="ico">⭐</span>중요</button>'+
      '<button class="mark-btn que'+(m.que?' on':'')+'" data-type="que"><span class="ico">❓</span>이해안됨</button>'+
      '<button class="mark-btn done'+(m.done?' on':'')+'" data-type="done"><span class="ico">✅</span>완료</button>'+
    '</div>'+
  '</div>';
}

function render(){
  buildMenu();
  if(view.mode==='chapter') renderChapter(); else renderReview();
  main.scrollTop=0; window.scrollTo(0,0);
}

function renderChapter(){
  const ci=view.idx, ch=DATA[ci];
  let h='<div class="ch-head"><h1>'+esc(ch.title)+
        (ch.range?'<span class="range">('+esc(ch.range)+')</span>':'')+'</h1>'+
        '<div class="meta">'+ch.lines.length+'개 대사 · 시각 ▶ 누르면 유튜브 해당 장면 재생 · 카드 아래 버튼으로 표시</div></div>';
  ch.lines.forEach((ln,li)=>{ h+=lineHTML(ci,li,ln,false); });
  h+='<div class="footer">귀멸의 칼날 일본어 학습 · 鬼滅の刃で学ぶ日本語<br>체크 표시는 이 브라우저에 자동 저장됩니다.</div>';
  main.innerHTML=h; bindMarks();
}

function renderReview(){
  const items=[];
  DATA.forEach((ch,ci)=>ch.lines.forEach((ln,li)=>{
    const m=getMark(ci,li);
    if(m.imp||m.que||m.done) items.push({ci,li,ln,m});
  }));
  const f=reviewFilter;
  const filtered=items.filter(it=> f==='all' ? true : it.m[f]);
  let h='<div class="ch-head"><h1>📌 체크한 대사 모아보기</h1>'+
        '<div class="meta">표시한 대사를 한곳에 모았습니다. 필터로 종류별로 볼 수 있어요.</div></div>';
  h+='<div class="filter-bar">'+
     '<button class="filter-btn'+(f==='all'?' on':'')+'" data-f="all">전체 '+items.length+'</button>'+
     '<button class="filter-btn'+(f==='imp'?' on':'')+'" data-f="imp">⭐ 중요 '+countType('imp')+'</button>'+
     '<button class="filter-btn'+(f==='que'?' on':'')+'" data-f="que">❓ 이해안됨 '+countType('que')+'</button>'+
     '<button class="filter-btn'+(f==='done'?' on':'')+'" data-f="done">✅ 완료 '+countType('done')+'</button>'+
     '</div>';
  if(filtered.length===0){
    h+='<div class="empty"><div class="big">🗒️</div>아직 표시한 대사가 없습니다.<br>각 챕터에서 대사 카드 아래의 ⭐ ❓ ✅ 버튼을 눌러보세요.</div>';
  } else { filtered.forEach(it=>{ h+=lineHTML(it.ci,it.li,it.ln,true); }); }
  h+='<div class="footer">귀멸의 칼날 일본어 학습 · 鬼滅の刃で学ぶ日本語<br>체크 표시는 이 브라우저에 자동 저장됩니다.</div>';
  main.innerHTML=h;
  main.querySelectorAll('.filter-btn').forEach(b=>{ b.onclick=()=>{ reviewFilter=b.dataset.f; renderReview(); }; });
  bindMarks();
}

function bindMarks(){
  main.querySelectorAll('.mark-btn').forEach(btn=>{
    btn.onclick=()=>{
      const card=btn.closest('.line');
      const ci=+card.dataset.ci, li=+card.dataset.li, type=btn.dataset.type;
      toggleMark(ci,li,type);
      if(view.mode==='review'){ renderReview(); buildMenu(); }
      else {
        btn.classList.toggle('on');
        const m=getMark(ci,li);
        card.classList.toggle('has-imp',!!m.imp);
        card.classList.toggle('has-que',!!m.que);
        card.classList.toggle('has-done',!!m.done);
        buildMenu();
      }
    };
  });
}

function openMenu(){sidebar.classList.add('open'); overlay.classList.add('show');}
function closeMenu(){sidebar.classList.remove('open'); overlay.classList.remove('show');}
hamburger.onclick=()=>sidebar.classList.contains('open')?closeMenu():openMenu();
overlay.onclick=closeMenu;

render();
</script>
</body>
</html>
